function esc(s){return String(s??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll("\n","<br>")}
function subj(q){if(q.id<=10)return "English Grammar"; if(q.id<=30)return "GK / Current Affairs"; if(q.id<=50)return "Reasoning / Quant"; return lang==="en"?"Sanitation / Public Health":"स्वच्छता / जनस्वास्थ्य"}
function textFor(q){if(q.only==="en")return esc(q.en); if(lang==="hi")return esc(q.hi); if(lang==="en")return esc(q.en); return `<div>${esc(q.hi)}</div><div class="en">${esc(q.en)}</div>`}
function optFor(q,i){if(q.only==="en")return esc(q.opts_en[i]||""); if(lang==="hi")return esc(q.opts_hi[i]||""); if(lang==="en")return esc(q.opts_en[i]||""); return `<b>HI:</b> ${esc(q.opts_hi[i]||"")}<br><b>EN:</b> ${esc(q.opts_en[i]||"")}`}
function dirFor(q){if(!q.dir_en)return ""; if(q.only==="en"||lang==="en")return `<div class="direction-box">${esc(q.dir_en)}</div>`; if(lang==="hi")return `<div class="direction-box">${esc(q.dir_hi||q.dir_en)}</div>`; return `<div class="direction-box">${esc(q.dir_hi||q.dir_en)}<div class="en">${esc(q.dir_en)}</div></div>`}
function render(){const q=questions[current];qCount.textContent=`Question ${current+1}/${questions.length}`;subjectLabel.textContent=subj(q);directionBox.innerHTML=dirFor(q);question.innerHTML=(current+1)+". "+textFor(q);imageBox.innerHTML=q.img?`<img class="qimg" src="${q.img}" alt="Question ${q.id} image">`:"";options.innerHTML="";q.opts_en.forEach((_,i)=>{let b=document.createElement("button");b.className="opt"+(answers[current]===i+1?" selected":"");b.innerHTML=`(${i+1}) ${optFor(q,i)}`;b.onclick=()=>{if(!submitted){answers[current]=i+1;saveState();render();}};options.appendChild(b)});renderPalette();updateLangButtons()}
function updateLangButtons(){["hi","en","bi"].forEach(x=>document.getElementById("btn-"+x).classList.toggle("active",lang===x))}
function setLang(x){lang=x;localStorage.setItem(TEST_ID+"_lang",lang);render()}
function renderPalette(){palette.innerHTML="";questions.forEach((q,i)=>{let d=document.createElement("div");d.className="num"+(i===current?" active":"")+(answers[i]?" answered":"")+(review[i]?" review":"");d.textContent=i+1;d.onclick=()=>{current=i;saveState();render()};palette.appendChild(d)})}
function prevQ(){if(current>0){current--;saveState();render()}}function saveNext(){if(current<questions.length-1){current++;saveState();render()}}function clearAns(){answers[current]=null;saveState();render()}function toggleReview(){review[current]=!review[current];saveState();render()}
function submitTest(){if(!confirm("Submit this test?"))return;submitted=true;let c=0,w=0,a=0;questions.forEach((q,i)=>{if(answers[i]){a++; if(answers[i]===q.ans)c++; else w++;}});let m=c-w*.25;testArea.style.display="none";resultArea.style.display="block";scoreBox.innerHTML=`<div class="score-box"><b>${a}</b>Attempted</div><div class="score-box"><b>${c}</b>Correct</div><div class="score-box"><b>${w}</b>Wrong</div><div class="score-box"><b>${m.toFixed(2)}</b>Score</div>`;saveHistory({date:new Date().toLocaleString(),attempted:a,correct:c,wrong:w,marks:m.toFixed(2)});localStorage.removeItem(TEST_ID+"_state");loadHistory()}
function showReview(){let out="<h3>Answer Review</h3>";questions.forEach((q,i)=>{let st=!answers[i]?"Skipped":(answers[i]===q.ans?"Correct":"Wrong");out+=`<div class="review-card"><b>Q${i+1}.</b> ${textFor(q)}<br><span class="small">Your answer: ${answers[i]||"-"} | Correct answer: ${q.ans} | Status: ${st}</span></div>`});reviewArea.innerHTML=out}
function restartTest(){if(!confirm("Restart this test?"))return;current=0;answers=Array(questions.length).fill(null);review=Array(questions.length).fill(false);totalSeconds=100*60;submitted=false;localStorage.removeItem(TEST_ID+"_state");resultArea.style.display="none";testArea.style.display="block";render()}
function tick(){if(submitted)return;let m=Math.floor(totalSeconds/60),s=totalSeconds%60;timer.textContent=String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");if(totalSeconds<=0){submitted=true;alert("Time is over. Test will be submitted.");submitted=false;submitTest()}else totalSeconds--;saveState()}
function saveState(){localStorage.setItem(TEST_ID+"_state",JSON.stringify({current,answers,review,totalSeconds}))}function loadState(){let r=localStorage.getItem(TEST_ID+"_state");if(r){try{let st=JSON.parse(r);current=st.current??0;answers=st.answers??answers;review=st.review??review;totalSeconds=st.totalSeconds??totalSeconds}catch(e){}}}
function saveHistory(item){let k=TEST_ID+"_history",h=JSON.parse(localStorage.getItem(k)||"[]");h.unshift(item);h=h.slice(0,10);localStorage.setItem(k,JSON.stringify(h))}function loadHistory(){let h=JSON.parse(localStorage.getItem(TEST_ID+"_history")||"[]");history.innerHTML=h.length?h.map(x=>`<div class="history-item"><b>${x.date}</b><br>Score: ${x.marks} | Correct: ${x.correct} | Wrong: ${x.wrong}</div>`).join(""):"<p class='small'>No attempt yet.</p>"}

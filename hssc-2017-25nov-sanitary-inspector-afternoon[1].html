 "opts_en": ["PQO", "AZY", "TWS", "VBU"], "ans": 2}, {"id": 84, "hi": "10 वर्ष पहले चन्द्रावती की माता अपनी पुत्री से उम्र में चार गुनी बड़ी थी। 10 वर्ष के पश्चात् माता-पुत्री से उम्र में दोगुनी होगी। चन्द्रावती की वर्तमान उम्र कितनी है-", "en": "10 years ago, Chandravati's mother was four times her age. After 10 years, the mother will be twice her daughter's age. What is Chandravati's present age?", "opts_hi": ["5 वर्ष", "10 वर्ष", "20 वर्ष", "30 वर्ष"], "opts_en": ["5 years", "10 years", "20 years", "30 years"], "ans": 3}, {"id": 85, "hi": "यदि एक व्यक्ति की धारा के साथ गति 12 किमी./घंटा है और धारा की गति 1.5 किमी/घंटा है, तो धारा के विरुद्ध व्यक्ति की गति है-", "en": "If a man's speed downstream is 12 km/h and speed of stream is 1.5 km/h, his speed upstream is -", "opts_hi": ["9 किमी/घंटा", "6.75 किमी/घंटा", "5.25 किमी/घंटा", "7.5 किमी/घंटा"], "opts_en": ["9 km/h", "6.75 km/h", "5.25 km/h", "7.5 km/h"], "ans": 1}, {"id": 86, "hi": "यदि किसी वर्ग की भुजा को दुगुना किया जाता है, तो इस प्रकार प्राप्त वर्ग का दिए गए वर्ग से अनुपात होगा-", "en": "If the side of a square is doubled, the ratio of the obtained square to the given square will be -", "opts_hi": ["1:2", "2:1", "3:1", "4:1"], "opts_en": ["1:2", "2:1", "3:1", "4:1"], "ans": 4}, {"id": 87, "hi": "10000 में से कौन सी बड़ी से बड़ी संख्या घटाई जाये जिससे कि शेष 32, 36, 48 और 54 द्वारा भाज्य हो-", "en": "What greatest number should be subtracted from 10000 so that the remainder is divisible by 32, 36, 48 and 54?", "opts_hi": ["8236", "7524", "9136", "इनमें से कोई नहीं"], "opts_en": ["8236", "7524", "9136", "None of these"], "ans": 3}, {"id": 88, "hi": "आमतौर पर कोयले की खानों में विस्फोट पैदा करने वाली गैस है-", "en": "The gas usually causing explosions in coal mines is -", "opts_hi": ["हीलियम", "कार्बन मोनोक्साइड", "नाइट्रोजन", "मिथेन"], "opts_en": ["Helium", "Carbon monoxide", "Nitrogen", "Methane"], "ans": 4}, {"id": 89, "hi": "समतापीय प्रक्रिया के दौरान अचल रखी जाने वाली भौतिक राशि है -", "en": "In an isothermal process, which physical quantity remains constant?", "opts_hi": ["आयतन", "दबाव", "तापमान", "इनमें से कोई नहीं"], "opts_en": ["Volume", "Pressure", "Temperature", "None of these"], "ans": 3}, {"id": 90, "hi": "निषेचन के बाद अंडाशय किसमें परिवर्तित होता है -", "en": "After fertilization, ovary changes into -", "opts_hi": ["भ्रूण", "एंडोस्पर्म", "फल", "बीज"], "opts_en": ["Embryo", "Endosperm", "Fruit", "Seed"], "ans": 3}, {"id": 91, "hi": "Select the word from the following that is most similar in meaning to the given word : LASS", "en": "Select the word most similar in meaning to LASS.", "opts_hi": ["Pity", "Less", "Girl", "Lament"], "opts_en": ["Pity", "Less", "Girl", "Lament"], "ans": 3}, {"id": 92, "hi": "Select the word from the following that is opposite in meaning to the given word: LASTING", "en": "Select the word opposite in meaning to LASTING.", "opts_hi": ["Transient", "Leave", "Permanent", "Wild"], "opts_en": ["Transient", "Leave", "Permanent", "Wild"], "ans": 1}, {"id": 93, "hi": "In the following question four alternatives are given for the idiom/phrase bold in the sentence. Choose the alternative which best expresses the meaning of the idiom/phrase: Servants are waiting upon their master.", "en": "Choose the meaning of the idiom/phrase: Servants are waiting upon their master.", "opts_hi": ["to attend", "to expel", "to consider", "feeling upon"], "opts_en": ["to attend", "to expel", "to consider", "feeling upon"], "ans": 1}, {"id": 94, "hi": "Give one word substitute for the following expression: Murder of one's father", "en": "One word substitute: Murder of one's father", "opts_hi": ["Widow", "Patriot", "Patricide", "Widower"], "opts_en": ["Widow", "Patriot", "Patricide", "Widower"], "ans": 3}, {"id": 95, "hi": "Supply suitable article in the following blank if needed: ..... poor are honest.", "en": "Supply suitable article: ..... poor are honest.", "opts_hi": ["A", "An", "The", "No article"], "opts_en": ["A", "An", "The", "No article"], "ans": 3}, {"id": 96, "hi": "शिरोमणि का संधि-विग्रह है -", "en": "Sandhi-vigrah of 'शिरोमणि' is -", "opts_hi": ["शिर + मनी", "शिरो + मणी", "शिरः + मणि", "शिरो + मणि"], "opts_en": ["शिर + मनी", "शिरो + मणी", "शिरः + मणि", "शिरो + मणि"], "ans": 3}, {"id": 97, "hi": "राहखर्च किस समास का उदाहरण है -", "en": "'राहखर्च' is an example of which Samas?", "opts_hi": ["बहुव्रीहि समास", "अव्ययीभाव समास", "तत्पुरुष समास", "द्विगु समास"], "opts_en": ["Bahuvrihi Samas", "Avyayibhav Samas", "Tatpurush Samas", "Dvigu Samas"], "ans": 3}, {"id": 98, "hi": "निम्न में से किस शब्द की वर्तनी सही है-", "en": "Which spelling is correct?", "opts_hi": ["भागिरथी", "प्रसंशा", "परिस्थिती", "प्रदर्शनी"], "opts_en": ["भागिरथी", "प्रसंशा", "परिस्थिती", "प्रदर्शनी"], "ans": 4}, {"id": 99, "hi": "'या अनुरागी चित्त की, गति समुझहिं नहिं कोई। ज्यों-ज्यों बूडे स्याम रंग, त्यों-त्यों उज्ज्वल होई ।। इनमें कौन सा अलंकार है -", "en": "Which Alankar is present in the given couplet?", "opts_hi": ["अनुप्रास अलंकार", "उपमा अलंकार", "विरोधाभास अलंकार", "उत्प्रेक्षा अलंकार"], "opts_en": ["Anupras Alankar", "Upma Alankar", "Virodhabhas Alankar", "Utpreksha Alankar"], "ans": 3}, {"id": 100, "hi": "निम्न में से कौनसा शब्द पुल्लिंग है -", "en": "Which of the following words is masculine?", "opts_hi": ["पुस्तक", "अर्चना", "इच्छा", "अंगूर"], "opts_en": ["पुस्तक", "अर्चना", "इच्छा", "अंगूर"], "ans": 4}];let current=0;let lang=localStorage.getItem(TEST_ID+"_lang")||"hi";let answers=Array(questions.length).fill(null);let review=Array(questions.length).fill(false);let submitted=false;let totalSeconds=100*60;
function esc(s){return String(s??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll("\n","<br>")}
function getSubject(q){if(q.id<=50)return lang==="en"?"Public Health / Sanitation":"जनस्वास्थ्य / स्वच्छता"; if(q.id<=75)return lang==="en"?"Haryana GK":"हरियाणा GK"; if(q.id<=90)return lang==="en"?"GK / Reasoning / Maths":"GK / रीजनिंग / गणित"; return lang==="en"?"English / Hindi Language":"English / Hindi भाषा"}
function textFor(q){if(lang==="hi")return esc(q.hi);if(lang==="en")return esc(q.en);return `<div>${esc(q.hi)}</div><div class="en">${esc(q.en)}</div>`}
function optFor(q,i){if(lang==="hi")return esc(q.opts_hi[i]||"");if(lang==="en")return esc(q.opts_en[i]||"");return `<b>HI:</b> ${esc(q.opts_hi[i]||"")}<br><b>EN:</b> ${esc(q.opts_en[i]||"")}`}
function render(){const q=questions[current];document.getElementById("qCount").textContent=`Question ${current+1}/${questions.length}`;document.getElementById("subjectLabel").textContent=getSubject(q);document.getElementById("question").innerHTML=(current+1)+". "+textFor(q);const optDiv=document.getElementById("options");optDiv.innerHTML="";q.opts_hi.forEach((_,i)=>{const btn=document.createElement("button");btn.className="opt"+(answers[current]===i+1?" selected":"");btn.innerHTML=`(${i+1}) ${optFor(q,i)}`;btn.onclick=()=>{if(!submitted){answers[current]=i+1;saveState();render();}};optDiv.appendChild(btn);});renderPalette();updateLangButtons();}
function updateLangButtons(){["hi","en","bi"].forEach(x=>document.getElementById("btn-"+x).classList.toggle("active",lang===x));}function setLang(x){lang=x;localStorage.setItem(TEST_ID+"_lang",lang);render();}
function renderPalette(){const p=document.getElementById("palette");p.innerHTML="";questions.forEach((q,i)=>{const d=document.createElement("div");d.className="num"+(i===current?" active":"")+(answers[i]?" answered":"")+(review[i]?" review":"");d.textContent=i+1;d.onclick=()=>{current=i;saveState();render();};p.appendChild(d);});}
function prevQ(){if(current>0){current--;saveState();render();}}function saveNext(){if(current<questions.length-1){current++;saveState();render();}}function clearAns(){answers[current]=null;saveState();render();}function toggleReview(){review[current]=!review[current];saveState();render();}
function submitTest(){if(!confirm("Submit this test?"))return;submitted=true;let correct=0,wrong=0,attempted=0;questions.forEach((q,i)=>{if(answers[i]){attempted++;if(answers[i]===q.ans)correct++;else wrong++;}});const marks=correct-wrong*0.25;document.getElementById("testArea").style.display="none";document.getElementById("resultArea").style.display="block";document.getElementById("scoreBox").innerHTML=`<div class="score-box"><b>${attempted}</b>Attempted</div><div class="score-box"><b>${correct}</b>Correct</div><div class="score-box"><b>${wrong}</b>Wrong</div><div class="score-box"><b>${marks.toFixed(2)}</b>Score</div>`;saveHistory({date:new Date().toLocaleString(),attempted,correct,wrong,marks:marks.toFixed(2)});localStorage.removeItem(TEST_ID+"_state");loadHistory();}
function showReview(){let out="<h3>Answer Review</h3>";questions.forEach((q,i)=>{const status=!answers[i]?"Skipped":(answers[i]===q.ans?"Correct":"Wrong");out+=`<div class="review-card"><b>Q${i+1}.</b> ${textFor(q)}<br><span class="small">Your answer: ${answers[i]||"-"} | Correct answer: ${q.ans} | Status: ${status}</span></div>`;});document.getElementById("reviewArea").innerHTML=out;}
function restartTest(){if(!confirm("Restart this test?"))return;current=0;answers=Array(questions.length).fill(null);review=Array(questions.length).fill(false);totalSeconds=100*60;submitted=false;localStorage.removeItem(TEST_ID+"_state");document.getElementById("resultArea").style.display="none";document.getElementById("testArea").style.display="block";render();}
function tick(){if(submitted)return;let m=Math.floor(totalSeconds/60),s=totalSeconds%60;document.getElementById("timer").textContent=String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");if(totalSeconds<=0){submitted=true;alert("Time is over. Test will be submitted.");submitted=false;submitTest();}else totalSeconds--;saveState();}
function saveState(){localStorage.setItem(TEST_ID+"_state",JSON.stringify({current,answers,review,totalSeconds}));}function loadState(){const raw=localStorage.getItem(TEST_ID+"_state");if(raw){try{const st=JSON.parse(raw);current=st.current??0;answers=st.answers??answers;review=st.review??review;totalSeconds=st.totalSeconds??totalSeconds;}catch(e){}}}
function saveHistory(item){const key=TEST_ID+"_history";let h=JSON.parse(localStorage.getItem(key)||"[]");h.unshift(item);h=h.slice(0,10);localStorage.setItem(key,JSON.stringify(h));}function loadHistory(){const h=JSON.parse(localStorage.getItem(TEST_ID+"_history")||"[]");document.getElementById("history").innerHTML=h.length?h.map(x=>`<div class="history-item"><b>${x.date}</b><br>Score: ${x.marks} | Correct: ${x.correct} | Wrong: ${x.wrong}</div>`).join(""):"<p class='small'>No attempt yet.</p>";}
loadState();render();loadHistory();setInterval(tick,1000);
</script><script src="result-saver.js"></script></body></html>

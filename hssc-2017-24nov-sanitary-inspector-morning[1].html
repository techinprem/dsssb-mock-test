<script>
const TEST_ID="hssc_2017_24nov_sanitary_inspector_morning_bilingual_100_v3";
const questions=[{"id": 1, "hi": "निम्नलिखित अंगों में से प्रत्येक मूत्र प्रणाली का एक हिस्सा है, सिवाय", "en": "Each of the following organs is a part of the urinary system, except -", "opts_hi": ["गुर्दा", "मूत्राशय", "मलाशय", "मूत्रवाहिनी"], "opts_en": ["Kidney", "Urinary bladder", "Rectum", "Ureter"], "ans": 3}, {"id": 2, "hi": "निम्नलिखित में से यह पोषकतत्त्व नहीं है-", "en": "Which of the following is not a nutrient?", "opts_hi": ["फाइबर", "प्रोटीन", "वसा", "विटामिन"], "opts_en": ["Fibre", "Protein", "Fat", "Vitamin"], "ans": 1}, {"id": 3, "hi": "शरीर में सबसे छोटी अस्थि है-", "en": "The smallest bone in the body is in the -", "opts_hi": ["सिर की", "नाक की", "ऊँगलियों की", "कान की"], "opts_en": ["Head", "Nose", "Fingers", "Ear"], "ans": 4}, {"id": 4, "hi": "हृदय ऊतकों के निम्नलिखित स्तरों से बना है, सिवाय-", "en": "The heart is made up of the following tissue layers, except -", "opts_hi": ["पेरिकार्डियम", "मायोकार्डियम", "एंडोकार्डियम", "एक्टोकार्डियम"], "opts_en": ["Pericardium", "Myocardium", "Endocardium", "Ectocardium"], "ans": 4}, {"id": 5, "hi": "विटामिन जिसे मानव शरीर द्वारा संश्लेषित किया जा सकता है वह विटामिन है-", "en": "The vitamin that can be synthesized by the human body is -", "opts_hi": ["D", "C", "B", "A"], "opts_en": ["D", "C", "B", "A"], "ans": 1}, {"id": 6, "hi": "भारत में बायोमेडिकल अपशिष्ट की श्रेणियों के अनुसार, विसंक्रमक के रूप में उपयोग किए जाने वाले रसायन आते है इस श्रेणी संख्या में-", "en": "According to biomedical waste categories in India, chemicals used as disinfectants come under category number -", "opts_hi": ["7", "8", "9", "10"], "opts_en": ["7", "8", "9", "10"], "ans": 4}, {"id": 7, "hi": "मानव अपशिष्ट और रक्तरंजित रूई फेंकने के लिए........... रंग की बैग का उपयोग किया जाता है।", "en": "For disposing human waste and blood-stained cotton, which colour bag is used?", "opts_hi": ["नीले", "लाल", "पीले", "काले"], "opts_en": ["Blue", "Red", "Yellow", "Black"], "ans": 3}, {"id": 8, "hi": "अपगर स्कोरिंग में एक आदर्श स्कोर माना जाता है-", "en": "In Apgar scoring, an ideal score is considered -", "opts_hi": ["9 या 10", "7 या 8", "5 से नीचे", "3 से नीचे"], "opts_en": ["9 or 10", "7 or 8", "Below 5", "Below 3"], "ans": 1}, {"id": 9, "hi": "प्रसव के बाद प्रसवोत्तर अवधि को कहाँ तक माना जाता है?", "en": "After delivery, the postnatal period is considered up to -", "opts_hi": ["पहले 2 सप्ताह", "पहले 4 सप्ताह", "पहले 6 सप्ताह", "पहले 8 सप्ताह"], "opts_en": ["First 2 weeks", "First 4 weeks", "First 6 weeks", "First 8 weeks"], "ans": 3}, {"id": 10, "hi": "बच्चे के जन्म के दौरान कीटाणु रहित उपकरण का उपयोग ........ रोकने में मदद करता है।", "en": "Use of sterile instruments during childbirth helps prevent -", "opts_hi": ["बुखार (ज्वर)", "पीलिया", "टेटनस", "अंधापन"], "opts_en": ["Fever", "Jaundice", "Tetanus", "Blindness"], "ans": 3}, {"id": 11, "hi": "वनस्पति स्त्रोत से व्युत्पन्न आहार वसा है", "en": "Dietary fat derived from vegetable source is -", "opts_hi": ["मक्खन", "सूरजामुखी तेल", "घी", "मछली"], "opts_en": ["Butter", "Sunflower oil", "Ghee", "Fish"], "ans": 2}, {"id": 12, "hi": "विटामिन D का प्राकृतिक स्त्रोत है-", "en": "The natural source of Vitamin D is -", "opts_hi": ["पानी", "हवा", "सूर्यप्रकाश", "मिट्टी"], "opts_en": ["Water", "Air", "Sunlight", "Soil"], "ans": 3}, {"id": 13, "hi": "केक और कुकीज बनाने के लिए......... प्रकार के खाना पकाने की विधि का उपयोग करते है।", "en": "Which cooking method is used for making cakes and cookies?", "opts_hi": ["बोइलिंग", "ग्रीलिंग", "बेकिंग", "स्टीविंग"], "opts_en": ["Boiling", "Grilling", "Baking", "Stewing"], "ans": 3}, {"id": 14, "hi": "प्रोटीन का सबसे समृद्ध स्त्रोत है", "en": "The richest source of protein is -", "opts_hi": ["दूध", "सोयाबीन", "तेल", "शर्करा"], "opts_en": ["Milk", "Soybean", "Oil", "Sugar"], "ans": 2}, {"id": 15, "hi": "निम्नलिखित में से, कौन सा स्वास्थ्य शिक्षा का सिद्धांत नहीं है?", "en": "Which of the following is not a principle of health education?", "opts_hi": ["विश्वसनीयता", "अभिरूचि", "सुदृढ़ीकरण", "पोषण"], "opts_en": ["Credibility", "Interest", "Reinforcement", "Nutrition"], "ans": 4}, {"id": 16, "hi": "संचार प्रक्रिया जहां रिसीवर सम्मिलित है, कहलाती है", "en": "The communication process in which the receiver is involved is called -", "opts_hi": ["वन वे कम्यूनिकेशन", "दु वे कम्यूनिकेशन", "निष्क्रिय संचार", "अशाब्दिक संचार"], "opts_en": ["One-way communication", "Two-way communication", "Passive communication", "Non-verbal communication"], "ans": 2}, {"id": 17, "hi": "सुनने में कठिनाई ......... प्रकार की संचार बाधा है।", "en": "Difficulty in hearing is which type of communication barrier?", "opts_hi": ["शारीरिक", "मनोवैज्ञानिक", "पर्यावरण", "सांस्कृतिक"], "opts_en": ["Physical", "Psychological", "Environmental", "Cultural"], "ans": 1}, {"id": 18, "hi": "गर्भाशय में माँ से गर्भस्थ शिशु में बीमारी कारक का प्रेषण- -- संचार है।", "en": "Transmission of disease agent from mother to foetus in uterus is -", "opts_hi": ["प्रत्यक्ष संपर्क", "अप्रत्यक्ष", "ट्रांसप्लेसेन्टल", "टीकाकरण"], "opts_en": ["Direct contact", "Indirect", "Transplacental", "Immunization"], "ans": 3}, {"id": 19, "hi": "अवधारणा जहाँ स्वास्थ्य को केवल बीमारी की अनुपस्थिति के रूप में देखा जाता है", "en": "The concept where health is viewed only as absence of disease is -", "opts_hi": ["जैव-चिकित्सा अवधारणा", "पारिस्थितिक अवधारणा", "मनोवैज्ञानिक अवधारणा", "धार्मिक अवधारणा"], "opts_en": ["Biomedical concept", "Ecological concept", "Psychological concept", "Religious concept"], "ans": 1}, {"id": 20, "hi": "मलेरिया, फाइलेरिया और प्लेग को जाना जाता है", "en": "Malaria, filariasis and plague are known as -", "opts_hi": ["जल जनित बीमारी", "रोगवाहक जनित बीमारी", "रक्त जनित बीमारी", "वायुवाहित बीमारी"], "opts_en": ["Water-borne diseases", "Vector-borne diseases", "Blood-borne diseases", "Air-borne diseases"], "ans": 2}, {"id": 21, "hi": "एक रेस्तरां के रसोईघर में होने वाले सार्वजनिक खाने के बर्तन और वस्तुओं से रोग कारक सूक्ष्मजीवों की सफाई को कहते है", "en": "Cleaning disease-causing microorganisms from public eating utensils and items in a restau किरण' का पर्यायवाची शब्द नहीं है", "en": "Which is not a synonym of 'किरण'?", "opts_hi": ["अंशु", "सरसिज", "मरीचि", "कर"], "opts_en": ["अंशु", "सरसिज", "मरीचि", "कर"], "ans": 2}, {"id": 97, "hi": "'तामसिक' का विलोम शब्द है", "en": "Antonym of 'तामसिक' is -", "opts_hi": ["तांत्रिक", "दैवीय", "राक्षसी", "सात्विक"], "opts_en": ["तांत्रिक", "दैवीय", "राक्षसी", "सात्विक"], "ans": 4}, {"id": 98, "hi": "जो कम बोलता है अनेक पद के लिए एक शब्द है", "en": "One word for 'जो कम बोलता है' is -", "opts_hi": ["कमबोला", "कमभाषी", "अल्पभाषी", "मृदुभाषी"], "opts_en": ["कमबोला", "कमभाषी", "अल्पभाषी", "मृदुभाषी"], "ans": 3}, {"id": 99, "hi": "'घूस देना' के लिए उचित मुहावरा है", "en": "The proper idiom for 'घूस देना' is -", "opts_hi": ["मुट्ठी गरम करना", "बाजार गर्म होना", "रंग जमाना", "फूलना फलना"], "opts_en": ["मुट्ठी गरम करना", "बाजार गर्म होना", "रंग जमाना", "फूलना फलना"], "ans": 1}, {"id": 100, "hi": "'पराजय' शब्द में कौनसा उपसर्ग लगा है?", "en": "Which prefix is used in 'पराजय'?", "opts_hi": ["पर", "परा", "पारा", "प"], "opts_en": ["पर", "परा", "पारा", "प"], "ans": 2}];let current=0;let lang=localStorage.getItem(TEST_ID+"_lang")||"hi";let answers=Array(questions.length).fill(null);let review=Array(questions.length).fill(false);let submitted=false;let totalSeconds=100*60;
function esc(s){return String(s??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll("\n","<br>")}
function getSubject(q){if(q.id<=50)return lang==="en"?"Public Health / Sanitation":"जनस्वास्थ्य / स्वच्छता"; if(q.id<=75)return lang==="en"?"Haryana GK":"हरियाणा GK"; if(q.id<=90)return lang==="en"?"GK / Reasoning / Maths":"GK / रीजनिंग / गणित"; return lang==="en"?"English / Hindi Language":"English / Hindi भाषा"}
function textFor(q){if(lang==="hi")return esc(q.hi);if(lang==="en")return esc(q.en);return `<div>${esc(q.hi)}</div><div class="en">${esc(q.en)}</div>`}
function optFor(q,i){if(lang==="hi")return esc(q.opts_hi[i]||"");if(lang==="en")return esc(q.opts_en[i]||"");return `<b>HI:</b> ${esc(q.opts_hi[i]||"")}<br><b>EN:</b> ${esc(q.opts_en[i]||"")}`}
function render(){const q=questions[current];document.getElementById("qCount").textContent=`Question ${current+1}/${questions.length}`;document.getElementById("subjectLabel").textContent=getSubject(q);document.getElementById("question").innerHTML=(current+1)+". "+textFor(q);const optDiv=document.getElementById("options");optDiv.innerHTML="";q.opts_hi.forEach((_,i)=>{const btn=document.createElement("button");btn.className="opt"+(answers[current]===i+1?" selected":"");btn.innerHTML=`(${i+1}) ${optFor(q,i)}`;btn.onclick=()=>{if(!submitted){answers[current]=i+1;saveState();render();}};optDiv.appendChild(btn);});renderPalette();updateLangButtons();}
function updateLangButtons(){["hi","en","bi"].forEach(x=>document.getElementById("btn-"+x).classList.toggle("active",lang===x));}function setLang(x){lang=x;localStorage.setItem(TEST_ID+"_lang",lang);render();}
function renderPalette(){const p=document.getElementById("palette");p.innerHTML="";questions.forEach((q,i)=>{const d=document.createElement("div");d.className="num"+(i===current?" active":"")+(answers[i]?" answered":"")+(review[i]?" review":"");d.textContent=i+1;d.onclick=()=>{current=i;saveState();render();};p.appendChild(d);});}
function prevQ(){if(current>0){current--;saveState();render();}}function saveNext(){if(current<questions.length-1){current++;saveState();render();}}function clearAns(){answers[current]=null;saveState();render();}function toggleReview(){review[current]=!review[current];saveState();render();}
function submitTest(){if(!confirm("Submit this test?"))return;submitted=true;let correct=0,wrong=0,attempted=0;questions.forEach((q,i)=>{if(answers[i]){attempted++;if(answers[i]===q.ans)correct++;else wrong++;}});const marks=correct-wrong*0.25;document.getElementById("testArea").style.display="none";document.getElementById("resultArea").style.display="block";document.getElementById("scoreBox").innerHTML=`<div class="score-box"><b>${attempted}</b>Attempted</div><div class="score-box"><b>${correct}</b>Correct</div><div class="score-box"><b>${wrong}</b>Wrong</div><div class="score-box"><b>${marks.toFixed(2)}</b>Score</div>`;saveHistory({date:new Date().toLocaleString(),attempted,correct,wrong,marks:marks.toFixed(2)});localStorage.removeItem(TEST_ID+"_state");loadHistory();}
function showReview(){let out="<h3>Answer Review</h3>";questions.forEach((q,i)=>{const status=!answers[i]?"Skipped":(answers[i]===q.ans?"Correct":"Wrong");out+=`<div class="review-card"><b>Q${i+1}.</b> ${textFor(q)}<br><span class="small">Your answer: ${answers[i]||"-"} | Correct answer: ${q.ans} | Status: ${status}</span></div>`;});document.getElementById("reviewArea").innerHTML=out;}
function restartTest(){if(!confirm("Restart this test?"))return;current=0;answers=Array(questions.length).fill(null);review=Array(questions.length).fill(false);totalSeconds=100*60;submitted=false;localStorage.removeItem(TEST_ID+"_state");document.getElementById("resultArea").style.display="none";document.getElementById("testArea").style.display="block";render();}
function tick(){if(submitted)return;let m=Math.floor(totalSeconds/60),s=totalSeconds%60;document.getElementById("timer").textContent=String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");if(totalSeconds<=0){submitted=true;alert("Time is over. Test will be submitted.");submitted=false;submitTest();}else totalSeconds--;saveState();}
function saveState(){localStorage.setItem(TEST_ID+"_state",JSON.stringify({current,answers,review,totalSeconds}));}function loadState(){const raw=localStorage.getItem(TEST_ID+"_state");if(raw){try{const st=JSON.parse(raw);current=st.current??0;answers=st.answers??answers;review=st.review??review;totalSeconds=st.totalSeconds??totalSeconds;}catch(e){}}}
function saveHistory(item){const key=TEST_ID+"_history";let h=JSON.parse(localStorage.getItem(key)||"[]");h.unshift(item);h=h.slice(0,10);localStorage.setItem(key,JSON.stringify(h));}function loadHistory(){const h=JSON.parse(localStorage.getItem(TEST_ID+"_history")||"[]");document.getElementById("history").innerHTML=h.length?h.map(x=>`<div class="history-item"><b>${x.date}</b><br>Score: ${x.marks} | Correct: ${x.correct} | Wrong: ${x.wrong}</div>`).join(""):"<p class='small'>No attempt yet.</p>";}
loadState();render();loadHistory();setInterval(tick,1000);
</script><style>
.underline-word{
  text-decoration: underline;
}
</style>

<script>
(function(){
  questions.forEach(function(q){
    if(q.id === 93){
      q.hi = q.hi.replaceAll("runthrough", "<span class='underline-word'>runthrough</span>");
      q.en = q.en.replaceAll("run through", "<span class='underline-word'>run through</span>");
      q.en = q.en.replaceAll("runthrough", "<span class='underline-word'>runthrough</span>");
    }
  });

  const oldTextFor = textFor;
  textFor = function(q){
    if(q.id === 93){
      if(lang === "hi") return q.hi;
      if(lang === "en") return q.en;
      return `<div>${q.hi}</div><div class="en">${q.en}</div>`;
    }
    return oldTextFor(q);
  };

  render();
})();
</script></body></html>

<script>
const TEST_ID="hssc<sub>2</sub>017<sub>2</sub>4nov_sanitary_inspector_evening_bilingual<sub>1</sub>00_v1";
const questions=[{"id": 1, "hi": "कोशिकाएँ जो रक्त के जमने की प्रक्रिया में मदद करती है", "en": "Cells that help in the process of blood clotting are -", "opts_hi": ["मोनोसाइट्स", "लिम्फोसाइट्स", "थ्रोम्बोसाइट्स", "इरिथ्रोसाइट्स"], "opts_en": ["Monocytes", "Lymphocytes", "Thrombocytes", "Erythrocytes"], "ans": 3}, {"id": 2, "hi": "क्क्रेनियल तंत्रिका जो कान को पहुँचती है", "en": "The cranial nerve that reaches the ear is -", "opts_hi": ["चौथी", "छठी", "आठवी", "दसवीं"], "opts_en": ["Fourth", "Sixth", "Eighth", "Tenth"], "ans": 3}, {"id": 3, "hi": "मानव में सामान्य टाइडल वोल्यूम (ज्वारीय जल) है।", "en": "Normal tidal volume in humans is -", "opts_hi": ["250 मिली", "500 मिली", "750 मिली", "1000 मिली"], "opts_en": ["250 ml", "500 ml", "750 ml", "1000 ml"], "ans": 2}, {"id": 4, "hi": "जोखिमकारक अपशिष्ट की निम्न एक के सिवाय निम्नलिखित विशेषताएँ है", "en": "Hazardous waste has the following characteristics, except -", "opts_hi": ["संक्रामक एजेंट शामिल है", "विषाक्त शामिल है", "तीक्ष्ण वस्तुएँ शामिल है", "यह रेडियो सक्रिय नहीं है।"], "opts_en": ["Contains infectious agents", "Contains toxic substances", "Contains sharp objects", "It is not radioactive"], "ans": 4}, {"id": 5, "hi": "मानव ऊतक या तरल पदार्थ युक्त स्वास्थ्य देखभाल अपशिष्ट है", "en": "Health-care waste containing human tissue or fluids is -", "opts_hi": ["पेथेलोजिकल वेस्ट", "जीनोटोक्सिक वेस्ट", "संक्रामक अपशिष्ट", "रासायनिक अपशिष्ट"], "opts_en": ["Pathological waste", "Genotoxic waste", "Infectious waste", "Chemical waste"], "ans": 1}, {"id": 6, "hi": "उच्च जोखिम किससे जाना जा सकता है", "en": "High risk can be identified by -", "opts_hi": ["ऐन्टीनेटल केयर", "इंट्रानेटल केयर", "पोस्टनेटल केयर", "न्यू बोर्न केयर"], "opts_en": ["Antenatal care", "Intranatal care", "Postnatal care", "Newborn care"], "ans": 1}, {"id": 7, "hi": "प्रसव के तीसरे चरण में माता की क्या परेशानियां है ?", "en": "What maternal complication can occur in the third stage of labour?", "opts_hi": ["भ्रूण संकट", "लंबे समय का प्रसव", "ग्रीवा का फटना", "पोस्ट पार्टम हेमरेज"], "opts_en": ["Foetal distress", "Prolonged labour", "Cervical tear", "Postpartum haemorrhage"], "ans": 4}, {"id": 8, "hi": "स्तन के पहले दूध का नाम है-", "en": "The first milk of breast is called -", "opts_hi": ["हाइन्ड दूध", "फोर मिल्क", "कोलोस्ट्रम", "संक्रमणिक दूध"], "opts_en": ["Hind milk", "Fore milk", "Colostrum", "Transitional milk"], "ans": 3}, {"id": 9, "hi": "प्रोटीन के निर्माण खंड हैं", "en": "Building blocks of proteins are -", "opts_hi": ["सैकैराइड्स", "फैटी एसिड", "कार्बन", "एमिनो एसिड"], "opts_en": ["Saccharides", "Fatty acids", "Carbon", "Amino acids"], "ans": 4}, {"id": 10, "hi": "1 ग्राम वसा से आपूर्ति की गई ऊर्जा है", "en": "Energy supplied by 1 gram of fat is -", "opts_hi": ["4 कैलोरी", "9 कैलोरी", "12 कैलोरी", "15 कैलोरी"], "opts_en": ["4 calories", "9 calories", "12 calories", "15 calories"], "ans": 2}, {"id": 11, "hi": "कार्बोहाइड्रेस का मुख्य स्त्रोत है", "en": "The main source of carbohydrates is -", "opts_hi": ["स्टार्च", "दूध", "दालें", "मक्खन"], "opts_en": ["Starch", "Milk", "Pulses", "Butter"], "ans": 1}, {"id": 12, "hi": "संचार प्रक्रिया में संदेश भेजने वाला व्यक्ति कहलाता है-", "en": "In communication process, the person who sends the message is called -", "opts_hi": ["संचारक", "रिसीवर", "संदेश", "प्रतिक्रिया"], "opts_en": ["Communicator", "Receiver", "Message", "Feedback"], "ans": 1}, {"id": 13, "hi": "बिमारी की प्राथमिक रोकथाम में सबसे व्यापक रूप से इस्तेमाल किया जाने वाला इन्टरवेन्शन है", "en": "The most widely used intervention in primary prevention of disease is -", "opts_hi": ["पर्याप्त उपचार", "स्क्रीनिंग", "इम्युनाइजेशन", "पुनर्वास"], "opts_en": ["Adequate treatment", "Screening", "Immunization", "Rehabilitation"], "ans": 3}, {"id": 14, "hi": "सामान्य प्रत्याशा से अधिक एक समुदाय में बीमारी के प्रकोप को कहा जाता है", "en": "Occurrence of disease in a community more than normal expectancy is called -", "opts_hi": ["ऐपिडेमिक", "ऐन्डेमिक", "स्पोराडिक", "पैन्डेमिक"], "opts_en": ["Epidemic", "Endemic", "Spor  "इग्लू", "राफ्ट", "याचट्"], "opts_en": ["Canoe", "Igloo", "Raft", "Yacht"], "ans": 2}, {"id": 83, "hi": "सादृश्यता पूर्ण कीजिए- सूई : धागा :: पेन : ?", "en": "Complete the analogy: Needle : Thread :: Pen : ?", "opts_hi": ["स्याही", "टोपी", "कागज", "शब्द"], "opts_en": ["Ink", "Cap", "Paper", "Word"], "ans": 1}, {"id": 84, "hi": "निम्न में से कौनसी संख्या के विभाजकों की संख्या अधिकतम है?", "en": "Which of the following numbers has the maximum number of divisors?", "opts_hi": ["101", "99", "182", "176"], "opts_en": ["101", "99", "182", "176"], "ans": 4}, {"id": 85, "hi": "एक फर्नीचर शो-रूम में मूल कीमत 300% मुनाफा होता है। यदि कीमत 50% बढ़ती है तो भी बिक्री कीमत अचल रहती है। लगभग बिक्री कीमत का कितना प्रतिशत मुनाफा होता होगा ?", "en": "In a furniture showroom, original price has 300% profit. If cost price rises by 50% but selling price remains unchanged, approximately what percentage of selling price is profit?", "opts_hi": ["50%", "62.5%", "65%", "55.5%"], "opts_en": ["50%", "62.5%", "65%", "55.5%"], "ans": 2}, {"id": 86, "hi": "धारा की दिशा में चलने वाली नाव दों घंटे में 30 कि.मी. की दूरी तय करती है। जबकि वही दूरी धारा के विपरीत तय करने में 4 घंटे लगते है। तो शांत पानी में नाव की गति क्या है ?", "en": "A boat travelling downstream covers 30 km in 2 hours, while the same distance upstream takes 4 hours. What is the speed of the boat in still water?", "opts_hi": ["15 किमी/घंटा", "11.25 कि.मी./घंटा", "7.2 कि.मी./घंटा", "इनमें से कोई नहीं"], "opts_en": ["15 km/h", "11.25 km/h", "7.2 km/h", "None of these"], "ans": 2}, {"id": 87, "hi": "न्यूनतम संख्या जिसे जब 20, 25, 35 और 40 से विभाजित किया जाता है 14, 19, 29 और 34 क्रमशः शेष है-", "en": "The least number which when divided by 20, 25, 35 and 40 leaves remainders 14, 19, 29 and 34 respectively is -", "opts_hi": ["1350", "1394", "1396", "1402"], "opts_en": ["1350", "1394", "1396", "1402"], "ans": 2}, {"id": 88, "hi": "बोयलर के लिए इस्तेमाल किया जाने वाला पानी का pH मान लगभग कितना होना चाहिए।", "en": "What should be approximate pH value of water used for boiler?", "opts_hi": ["7", "10.5", "3.2", "11.8"], "opts_en": ["7", "10.5", "3.2", "11.8"], "ans": 1}, {"id": 89, "hi": "एक उत्तल लेंस का प्रयोग करते हुए वास्तविक उल्टे बढ़े हुए छवि को प्राप्त करने के लिए वस्तु को कहाँ रखा जाना चाहिए।", "en": "To obtain a real, inverted and magnified image using a convex lens, where should the object be placed?", "opts_hi": ["O और F के बीच में", "फॉक्स पर", "F और 2F के बीच में", "2F से आगे"], "opts_en": ["Between O and F", "At focus", "Between F and 2F", "Beyond 2F"], "ans": 3}, {"id": 90, "hi": "प्रकाश संश्लेषण की क्रिया कहाँ जल्दी होती है ?", "en": "In which light does photosynthesis occur faster?", "opts_hi": ["पीले प्रकाश में", "सफेद प्रकाश में", "लाल प्रकाश में", "अंधेरे में"], "opts_en": ["Yellow light", "White light", "Red light", "In dark"], "ans": 3}, {"id": 91, "hi": "Select the work from the following that is most similar in meaning to the given word: EMBOLDEN", "en": "Select the word most similar in meaning to EMBOLDEN.", "opts_hi": ["Passion", "Correct", "Hearten", "Fairness"], "opts_en": ["Passion", "Correct", "Hearten", "Fairness"], "ans": 3}, {"id": 92, "hi": "Select the word from the following that is opposite in meaning to the give word: ABSTRACT", "en": "Select the word opposite in meaning to ABSTRACT.", "opts_hi": ["Carless", "Ugly", "Concreate", "Sharp"], "opts_en": ["Carless", "Ugly", "Concreate", "Sharp"], "ans": 3}, {"id": 93, "hi": "In the following questions four alternatives are given for the idiom/pharse bold in the sentence. Kashmir is an apple of disord between india and pakistan.", "en": "Choose the meaning of the idiom/phrase: Kashmir is an apple of discord between India and Pakistan.", "opts_hi": ["Abound", "Bird's eye", "Full of apples", "Bone of contention"], "opts_en": ["Abound", "Bird's eye", "Full of apples", "Bone of contention"], "ans": 4}, {"id": 94, "hi": "Give one word substitute for the following expression: Living on flesh of other animals", "en": "One word substitute: Living on flesh of other animals", "opts_hi": ["Astrologer", "Coward", "Carnivorous", "Catalogue"], "opts_en": ["Astrologer", "Coward", "Carnivorous", "Catalogue"], "ans": 3}, {"id": 95, "hi": "Supply suitable article in the following blank if needed: I saw a boy ....... boy was weeping.", "en": "Supply suitable article: I saw a boy ....... boy was weeping.", "opts_hi": ["a", "an", "the", "no artile"], "opts_en": ["a", "an", "the", "no article"], "ans": 3}, {"id": 96, "hi": "'रात्रि' शब्द का पर्यायवाची शब्द है-", "en": "Synonym of 'रात्रि' is -", "opts_hi": ["विभावरी, रजनी", "चंचला, तड़ित", "दिवाकर, सूर्य", "सागर, जलधि"], "opts_en": ["विभावरी, रजनी", "चंचला, तड़ित", "दिवाकर, सूर्य", "सागर, जलधि"], "ans": 1}, {"id": 97, "hi": "अमावस्या का विलोम शब्द है", "en": "Antonym of 'अमावस्या' is -", "opts_hi": ["पूर्णिमा", "तृतीया", "प्रकाश", "एकादशी"], "opts_en": ["पूर्णिमा", "तृतीया", "प्रकाश", "एकादशी"], "ans": 1}, {"id": 98, "hi": "जिसके समान दूसरा नहीं है अनेक पद के लिए शब्द है-", "en": "One word for 'जिसके समान दूसरा नहीं है' is -", "opts_hi": ["अनुपम", "अद्वितीय", "दृविज", "अमर"], "opts_en": ["अनुपम", "अद्वितीय", "दृविज", "अमर"], "ans": 2}, {"id": 99, "hi": "'उड़ती चिड़िया पहचानना' मुहावरे का अर्थ है", "en": "Meaning of idiom 'उड़ती चिड़िया पहचानना' is -", "opts_hi": ["चिड़िया के पंख गिनना", "चिड़िया उड़ाना", "चिड़िया पकड़ना", "मन की बात जानना"], "opts_en": ["चिड़िया के पंख गिनना", "चिड़िया उड़ाना", "चिड़िया पकड़ना", "मन की बात जानना"], "ans": 4}, {"id": 100, "hi": "अभ्यागत शब्द में कौन सा उपसर्ग लगा है?", "en": "Which prefix is used in 'अभ्यागत'?", "opts_hi": ["अ", "अभ", "अभी", "अभि"], "opts_en": ["अ", "अभ", "अभी", "अभि"], "ans": 4}];let current=0;let lang=localStorage.getItem(TEST_ID+"_lang")||"hi";let answers=Array(questions.length).fill(null);let review=Array(questions.length).fill(false);let submitted=false;let totalSeconds=100*60;
function esc(s){return String(s??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll("\n","<br>")}
function getSubject(q){if(q.id<=50)return lang==="en"?"Public Health / Sanitation":"जनस्वास्थ्य / स्वच्छता"; if(q.id<=75)return lang==="en"?"Haryana GK":"हरियाणा GK"; if(q.id<=90)return lang==="en"?"GK / Reasoning / Maths":"GK / रीजनिंग / गणित"; return lang==="en"?"English / Hindi Language":"English / Hindi भाषा"}
function textFor(q){if(lang==="hi")return esc(q.hi);if(lang==="en")return esc(q.en);return `<div><span class="math">{esc(q.hi)}</div><div class="en"></span>{esc(q.en)}</div>`}
function optFor(q,i){if(lang==="hi")return esc(q.opts_hi[i]||"");if(lang==="en")return esc(q.opts_en[i]||"");return `<b>HI:</b> <span class="math">{esc(q.opts_hi[i]||"")}<br><b>EN:</b> </span>{esc(q.opts_en[i]||"")}`}
function render(){const q=questions[current];document.getElementById("qCount").textContent=`Question <span class="math">{current+1}/</span>{questions.length}`;document.getElementById("subjectLabel").textContent=getSubject(q);document.getElementById("question").innerHTML=(current+1)+". "+textFor(q);const optDiv=document.getElementById("options");optDiv.innerHTML="";q.opts_hi.forEach((_,i)=>{const btn=document.createElement("button");btn.className="opt"+(answers[current]===i+1?" selected":"");btn.innerHTML=`(<span class="math">{i+1}) </span>{optFor(q,i)}`;btn.onclick=()=>{if(!submitted){answers[current]=i+1;saveState();render();}};optDiv.appendChild(btn);});renderPalette();updateLangButtons();}
function updateLangButtons(){["hi","en","bi"].forEach(x=>document.getElementById("btn-"+x).classList.toggle("active",lang===x));}function setLang(x){lang=x;localStorage.setItem(TEST_ID+"_lang",lang);render();}
function renderPalette(){const p=document.getElementById("palette");p.innerHTML="";questions.forEach((q,i)=>{const d=document.createElement("div");d.className="num"+(i===current?" active":"")+(answers[i]?" answered":"")+(review[i]?" review":"");d.textContent=i+1;d.onclick=()=>{current=i;saveState();render();};p.appendChild(d);});}
function prevQ(){if(current>0){current--;saveState();render();}}function saveNext(){if(current<questions.length-1){current++;saveState();render();}}function clearAns(){answers[current]=null;saveState();render();}function toggleReview(){review[current]=!review[current];saveState();render();}
function submitTest(){if(!confirm("Submit this test?"))return;submitted=true;let correct=0,wrong=0,attempted=0;questions.forEach((q,i)=>{if(answers[i]){attempted++;if(answers[i]===q.ans)correct++;else wrong++;}});const marks=correct-wrong*0.25;document.getElementById("testArea").style.display="none";document.getElementById("resultArea").style.display="block";document.getElementById("scoreBox").innerHTML=`<div class="score-box"><b><span class="math">{attempted}</b>Attempted</div><div class="score-box"><b></span>{correct}</b>Correct</div><div class="score-box"><b><span class="math">{wrong}</b>Wrong</div><div class="score-box"><b></span>{marks.toFixed(2)}</b>Score</div>`;saveHistory({date:new Date().toLocaleString(),attempted,correct,wrong,marks:marks.toFixed(2)});localStorage.removeItem(TEST_ID+"_state");loadHistory();}
function showReview(){let out="<h3>Answer Review</h3>";questions.forEach((q,i)=>{const status=!answers[i]?"Skipped":(answers[i]===q.ans?"Correct":"Wrong");out+=`<div class="review-card"><b>Q<span class="math">{i+1}.</b> </span>{textFor(q)}<br><span class="small">Your answer: <span class="math">{answers[i]||"-"} | Correct answer: </span>{q.ans} | Status: <span class="math">{status}</span></div>`;});document.getElementById("reviewArea").innerHTML=out;}
function restartTest(){if(!confirm("Restart this test?"))return;current=0;answers=Array(questions.length).fill(null);review=Array(questions.length).fill(false);totalSeconds=100*60;submitted=false;localStorage.removeItem(TEST_ID+"_state");document.getElementById("resultArea").style.display="none";document.getElementById("testArea").style.display="block";render();}
function tick(){if(submitted)return;let m=Math.floor(totalSeconds/60),s=totalSeconds%60;document.getElementById("timer").textContent=String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");if(totalSeconds<=0){submitted=true;alert("Time is over. Test will be submitted.");submitted=false;submitTest();}else totalSeconds--;saveState();}
function saveState(){localStorage.setItem(TEST_ID+"_state",JSON.stringify({current,answers,review,totalSeconds}));}function loadState(){const raw=localStorage.getItem(TEST_ID+"_state");if(raw){try{const st=JSON.parse(raw);current=st.current??0;answers=st.answers??answers;review=st.review??review;totalSeconds=st.totalSeconds??totalSeconds;}catch(e){}}}
function saveHistory(item){const key=TEST_ID+"_history";let h=JSON.parse(localStorage.getItem(key)||"[]");h.unshift(item);h=h.slice(0,10);localStorage.setItem(key,JSON.stringify(h));}function loadHistory(){const h=JSON.parse(localStorage.getItem(TEST_ID+"_history")||"[]");document.getElementById("history").innerHTML=h.length?h.map(x=>`<div class="history-item"><b></span>{x.date}</b><br>Score: <span class="math">{x.marks} | Correct: </span>{x.correct} | Wrong: ${x.wrong}</div>`).join(""):"<p class='small'>No attempt yet.</p>";}
loadState();render();loadHistory();setInterval(tick,1000);
</script></body><script src="result-saver.js"></script></html>

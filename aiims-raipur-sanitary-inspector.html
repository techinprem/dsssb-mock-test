<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIIMS Raipur Sanitary Inspector Grade-II Bilingual Mock Test</title>
<style>
:root {
  --primary:#0f4c81; --primary2:#0b3a63; --bg:#eef2f7; --card:#ffffff; --text:#111827;
  --muted:#64748b; --border:#d6dde8; --right:#15803d; --wrong:#b91c1c; --review:#f59e0b;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,"Noto Sans Devanagari",Mangal,sans-serif;background:var(--bg);color:var(--text)}
.exam-header{background:#153e75;color:white;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;position:sticky;top:0;z-index:20}
.exam-title{font-size:17px;font-weight:800}
.langbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.langbtn{background:#fff;color:#153e75;border:1px solid #fff;border-radius:5px;padding:8px 12px;font-weight:800;cursor:pointer}
.langbtn.active{background:#ffe082;color:#111827}
.container{max-width:1250px;margin:0 auto;padding:14px;display:grid;grid-template-columns:1fr 315px;gap:14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:0 1px 8px rgba(0,0,0,.08)}
.main-card{padding:0}
.qtop{display:flex;justify-content:space-between;align-items:center;gap:10px;background:#f8fafc;border-bottom:1px solid var(--border);padding:12px 14px}
.qno{font-weight:900;color:#0f4c81}
.timer{font-size:18px;font-weight:900;color:#b91c1c;background:#fff;border:1px solid var(--border);border-radius:6px;padding:7px 10px}
.qbody{padding:18px}
.subject{font-size:13px;font-weight:800;color:#475569;margin-bottom:8px;text-transform:uppercase}
.qtext{font-size:19px;line-height:1.65;font-weight:800;white-space:pre-line;margin-bottom:14px}
.qtext .en{font-weight:700;color:#374151;border-top:1px dashed #cbd5e1;margin-top:10px;padding-top:10px}
.opt{width:100%;display:block;text-align:left;background:#fff;border:1px solid var(--border);border-radius:8px;padding:12px 13px;margin:10px 0;cursor:pointer;font-size:16px;line-height:1.5;white-space:normal}
.opt:hover{background:#f8fafc}
.opt.selected{border:2px solid var(--primary);background:#e6f0ff}
.opt.correct{border:2px solid var(--right);background:#dcfce7}
.opt.wrong{border:2px solid var(--wrong);background:#fee2e2}
.controls{padding:14px;border-top:1px solid var(--border);display:flex;gap:10px;flex-wrap:wrap;justify-content:space-between}
.left-controls,.right-controls{display:flex;gap:10px;flex-wrap:wrap}
button{border:none;border-radius:7px;padding:10px 14px;font-weight:800;cursor:pointer}
.primary{background:var(--primary);color:#fff}
.primary:hover{background:var(--primary2)}
.secondary{background:#e5e7eb;color:#111827}
.warn{background:#f59e0b;color:#111827}
.danger{background:#dc2626;color:#fff}
.side{padding:13px;height:max-content;position:sticky;top:62px}
.side h3{margin:8px 0 10px 0}
.palette{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
.num{padding:8px 0;border-radius:5px;text-align:center;font-weight:800;cursor:pointer;background:#e5e7eb;border:1px solid #cbd5e1}
.num.active{outline:3px solid #0f4c81}
.num.answered{background:#93c5fd}
.num.review{background:#fde68a}
.num.answered.review{background:linear-gradient(135deg,#93c5fd 50%,#fde68a 50%)}
.legend{font-size:13px;color:#475569;display:grid;gap:4px;margin-top:12px}
.dot{display:inline-block;width:13px;height:13px;border-radius:3px;margin-right:5px;vertical-align:-2px;border:1px solid #cbd5e1}
.result{display:none;padding:18px}
.score-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:10px 0}
.score-box{background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.score-box b{display:block;font-size:23px;color:#0f4c81}
.review-card{border:1px solid var(--border);border-radius:8px;padding:12px;margin:10px 0;background:#fff}
.small{font-size:12px;color:#64748b}
.history-item{font-size:13px;border-bottom:1px solid #e5e7eb;padding:7px 0}
@media(max-width:850px){
  .container{grid-template-columns:1fr}
  .side{position:static}
  .exam-header{align-items:flex-start;flex-direction:column}
  .qtext{font-size:17px}
  .score-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div class="exam-header">
  <div class="exam-title">AIIMS Raipur — Sanitary Inspector Grade-II Mock Test</div>
  <div class="langbar">
    <span style="font-weight:700">Language:</span>
    <button class="langbtn active" id="btn-hi" onclick="setLang('hi')">Hindi</button>
    <button class="langbtn" id="btn-en" onclick="setLang('en')">English</button>
    <button class="langbtn" id="btn-bi" onclick="setLang('bi')">Bilingual</button>
  </div>
</div>
<div class="container">
  <main class="card main-card">
    <section id="testArea">
      <div class="qtop">
        <div>
          <div class="qno" id="qCount">Question 1/100</div>
          <div class="small">Marking: +1 for correct, -0.25 for wrong</div>
        </div>
        <div class="timer" id="timer">90:00</div>
      </div>
      <div class="qbody">
        <div class="subject" id="subjectLabel">Subject</div>
        <div class="qtext" id="question"></div>
        <div id="options"></div>
      </div>
      <div class="controls">
        <div class="left-controls">
          <button class="secondary" onclick="prevQ()">Previous</button>
          <button class="secondary" onclick="clearAns()">Clear Response</button>
          <button class="warn" onclick="toggleReview()">Mark for Review</button>
        </div>
        <div class="right-controls">
          <button class="primary" onclick="saveNext()">Save & Next</button>
          <button class="danger" onclick="submitTest()">Submit</button>
        </div>
      </div>
    </section>
    <section id="resultArea" class="result">
      <h2>Result</h2>
      <div id="scoreBox" class="score-grid"></div>
      <button class="primary" onclick="showReview()">Show Answer Review</button>
      <button class="secondary" onclick="restartTest()">Restart Test</button>
      <div id="reviewArea"></div>
    </section>
  </main>
  <aside class="card side">
    <h3>Question Palette</h3>
    <div class="palette" id="palette"></div>
    <div class="legend">
      <div><span class="dot" style="background:#93c5fd"></span>Answered</div>
      <div><span class="dot" style="background:#fde68a"></span>Marked for Review</div>
      <div><span class="dot" style="background:#e5e7eb"></span>Not Answered</div>
    </div>
    <hr>
    <h3>Attempt History</h3>
    <div class="small">Only this test history will show here.</div>
    <div id="history"></div>
  </aside>
</div>

<script>
const TEST_ID = "aiims_raipur_sanitary_inspector_grade2_bilingual_v2";
const questions = [{"id": 1, "hi": "निम्नलिखित में से कौनसा कचरा जैवनिम्नीकरणीय (बायोडिग्रेडेबल) है -", "en": "Which of the following waste is biodegradable?", "opts_hi": ["सिंथेटिक फाइबर", "पॉलिथीन बैग", "खाना बर्बाद", "कागज"], "opts_en": ["Synthetic fibre", "Polythene bag", "Food waste", "Paper"], "ans": 3}, {"id": 2, "hi": "एनजीओ भारत में पानी की गुणवत्ता में सुधार करने के लिए निम्नलिखित भूमिकाओं में से कौनसी भूमिका निभाते हैं -", "en": "Which of the following roles do NGOs play in improving water quality in India?", "opts_hi": ["कानूनों के लिए रक्षक (संरक्षक) के रूप में कार्य करें।", "पानी की गुणवत्ता मानकों को निर्दिष्ट करें।", "पानी की गुणवत्ता से संबंधित मानकों का निष्पादन", "इनमें से कोई नहीं"], "opts_en": ["Act as guardians/protectors for laws", "Specify water quality standards", "Implement standards related to water quality", "None of these"], "ans": 4}, {"id": 3, "hi": "जल स्तर की गुणवत्ता सुनिश्चित करने के लिए केन्द्र सरकार निम्नलिखित में से कौनसी भूमिका निभाती है -", "en": "Which of the following roles does the Central Government play to ensure water quality?", "opts_hi": ["पानी की गुणवत्ता के मानकों का सुझाव", "पानी की गुणवत्ता सुनिश्चित करने के कानूनों का निर्माण", "पानी की गुणवत्ता के मानकों के उल्लंघन की जाँच करें।", "इनमें से कोई नहीं"], "opts_en": ["Suggest water quality standards", "Make laws to ensure water quality", "Check violation of water quality standards", "None of these"], "ans": 2}, {"id": 4, "hi": "निम्नलिखित में से कौनसे पेय जल के स्रोत हैं -", "en": "Which of the following are sources of drinking water?", "opts_hi": ["तालाब", "नदी", "कुआँ", "उपरोक्त सभी"], "opts_en": ["Pond", "River", "Well", "All of the above"], "ans": 4}, {"id": 5, "hi": "निम्न रासायनिक यौगिक में से कौनसा लार्वा मारने के लिए प्रयोग किया जाता है -", "en": "Which of the following chemical compounds is used to kill larvae?", "opts_hi": ["पेंटेन", "मेथोप्रेन", "नेओप्रिन", "क्लोरोम्फिनोल"], "opts_en": ["Pentane", "Methoprene", "Neoprene", "Chloromphenol"], "ans": 2}, {"id": 6, "hi": "निम्न में से कौनसा अपशिष्ट जल उपचार संयंत्र में पहला चरण होता है -", "en": "Which of the following is the first stage in a wastewater treatment plant?", "opts_hi": ["मैल और कीचड़ अलग करना", "जैविक कीचड़ का एनरोबिक अपघटन", "बड़े मलबे की स्क्रीनिंग", "क्लोरीन उपचार"], "opts_en": ["Separation of filth and sludge", "Anaerobic decomposition of biological sludge", "Screening of large debris", "Chlorine treatment"], "ans": 4}, {"id": 7, "hi": "निम्न में से कौनसा तलछट के लिए सत्य है -", "en": "Which of the following is true for sediment?", "opts_hi": ["पानी में डूबे मिट्टी और कंकड़ होते हैं।", "रेत और चट्टान पानी से वाहक नहीं है।", "कार्बनिक पानी में तैरते ठोस", "पानी में तैरते तेल और ग्रीस"], "opts_en": ["It contains soil and pebbles settled in water", "Sand and rock are not carried by water", "Organic floating solids in water", "Floating oil and grease in water"], "ans": 1}, {"id": 8, "hi": "अपशिष्ट जल उपचार संयंत्र में अपशिष्ट और पानी को अलग करने के लिए निम्नलिखित में से कौनसा सत्य है -", "en": "Which of the following is true for separating waste and water in a wastewater treatment plant?", "opts_hi": ["घुले हुए ठोस हटाने", "कीचड़ अपशिष्ट जल से अलग", "क्लोरीन उपचार", "इनमें से कोई नहीं"], "opts_en": ["Removing dissolved solids", "Separating sludge from wastewater", "Chlorine treatment", "None of these"], "ans": 2}, {"id": 9, "hi": "ओजोन परत के लिए निम्नलिखित में से कौनसा सत्य है -", "en": "Which of the following is true about the ozone layer?", "opts_hi": ["पौधों को हरा रंग प्रदान करता है।", "भूमि के जानवरों द्वारा श्वास लेने के लिए आवश्यक", "यूवी किरणों से जीवित जीवों की सुरक्षा करता है।", "इनमें से कोई नहीं"], "opts_en": ["It gives green colour to plants", "It is necessary for land animals to breathe", "It protects living organisms from UV rays", "None of these"], "ans": 3}, {"id": 10, "hi": "शौचालय से सेप्टिक टैंक की न्यूनतम दूरी निम्न में से कौनसी है -", "en": "What is the minimum distance between a toilet and a septic tank?", "opts_hi": ["10 फीट", "8 फीट", "4 फीट", "5 फीट"], "opts_en": ["10 feet", "8 feet", "4 feet", "5 feet"], "ans": 4}, {"id": 11, "hi": "निम्नलिखित में से कौनसा ओडीएफ का उचित पूर्ण रूप है -", "en": "What is the correct full form of ODF?", "opts_hi": ["आउट डंपिंग मुक्त", "अधिक डंपिंग से मुक्त", "खुली डंपिंग मुक्त", "खुले शौच मुक्त"], "opts_en": ["Out Dumping Free", "Free from Excess Dumping", "Open Dumping Free", "Open Defecation Free"], "ans": 4}, {"id": 12, "hi": "निम्न में से कौनसा समुद्री जल प्रदूषण में सबसे अधिक जहरीला है -", "en": "Which of the following is most toxic in marine water pollution?", "opts_hi": ["औद्योगिक प्रदूषण", "प्लास्टिक अपशिष्ट", "घरेलू कचरा", "तेल का रिसाव"], "opts_en": ["Industrial pollution", "Plastic waste", "Domestic waste", "Oil spill"], "ans": 4}, {"id": 13, "hi": "निम्नलिखित में से कौनसा मल का दूसरा नाम है -", "en": "Which of the following is another name for faeces?", "opts_hi": ["मलत्याग", "मूत्र", "खाद", "कीचड़"], "opts_en": ["Defecation", "Urine", "Manure", "Sludge"], "ans": 1}, {"id": 14, "hi": "निम्नलिखित में से कौनसा जैविकवर्धन (बायोमैग्नीफिकेशन) का प्रमुख कारण है -", "en": "Which of the following is the main cause of biomagnification?", "opts_hi": ["औद्योगिक कूड़ा", "डिटर्जेंट", "कीटनाशकों", "इनमें से कोई नहीं"], "opts_en": ["Industrial waste", "Detergent", "Pesticides", "None of these"], "ans": 1}, {"id": 15, "hi": "निम्नलिखित में से कौनसा शैवाल के फैलने का प्रमुख कारण है -", "en": "Which of the following is the main cause of algal bloom?", "opts_hi": ["भारी धातुओं", "उर्वरक", "रोगजनकों", "मृदा अपरदन"], "opts_en": ["Heavy metals", "Fertilizers", "Pathogens", "Soil erosion"], "ans": 2}, {"id": 16, "hi": "निम्न में से कौनसा सहायक उपचार में प्रयोग किया जाता है -", "en": "Which of the following is used in secondary treatment?", "opts_hi": ["निस्पंदन", "सूक्ष्मजीव", "रसायन", "इनमें से कोई नहीं"], "opts_en": ["Filtration", "Microorganisms", "Chemicals", "None of these"], "ans": 2}, {"id": 17, "hi": "प्रदूषित जल निकाय में शैवालों की अत्यधिक वृद्धि के लिए प्रयुक्त होने वाला शब्द इनमें से क्या है -", "en": "Which term is used for excessive growth of algae in a polluted water body?", "opts_hi": ["वैश्वीकरण", "नाइट्रीकरण", "सुपोषण", "इनमें से कोई नहीं"], "opts_en": ["Globalisation", "Nitrification", "Eutrophication", "None of these"], "ans": 3}, {"id": 18, "hi": "निम्न में से कौनसा जल प्रदूषण का द्योतक है -", "en": "Which of the following is an indicator of water pollution?", "opts_hi": ["बीओडी", "पीएच", "सुपोषण", "खारापन"], "opts_en": ["BOD", "pH", "Eutrophication", "Salinity"], "ans": 1}, {"id": 19, "hi": "निम्नलिखित में से कौनसा ISWM का पूरा रूप है -", "en": "What is the full form of ISWM?", "opts_hi": ["आंतरिक बीमार अपशिष्ट प्रबंधन", "एकीकृत ठोस अपशिष्ट प्रबंधन", "एकीकृत बीमार अपशिष्ट प्रबंधन", "एकीकृत स्वच्छता अपशिष्ट प्रबंधन"], "opts_en": ["Internal Sick Waste Management", "Integrated Solid Waste Management", "Integrated Sick Waste Management", "Integrated Sanitation Waste Management"], "ans": 2}, {"id": 20, "hi": "निम्नलिखित में से कौनसा SLF का पूरा रूप है -", "en": "What is the full form of SLF?", "opts_hi": ["सेनेटरी लोडफिल", "सेनेटरी लेस फिल", "सेनेटरी लैंडफिल", "इनमें से कोई नहीं"], "opts_en": ["Sanitary Loadfill", "Sanitary Less Fill", "Sanitary Landfill", "None of these"], "ans": 3}, {"id": 21, "hi": "निम्न में से कौनसा जलमार्ग में आमतौर पर पाया जाने वाला कचरा है -", "en": "Which of the following waste is commonly found in waterways?", "opts_hi": ["प्लास्टिक की थैली", "प्लास्टिक की बोतलें", "कागज अपशिष्ट", "उपरोक्त सभी विकल्प"], "opts_en": ["Plastic bags", "Plastic bottles", "Paper waste", "All of the above"], "ans": 4}, {"id": 22, "hi": "निम्न में से पीने के पानी में लेड का स्वीकार्य स्तर कितना है -", "en": "What is the acceptable level of lead in drinking water?", "opts_hi": ["0.01 mg/L", "0.9 mg/L", "0.001 mg/L", "0.05 mg/L"], "opts_en": ["0.01 mg/L", "0.9 mg/L", "0.001 mg/L", "0.05 mg/L"], "ans": 1}, {"id": 23, "hi": "बायोगैस का मुख्य घटक निम्न में से कौनसा है -", "en": "What is the main component of biogas?", pumping", "It floats on the upper layer and is separated by pumping", "It is dried and separated by hand", "None of these"], "ans": 1}, {"id": 39, "hi": "एक सेप्टिक टैंक में तरल अपशिष्ट पर निम्न प्रक्रिया में से कौनसी होती हैं -", "en": "Which process occurs to liquid waste in a septic tank?", "opts_hi": ["नाली क्षेत्र में तरल को बहाना", "कीचड़ में रूपांतरण", "सेप्टिक टैंक के शीर्ष पर छेद के माध्यम से वाष्पीकरण", "इनमें से कोई नहीं"], "opts_en": ["Liquid flows to the drain field", "Conversion into sludge", "Evaporation through holes on top of septic tank", "None of these"], "ans": 1}, {"id": 40, "hi": "निम्न में से कौनसा प्रभाव कवक और ईको-सिस्टम से विघटक के विलुप्त होने के कारण होता है -", "en": "What happens if fungi and decomposers disappear from the ecosystem?", "opts_hi": ["हवा साफ हो जाएगी।", "मिट्टी में अधिक पोषक तत्त्व होंगे।", "मृत पदार्थ जमा हो जायेंगे।", "इनमें से कोई नहीं"], "opts_en": ["Air will become clean", "Soil will have more nutrients", "Dead matter will accumulate", "None of these"], "ans": 3}, {"id": 41, "hi": "निम्नलिखित पानी में से कौनसा जल खारा जल माना जाता है -", "en": "Which of the following water is considered saline water?", "opts_hi": ["झील का पानी", "नल का पानी", "नदी का पानी", "कुओं का पानी"], "opts_en": ["Lake water", "Tap water", "River water", "Well water"], "ans": 2}, {"id": 42, "hi": "स्वच्छ भारत अभियान किस महापुरुष की 145वीं जयंती के अवसर पर शुरू किया गया था -", "en": "Swachh Bharat Abhiyan was started on the 145th birth anniversary of which great person?", "opts_hi": ["भगत सिंह", "सुभाष चन्द्र बोस", "महात्मा गाँधी", "जवाहर लाल नेहरू"], "opts_en": ["Bhagat Singh", "Subhash Chandra Bose", "Mahatma Gandhi", "Jawaharlal Nehru"], "ans": 3}, {"id": 43, "hi": "पेचिस एक ________ जनित रोग है -", "en": "Dysentery is a ________ borne disease.", "opts_hi": ["पानी", "हवा", "मिट्टी", "इनमें से कोई नहीं"], "opts_en": ["Water", "Air", "Soil", "None of these"], "ans": 1}, {"id": 44, "hi": "अतिसार एक ________ जनित रोग है -", "en": "Diarrhoea is a ________ borne disease.", "opts_hi": ["पानी", "हवा", "मिट्टी", "इनमें से कोई नहीं"], "opts_en": ["Water", "Air", "Soil", "None of these"], "ans": 1}, {"id": 45, "hi": "वर्षा जल संचयन ________ की एक विधि है -", "en": "Rainwater harvesting is a method of ________.", "opts_hi": ["पानी की सफाई", "पानी की कठोरता को दूर करना", "पानी का संरक्षण", "इनमें से कोई नहीं"], "opts_en": ["Water purification", "Removing hardness of water", "Water conservation", "None of these"], "ans": 3}, {"id": 46, "hi": "स्वच्छ भारत अभियान के अंतर्गत शौचालयों को सरकार द्वारा अनिवार्य रूप से किस वर्ष तक बनाया जाना सुनिश्चित किया गया है -", "en": "Under Swachh Bharat Abhiyan, by which year was toilet construction to be ensured by the government?", "opts_hi": ["2018", "2019", "2030", "2022"], "opts_en": ["2018", "2019", "2030", "2022"], "ans": 2}, {"id": 47, "hi": "निम्नलिखित में से किसके तल में रेत और मिट्टी जमा होती है -", "en": "In which of the following do sand and soil settle at the bottom?", "opts_hi": ["धातु स्क्रीन", "ग्रिट टैंक", "फिल्टर तल", "कीचड़ टैंक"], "opts_en": ["Metal screen", "Grit tank", "Filter bed", "Sludge tank"], "ans": 2}, {"id": 48, "hi": "अशोधित मल ________ डाला जाता है -", "en": "Untreated sewage is discharged into ________.", "opts_hi": ["पानी की टंकी में", "महासागर में", "नदियों और धाराओं में", "संचयन टैंक में"], "opts_en": ["Water tank", "Ocean", "Rivers and streams", "Storage tank"], "ans": 3}, {"id": 49, "hi": "निम्न में से किसको मारने के लिए चूहानाशी विष का प्रयोग किया जाता है -", "en": "Rodenticide poison is used to kill which of the following?", "opts_hi": ["मच्छर", "चूहे", "झींगुर", "मकड़ी"], "opts_en": ["Mosquitoes", "Rats", "Crickets", "Spiders"], "ans": 2}, {"id": 50, "hi": "लावीसाईट का इस्तेमाल किस रोगाणु को नियंत्रण के लिए किया जाता है -", "en": "Larvicide is used to control which organism?", "opts_hi": ["मच्छर", "झींगुर", "चूहा", "मकड़ी"], "opts_en": ["Mosquito", "Cricket", "Rat", "Spider"], "ans": 1}, {"id": 51, "hi": "दिए गए प्रतिक्रियाओं में से कौनसा निम्नलिखित शब्दों का एक अर्थपूर्ण क्रम होगा -\nफसल\nजड़\nतना\nबीज\nफूल", "en": "Which of the following is the meaningful order of the given words? 1. Crop 2. Root 3. Stem 4. Seed 5. Flower", "opts_hi": ["2,3,5,1,4", "2,3,4,1,5", "2,4,5,1,3", "4,2,3,5,1"], "opts_en": ["2,3,5,1,4", "2,3,4,1,5", "2,4,5,1,3", "4,2,3,5,1"], "ans": 4}, {"id": 52, "hi": "अपने घर से, मैं पूर्व की ओर मुख करके खड़ा हूँ, फिर मैं बाईं ओर मुड़ा और 10 मीटर चला और फिर दाईं ओर मुड़ा और 5 मीटर चला, फिर मैं 5 मीटर दक्षिण की ओर चला और वहाँ से 5 मीटर पश्चिम में चला। मैं अपने घर से किस दिशा में हूँ -", "en": "Facing east from my house, I turned left and walked 10 m, then turned right and walked 5 m, then walked 5 m south and then 5 m west. In which direction am I from my house?", "opts_hi": ["पश्चिम", "उत्तर", "पूर्व", "दक्षिण"], "opts_en": ["West", "North", "East", "South"], "ans": 2}, {"id": 53, "hi": "दिए गए विकल्पों में से संबंधित शब्द/अक्षर/संख्या चुने -\nभूकम्पमापी : भूकम्प :: थर्मामीटर : ?", "en": "Choose the related word/letter/number: Seismograph : Earthquake :: Thermometer : ?", "opts_hi": ["तापमान", "चिकित्सक", "बुखार", "पारा"], "opts_en": ["Temperature", "Doctor", "Fever", "Mercury"], "ans": 1}, {"id": 54, "hi": "दिए गए विकल्पों में से संबंधित शब्द/अक्षर/संख्या चुनें -\nDLIP: FNKR :: JROV: ?", "en": "Choose the related word/letter/number: DLIP : FNKR :: JROV : ?", "opts_hi": ["NVSZ", "LTQX", "MURY", "KSPW"], "opts_en": ["NVSZ", "LTQX", "MURY", "KSPW"], "ans": 2}, {"id": 55, "hi": "सादृश्यता -\nकनाडा : ओटावा :: ? : स्टॉकहोम", "en": "Analogy: Canada : Ottawa :: ? : Stockholm", "opts_hi": ["फ्रांस", "डेनमार्क", "स्वीडन", "नॉर्वे"], "opts_en": ["France", "Denmark", "Sweden", "Norway"], "ans": 3}, {"id": 56, "hi": "एक सिंगल अक्षर का नाम बताएं जिसे नये शब्द बनाने के लिए निम्नलिखित शब्दों में से प्रत्येक के लिए प्रत्यय किया जा सकता है -\nHAT BAR BAT PIN BATH", "en": "Name the single letter that can be suffixed to each of the following words to make new words: HAT BAR BAT PIN BATH", "opts_hi": ["D", "E", "B", "A"], "opts_en": ["D", "E", "B", "A"], "ans": 2}, {"id": 57, "hi": "किसी सांकेतिक भाषा में, 'bleh kom pre' का अर्थ 'how are you' है और 'hel bleh pre' का अर्थ है, 'where are you'। तो 'where' के लिए किस शब्द का प्रयोग किया गया है -", "en": "In a code language, 'bleh kom pre' means 'how are you' and 'hel bleh pre' means 'where are you'. Which word is used for 'where'?", "opts_hi": ["bleh", "pre", "kom", "none of these"], "opts_en": ["bleh", "pre", "kom", "none of these"], "ans": 4}, {"id": 58, "hi": "संख्या श्रृंखला -\n1, 3, 3, 2, 5, 6, 3, 7, ?", "en": "Number series: 1, 3, 3, 2, 5, 6, 3, 7, ?", "opts_hi": ["12", "3", "9", "6"], "opts_en": ["12", "3", "9", "6"], "ans": 3}, {"id": 59, "hi": "संख्या पहेली -\nA   D   H\nF   I   M\n?   N   R", "en": "Number puzzle:\nA   D   H\nF   I   M\n?   N   R", "opts_hi": ["K", "P", "N", "O"], "opts_en": ["K", "P", "N", "O"], "ans": 1}, {"id": 60, "hi": "एक लड़की स्कूल जाना चाहती है। वह अपने घर से चलना प्रारम्भ करती है, जो पूर्व दिशा में स्थित है, और उसे आगे एक चौराहा मिलता है। बायीं ओर की सड़क जंगल की ओर जाती है एवं सीधी सड़क एक बाजार को जाती है, तो उसका स्कूल किस दिशा में हैं -", "en": "A girl wants to go to school. She starts from her house, which is toward the east, reaches a crossing; the left road goes to the forest and the straight road goes to a market. In which direction is her school?", "opts_hi": ["पश्चिम", "उत्तर", "पूर्व", "दक्षिण"], "opts_en": ["West", "North", "East", "South"], "ans": 2}, {"id": 61, "hi": "अगर GOD = SAILOR, तो DOG = ?", "en": "If GOD = SAILOR, then DOG = ?", "opts_hi": ["ROLISA", "ORILSA", "ILARSO", "SAILRO"], "opts_en": ["ROLISA", "ORILSA", "ILARSO", "SAILRO"], "ans": 2}, {"id": 62, "hi": "'ई', 'एस', 'आर' और 'यू' अक्षरों का इस्तेमाल करते हुए कितने अर्थपूर्ण शब्दों का गठन किया जा सकता है, जब एक बार शब्द में एक अक्षर का प्रयोग किया जाता है -", "en": "Using the letters E, S, R and U, how many meaningful words can be formed when each letter is used once?", "opts_hi": ["दो", "तीन", "पाँच", "एक"], "opts_en": ["Two", "Three", "Five", "One"], "ans": 3}, {"id": 63, "hi": "P, Q के पूर्व में और R के पश्चिम में हैं। T, R के दक्षिण पश्चिम में है और Q, X के दक्षिण-पूर्व में है, तो सबसे दूर पश्चिम में कौन है -", "en": "P is east of Q and west of R. T is southwest of R and Q is southeast of X. Who is farthest west?", "opts_hi": ["Q", "P", "X", "R"], "opts_en": ["Q", "P", "X", "R"], "ans": 3}, {"id": 64, "hi": "रमन का परिचय देते हुए सोहन ने कहा, 'वह मेरे पिता के इकलौते बेटे का इकलौता बेटा है।' सोहन का रमन से क्या रिश्ता है -", "en": "Introducing Raman, Sohan said, 'He is the only son of the only son of my father.' What is Sohan's relation to Raman?", "opts_hi": ["आंटी", "नीज", "कजिन", "इनमें से कोई नहीं"], "opts_en": ["Aunt", "Niece/Nephew", "Cousin", "None of these"], "ans": 4}, {"id": 65, "hi": "निम्नलिखित में से वह जोड़ी चुने, जो भिन्न रूप से संबंधित है -", "en": "Choose the pair which is differently related.", "opts_hi": ["किताब : पुस्तकालय", "आलू : प्याज", "छात्र : कक्षा", "चावल : मकई"], "opts_en": ["Book : Library", "Potato : Onion", "Student : Class", "Rice : Maize"], "ans": 2}, {"id": 66, "hi": "एक परिवार में छः सदस्य P, Q, R, S, T और U हैं। परिवार में सिर्फ एक शादीशुदा जोड़ा ही हैं। P के पास केवल दो पुत्र हैं। Q, R की माँ है। S, P का भाई है। T, Q की सिस्टर-इन-लॉ है। T का P से क्या रिश्ता है -", "en": "There are six members P, Q, R, S, T and U in a family. There is only one married couple. P has only two sons. Q is R's mother. S is P's brother. T is Q's sister-in-law. What is T's relation to P?", "opts_hi": ["माँ", "पत्नी", "बहन", "सिस्टर-इन-लॉ"], "opts_en": ["Mother", "Wife", "Sister", "Sister-in-law"], "ans": 2}, {"id": 67, "hi": "निम्नलिखित प्रश्नों में उन संबंधों को प्राप्त करें जो निश्चित रूप से दो संबंधों के आधार पर अलग किए जा सकते हैं। उपयोग किए गए चिह्न निम्नानुसार हैं -$ का अर्थ है '>' है, * का अर्थ '<' है, # का अर्थ 'के बराबर नहीं', >@ का अर्थ '=' है।\nयदि 8A * 6B और 3B * 4C\nइसलिए:", "en": "In the following question, find the relationship that definitely follows from the given relations. Symbols are used as given. If 8A * 6B and 3B * 4C, therefore:", "opts_hi": ["C $ 2A", "C $ A", "C * A", "2C + A"], "opts_en": ["C $ 2A", "C $ A", "C * A", "2C + A"], "ans": 2}, {"id": 68, "hi": "यदि किसी सांकेतिक भाषा में CHENNAI को DIFOOBJ लिखा जाता है, तो MADRAS को क्या लिखा जाएगा -", "en": "If in a code language CHENNAI is written as DIFOOBJ, how will MADRAS be written?", "opts_hi": ["MBFRBT", "NBESBT", "LZCQZR", "NEBTSB"], "opts_en": ["MBFRBT", "NBESBT", "LZCQZR", "NEBTSB"], "ans": 2}, {"id": 69, "hi": "यदि कवीश अपनी बेटी से चार गुणा बड़ी है। चार साल बाद उनकी आयु का जोड़ 43 होगा तो कवीश की वर्तमान आयु कितनी है -", "en": "Kavish is four times as old as his daughter. After four years, the sum of their ages will be 43. What is Kavish's present age?", "opts_hi": ["7", "28", "32", "30"], "opts_en": ["7", "28", "32", "30"], "ans": 2}, {"id": 70, "hi": "श्रृंखला में अगली संख्या क्या होगी -\n99, 99, 87, 87, 75, 75, ?", "en": "What will be the next number in the series: 99, 99, 87, 87, 75, 75, ?", "opts_hi": ["63", "83", "67", "61"], "opts_en": ["63", "83", "67", "61"], "ans": 1}, {"id": 71, "hi": "यदि अंग्रेजी शब्दकोष के अनुसार व्यवस्था की जाती है तो निम्न शब्दों में कौन सा चतुर्थ होगा -", "en": "If arranged according to the English dictionary, which of the following words will be fourth?", "opts_hi": ["Gentle", "General", "Gender", "Gene"], "opts_en": ["Gentle", "General", "Gender", "Gene"], "ans": 1}, {"id": 72, "hi": "सचिन को याद है कि उसके दोस्त अजीत का जन्मदिन 20 अप्रैल के बाद और 28 अप्रैल से पहले आता है जबकि अंजली को याद है कि अजीत का जन्मदिन 22 अप्रैल से पहले लेकिन 12 अप्रैल के बाद आता है तो अजीत का जन्मदिन कब आता है -", "en": "Sachin remembers that his friend Ajit's birthday is after 20 April and before 28 April, while Anjali remembers it is before 22 April but after 12 April. When is Ajit's birthday?", "opts_hi": ["22 अप्रैल", "21 अप्रैल", "20 अप्रैल", "निर्धारित नहीं किया जा सकता"], "opts_en": ["22 April", "21 April", "20 April", "Cannot be determined"], "ans": 2}, {"id": 73, "hi": "तस्वीर में मौजूद एक आदमी की ओर इशारा करते हुए, मुनीश ने कहा कि उसका बेटा मेरे बेटे का चाचा है। तो उस तस्वीर में मौजूद आदमी मुनीश से कैसे संबंधित है -", "en": "Pointing to a man in a picture, Munish said that his son is my son's uncle. How is the man in the picture related to Munish?", "opts_hi": ["दादाजी", "पति", "पिता", "ससुर"], "opts_en": ["Grandfather", "Husband", "Father", "Father-in-law"], "ans": 3}, {"id": 74, "hi": "यदि '+' का अर्थ है ÷ और ÷ का अर्थ '×' है और '×' का अर्थ है '-' और '-' का अर्थ है +, तो दी गई समीकरण का मान ज्ञात कीजिए -36 × 12 + -4 / 6 + 2 - 3?", "en": "If '+' means ÷, '÷' means ×, '×' means − and '−' means +, find the value of the given expression.", "opts_hi": ["1", "42", "0", "34"], "opts_en": ["1", "42", "0", "34"], "ans": 2}, {"id": 75, "hi": "1. नोएडा गैलेरिया की तुलना में मॉल ऑफ इंडिया में अधिक दुकाने हैं।\n2. गैलेरिया की तुलना में वेव में कम दुकाने हैं।\n3. वेव की तुलना में मॉल ऑफ इंडिया में अधिक दुकाने हैं।\nयदि कथन 1 और 2 सत्य हैं, तो तीसरा बयान है -", "en": "1. Mall of India has more shops than Noida Galleria. 2. Wave has fewer shops than Galleria. 3. Mall of India has more shops than Wave. If statements 1 and 2 are true, then statement 3 is:", "opts_hi": ["सत्य", "असत्य", "जानकारी अपर्याप्त है।", "अनिश्चित"], "opts_en": ["True", "False", "Insufficient information", "Uncertain"], "ans": 1}, {"id": 76, "hi": "इनमें से कौनसा देश सार्क (SAARC) देशों के क्षेत्रीय भू राजनीतिक समूह का सदस्य नहीं है -", "en": "Which of these countries is not a member of SAARC?", "opts_hi": ["श्रीलंका", "पाकिस्तान", "बांग्लादेश", "चीन"], "opts_en": ["Sri Lanka", "Pakistan", "Bangladesh", "China"], "ans": 4}, {"id": 77, "hi": "कौनसा भारतीय राज्य प्याज का प्रमुख उत्पादक है -", "en": "Which Indian state is a major producer of onion?", "opts_hi": ["राजस्थान", "महाराष्ट्र", "पश्चिम बंगाल", "गुजरात"], "opts_en": ["Rajasthan", "Maharashtra", "West Bengal", "Gujarat"], "ans": 2}, {"id": 78, "hi": "धन्वंतरी ides", "although"], "opts_en": ["odd", "despite", "besides", "although"], "ans": 2}];
let current = 0;
let lang = localStorage.getItem(TEST_ID + "_lang") || "hi";
let answers = Array(questions.length).fill(null);
let review = Array(questions.length).fill(false);
let submitted = false;
let totalSeconds = 90 * 60;

function esc(s) {
  return String(s ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll("\n","<br>");
}
function getSubject(q) {
  if (q.id >= 1 && q.id <= 50) return lang === "en" ? "Sanitation / Public Health" : "स्वच्छता / जनस्वास्थ्य";
  if (q.id >= 51 && q.id <= 75) return lang === "en" ? "Reasoning" : "तर्कशक्ति";
  if (q.id >= 76 && q.id <= 85) return lang === "en" ? "General Knowledge" : "सामान्य ज्ञान";
  if (q.id >= 86 && q.id <= 95) return lang === "en" ? "Mathematics" : "गणित";
  return lang === "en" ? "English Language" : "English Language";
}
function textFor(q) {
  if (lang === "hi") return esc(q.hi);
  if (lang === "en") return esc(q.en);
  return `<div>${esc(q.hi)}</div><div class="en">${esc(q.en)}</div>`;
}
function optFor(q, i) {
  if (lang === "hi") return esc(q.opts_hi[i]);
  if (lang === "en") return esc(q.opts_en[i]);
  return `<b>HI:</b> ${esc(q.opts_hi[i])}<br><b>EN:</b> ${esc(q.opts_en[i])}`;
}
function render() {
  const q = questions[current];
  document.getElementById("qCount").textContent = `Question ${current+1}/${questions.length}`;
  document.getElementById("subjectLabel").textContent = getSubject(q);
  document.getElementById("question").innerHTML = (current+1) + ". " + textFor(q);
  const optDiv = document.getElementById("options");
  optDiv.innerHTML = "";
  for (let i=0;i<4;i++) {
    const btn = document.createElement("button");
    btn.className = "opt" + (answers[current] === i+1 ? " selected" : "");
    btn.innerHTML = `(${i+1}) ${optFor(q,i)}`;
    btn.onclick = () => {
      if (!submitted) {
        answers[current] = i+1;
        saveState();
        render();
      }
    };
    optDiv.appendChild(btn);
  }
  renderPalette();
  updateLangButtons();
}
function updateLangButtons() {
  ["hi","en","bi"].forEach(x => document.getElementById("btn-"+x).classList.toggle("active", lang===x));
}
function setLang(x) {
  lang = x;
  localStorage.setItem(TEST_ID + "_lang", lang);
  render();
}
function renderPalette() {
  const p = document.getElementById("palette");
  p.innerHTML = "";
  questions.forEach((q,i) => {
    const d = document.createElement("div");
    d.className = "num" + (i===current ? " active" : "") + (answers[i] ? " answered" : "") + (review[i] ? " review" : "");
    d.textContent = i+1;
    d.onclick = () => { current=i; saveState(); render(); };
    p.appendChild(d);
  });
}
function prevQ() { if (current>0) { current--; saveState(); render(); } }
function saveNext() { if (current < questions.length-1) { current++; saveState(); render(); } }
function clearAns() { answers[current] = null; saveState(); render(); }
function toggleReview() { review[current] = !review[current]; saveState(); render(); }
function submitTest() {
  if (!confirm("Submit this test?")) return;
  submitted = true;
  let correct=0, wrong=0, attempted=0;
  questions.forEach((q,i) => {
    if (answers[i]) {
      attempted++;
      if (answers[i] === q.ans) correct++; else wrong++;
    }
  });
  const skipped = questions.length - attempted;
  const marks = correct - wrong * 0.25;
  document.getElementById("testArea").style.display = "none";
  document.getElementById("resultArea").style.display = "block";
  document.getElementById("scoreBox").innerHTML = `
    <div class="score-box"><b>${attempted}</b>Attempted</div>
    <div class="score-box"><b>${correct}</b>Correct</div>
    <div class="score-box"><b>${wrong}</b>Wrong</div>
    <div class="score-box"><b>${marks.toFixed(2)}</b>Score</div>
  `;
  saveHistory({date:new Date().toLocaleString(), attempted, correct, wrong, skipped, marks:marks.toFixed(2)});
  localStorage.removeItem(TEST_ID + "_state");
  loadHistory();
}
function showReview() {
  let out = "<h3>Answer Review</h3>";
  questions.forEach((q,i) => {
    const status = !answers[i] ? "Skipped" : (answers[i] === q.ans ? "Correct" : "Wrong");
    out += `<div class="review-card">
      <b>Q${i+1}.</b> ${textFor(q)}<br>
      <span class="small">Your answer: ${answers[i] || "-"} | Correct answer: ${q.ans} | Status: ${status}</span>
    </div>`;
  });
  document.getElementById("reviewArea").innerHTML = out;
}
function restartTest() {
  if (!confirm("Restart this test?")) return;
  current=0; answers=Array(questions.length).fill(null); review=Array(questions.length).fill(false);
  totalSeconds = 90*60; submitted=false;
  localStorage.removeItem(TEST_ID + "_state");
  document.getElementById("resultArea").style.display = "none";
  document.getElementById("testArea").style.display = "block";
  render();
}
function tick() {
  if (submitted) return;
  let m = Math.floor(totalSeconds/60), s = totalSeconds % 60;
  document.getElementById("timer").textContent = String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");
  if (totalSeconds <= 0) {
    submitted = true;
    alert("Time is over. Test will be submitted.");
    submitted = false;
    submitTest();
  } else totalSeconds--;
  saveState();
}
function saveState() {
  localStorage.setItem(TEST_ID + "_state", JSON.stringify({current, answers, review, totalSeconds}));
}
function loadState() {
  const raw = localStorage.getItem(TEST_ID + "_state");
  if (raw) {
    try {
      const st = JSON.parse(raw);
      current = st.current ?? 0;
      answers = st.answers ?? answers;
      review = st.review ?? review;
      totalSeconds = st.totalSeconds ?? totalSeconds;
    } catch(e) {}
  }
}
function saveHistory(item) {
  const key = TEST_ID + "_history";
  let h = JSON.parse(localStorage.getItem(key) || "[]");
  h.unshift(item);
  h = h.slice(0,10);
  localStorage.setItem(key, JSON.stringify(h));
}
function loadHistory() {
  const h = JSON.parse(localStorage.getItem(TEST_ID + "_history") || "[]");
  document.getElementById("history").innerHTML = h.length ? h.map(x => 
    `<div class="history-item"><b>${x.date}</b><br>Score: ${x.marks} | Correct: ${x.correct} | Wrong: ${x.wrong}</div>`
  ).join("") : "<p class='small'>No attempt yet.</p>";
}
loadState();
render();
loadHistory();
setInterval(tick, 1000);
</script>

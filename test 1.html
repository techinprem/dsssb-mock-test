 के बीच के वल दो व्यक्ति बैठे हैं। यदि पंक्ति\nमें कोई अन्य व्यक्ति नहीं बैठा है, तो बैठे हुए व्यक्तियों की कु ल संख्या ज्ञात कीजिए।", "options": ["11", "7", "8", "10"], "answer": 0, "photo": "images/q019.png"}, {"id": 20, "section": "Mental Ability and Reasoning Ability", "qno": 20, "question": "दिए गए कथनों और निष्कर्षों का ध्यानपूर्वक अध्ययन कीजिए। यह मानते हुए कि कथनों में दी गई जानकारी\nसत्य है, भले ही वह ज्ञात तथ्यों से भिन्न प्रतीत होती हो, तय कीजिए कि दिए गए निष्कर्षों में से कौन-से निष्कर्ष,\nकथनों का तार्किक रूप से अनुसरण करते हैं।\nकथन:\nसभी तकिए, बिस्तर हैं।\nसभी बिस्तर, दरवाजे हैं।\nकु छ बिस्तर, पर्दे हैं।\nनिष्कर्ष:\n(I) कु छ दरवाजे, पर्दे हैं।\n(II) कु छ तकिए ,पर्दे हैं।", "options": ["I और II दोनों अनुसरण करते हैं", "के वल II अनुसरण करता है", "के वल I अनुसरण करता है", "न तो I और न ही II अनुसरण करता है"], "answer": 0, "photo": "images/q020.png"}, {"id": 21, "section": "General Awareness", "qno": 1, "question": "करिकाल, जिसे कावेरी नदी पर बांध बनाने का श्रेय दिया जाता है, वह _______ राजवंश से संबंधित था।", "options": ["चेर", "आंध्र", "चोल", "पांड्य"], "answer": 0, "photo": "images/q021.png"}, {"id": 22, "section": "General Awareness", "qno": 2, "question": "भारतीय इतिहास में 15 अगस्त का क्या महत्व है?", "options": ["यह 1947 में ब्रिटिश शासन से भारत की स्वतंत्रता का प्रतीक है।", "यह भारत की संसद के पहले सत्र का उत्सव है।", "यह महात्मा गांधी की जयंती के उपलक्ष्य में मनाया जाता है।", "यह भारत के संविधान को अपनाने का प्रतीक है।"], "answer": 0, "photo": "images/q022.png"}, {"id": 23, "section": "General Awareness", "qno": 3, "question": "पश्चिमी घाट में किस प्रकार के वन पाए जाते हैं?", "options": ["मैंग्रोव", "उष्णकटिबंधीय सदाबहार", "उष्णकटिबंधीय पर्णपाती", "अल्पाइन"], "answer": 0, "photo": "images/q023.png"}, {"id": 24, "section": "General Awareness", "qno": 4, "question": "वाकाटक वंश (Vakataka dynasty) का संस्थापक कौन था?", "options": ["कु लवर्मन (Kulavarman)", "हरिवर्मन (Harivarman)", "वकाकु ला (Vakakula)", "विंध्यशक्ति (Vindhyashakti)"], "answer": 0, "p ank.\nAlthough e istentialist thinkers ______________________ interrogate the implication of\n, they seldom specify decisive answers to such queries.\nlife", "options": ["delicately", "frequently", "erratically", "occasionally : Comprehension Read the given passage and answer the questions that follow. Laika was a dog that was the first living creature to be launched into Earth orbit, on board the Soviet artificial satellite Sputnik 2, on 3 November 1957. It was always understood that Laika would not survive the mission, but her actual fate was misrepresented for decades. Laika was a small (13 pounds [6 kg]), even-tempered, mixed-breed dog about two years of age. She was one of a number of stray dogs that were taken into the Soviet spaceflight program after being rescued from the streets. Only female dogs were used because they were considered to be anatomically better suited than males for close confinement. Laika trained for life on board the satellite by learning to accept progressively smaller living spaces. She was spun in a centrifuge to accustom her to changes in gravitation, and she learned to accept food in jellied form that could be easily served in an environment of weightlessness. When the launch was announced, Laika became an international celebrity. The satellite and its passenger soon acquired the journalistic nickname of 'Muttnik'. Contemporaneous Soviet accounts implied that the dog was kept alive for six or seven days into the mission and then euthanised with poisoned food before her oxygen supply could run out. The satellite was destroyed reentering Earth’s atmosphere on 14 April 1958. Laika’s sad fate aroused worldwide concern and sympathy. In 2002, however, Russian scientist Dimitri Malashenkov revealed that the previous accounts of her death were false. Laika had actually survived only about five to seven hours after liftoff before dying of overheating and panic. It was belatedly made known that Laika’s pulse rate, which had been measured with

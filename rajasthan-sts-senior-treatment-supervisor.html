<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rajasthan STS Senior Treatment Supervisor Bilingual Mock Test</title>
<style>
:root {
  --primary:#0f4c81; --primary2:#0b3a63; --bg:#eef2f7; --card:#fff; --text:#111827;
  --border:#d6dde8; --right:#15803d; --wrong:#b91c1c; --review:#f59e0b;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,"Noto Sans Devanagari",Mangal,sans-serif;background:var(--bg);color:var(--text)}
.exam-header{background:#153e75;color:white;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;position:sticky;top:0;z-index:20}
.exam-title{font-size:17px;font-weight:800}
.langbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.langbtn{background:#fff;color:#153e75;border:1px solid #fff;border-radius:5px;padding:8px 12px;font-weight:800;cursor:pointer}
.langbtn.active{background:#ffe082;color:#111827}
.container{max-width:1250px;margin:0 auto;padding:14px;display:grid;grid-template-columns:1fr 315px;gap:14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:0 1px 8px rgba(0,0,0,.08)}
.qtop{display:flex;justify-content:space-between;align-items:center;gap:10px;background:#f8fafc;border-bottom:1px solid var(--border);padding:12px 14px}
.qno{font-weight:900;color:#0f4c81}
.timer{font-size:18px;font-weight:900;color:#b91c1c;background:#fff;border:1px solid var(--border);border-radius:6px;padding:7px 10px}
.qbody{padding:18px}
.subject{font-size:13px;font-weight:800;color:#475569;margin-bottom:8px;text-transform:uppercase}
.qtext{font-size:19px;line-height:1.65;font-weight:800;white-space:pre-line;margin-bottom:14px}
.qtext .en{font-weight:700;color:#374151;border-top:1px dashed #cbd5e1;margin-top:10px;padding-top:10px}
.opt{width:100%;display:block;text-align:left;background:#fff;border:1px solid var(--border);border-radius:8px;padding:12px 13px;margin:10px 0;cursor:pointer;font-size:16px;line-height:1.5}
.opt:hover{background:#f8fafc}
.opt.selected{border:2px solid var(--primary);background:#e6f0ff}
.controls{padding:14px;border-top:1px solid var(--border);display:flex;gap:10px;flex-wrap:wrap;justify-content:space-between}
.left-controls,.right-controls{display:flex;gap:10px;flex-wrap:wrap}
button{border:none;border-radius:7px;padding:10px 14px;font-weight:800;cursor:pointer}
.primary{background:var(--primary);color:#fff}
.secondary{background:#e5e7eb;color:#111827}
.warn{background:#f59e0b;color:#111827}
.danger{background:#dc2626;color:#fff}
.side{padding:13px;height:max-content;position:sticky;top:62px}
.palette{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
.num{padding:8px 0;border-radius:5px;text-align:center;font-weight:800;cursor:pointer;background:#e5e7eb;border:1px solid #cbd5e1}
.num.active{outline:3px solid #0f4c81}
.num.answered{background:#93c5fd}
.num.review{background:#fde68a}
.num.answered.review{background:linear-gradient(135deg,#93c5fd 50%,#fde68a 50%)}
.legend{font-size:13px;color:#475569;display:grid;gap:4px;margin-top:12px}
.dot{display:inline-block;width:13px;height:13px;border-radius:3px;margin-right:5px;vertical-align:-2px;border:1px solid #cbd5e1}
.result{display:none;padding:18px}
.score-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:10px 0}
.score-box{background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.score-box b{display:block;font-size:23px;color:#0f4c81}
.review-card{border:1px solid var(--border);border-radius:8px;padding:12px;margin:10px 0;background:#fff}
.small{font-size:12px;color:#64748b}
.history-item{font-size:13px;border-bottom:1px solid #e5e7eb;padding:7px 0}
@media(max-width:850px){
  .container{grid-template-columns:1fr}
  .side{position:static}
  .exam-header{align-items:flex-start;flex-direction:column}
  .qtext{font-size:17px}
  .score-grid{grid-template-columns:repeat(2,1fr)}
}
</style>

<style id="auto-common-mock-style">
.math {
  white-space: nowrap;
  font-family: "Times New Roman", serif;
}

.frac {
  display: inline-block;
  vertical-align: middle;
  text-align: center;
  line-height: 1.2;
  margin: 0 4px;
}

.frac .top {
  display: block;
  padding: 0 4px 2px;
  border-bottom: 1.5px solid currentColor;
}

.frac .bottom {
  display: block;
  padding: 2px 4px 0;
}

sup, sub {
  line-height: 0;
}

.question-palette,
.palette-buttons,
#paletteButtons,
#questionPalette,
.palette-grid,
.question-buttons {
  max-height: 420px;
  overflow-y: auto;
}

@media (max-width: 768px) {
  body {
    font-size: 15px;
  }

  .exam-container,
  .main-container,
  .test-container,
  .quiz-container,
  .content-wrapper {
    display: block !important;
    width: 100% !important;
  }

  .side-panel,
  .question-palette,
  .palette-panel,
  .right-panel {
    width: 100% !important;
    max-height: 260px;
    overflow-y: auto;
    margin-top: 10px;
  }

  button {
    min-height: 38px;
    font-size: 14px;
  }

  img {
    max-width: 100%;
    height: auto;
  }
}
</style>

<a href="index.html" data-auto-home-button style="
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 99999;
  background: #0b5ed7;
  color: #ffffff;
  padding: 8px 13px;
  border-radius: 6px;

">Home</a>

<div class="exam-header">
  <div class="exam-title">Rajasthan STS Senior Treatment Supervisor — Bilingual Mock Test</div>
  <div class="langbar">
    <span style="font-weight:700">Language:</span>
    <button class="langbtn active" id="btn-hi" onclick="setLang('hi')">Hindi</button>
    <button class="langbtn" id="btn-en" onclick="setLang('en')">English</button>
    <button class="langbtn" id="btn-bi" onclick="setLang('bi')">Bilingual</button>
  </div>
</div>
<div class="container">
  <main class="card">
    <section id="testArea">
      <div class="qtop">
        <div>
          <div class="qno" id="qCount">Question 1/60</div>
          <div class="small">Marking: +1 correct, -0.25 wrong</div>
        </div>
        <div class="timer" id="timer">60:00</div>
      </div>
      <div class="qbody">
        <div class="subject" id="subjectLabel">Subject</div>
        <div class="qtext" id="question"></div>
        <div id="options"></div>
      </div>
      <div class="controls">
        <div class="left-controls">
          <button class="secondary" onclick="prevQ()">Previous</button>
          <button class="secondary" onclick="clearAns()">Clear Response</button>
          <button class="warn" onclick="toggleReview()">Mark for Review</button>
        </div>
        <div class="right-controls">
          <button class="primary" onclick="saveNext()">Save & Next</button>
          <button class="danger" onclick="submitTest()">Submit</button>
        </div>
      </div>
    </section>
    <section id="resultArea" class="result">
      <h2>Result</h2>
      <div id="scoreBox" class="score-grid"></div>
      <button class="primary" onclick="showReview()">Show Answer Review</button>
      <button class="secondary" onclick="restartTest()">Restart Test</button>
      <div id="reviewArea"></div>
    </section>
  </main>
  <aside class="card side">
    <h3>Question Palette</h3>
    <div class="palette" id="palette"></div>
    <div class="legend">
      <div><span class="dot" style="background:#93c5fd"></span>Answered</div>
      <div><span class="dot" style="background:#fde68a"></span>Marked for Review</div>
      <div><span class="dot" style="background:#e5e7eb"></span>Not Answered</div>
    </div>
    <hr>
    <h3>Attempt History</h3>
    <div class="small">Only this test history will show here.</div>
    <div id="history"></div>
  </aside>
</div>
<script>
const TEST_ID = "rajasthan_sts_senior_treatment_supervisor_bilingual_v1";
const questions = [{"id": 1, "hi": "राजस्थान की कुल स्थलीय सीमा की लंबाई है -", "en": "The total land boundary length of Rajasthan is -", "opts_hi": ["5091 किमी.", "5920 किमी.", "5290 किमी.", "5090 किमी."], "opts_en": ["5091 km", "5920 km", "5290 km", "5090 km"], "ans": 2}, {"id": 2, "hi": "निम्न में से कौनसा शहर पाकिस्तानी सीमा के निकट है-", "en": "Which of the following cities is near the Pakistani border?", "opts_hi": ["बीकानेर", "जैसलमेर", "गंगानगर", "हनुमानगढ़"], "opts_en": ["Bikaner", "Jaisalmer", "Ganganagar", "Hanumangarh"], "ans": 3}, {"id": 3, "hi": "2016 एसआरएस के अनुसार राजस्थान का शिशु मृत्यु दर कितना आंका गया है -", "en": "According to SRS 2016, what was the estimated infant mortality rate of Rajasthan?", "opts_hi": ["41", "43", "45", "47"], "opts_en": ["41", "43", "45", "47"], "ans": 1}, {"id": 4, "hi": "निम्न में से कौनसा कार्यक्रम राष्ट्रीय स्वास्थ्य मिशन का हिस्सा नहीं है -", "en": "Which of the following programmes is not a part of the National Health Mission?", "opts_hi": ["जननी सुरक्षा योजना", "108 एम्बूलेंस सेवा", "आदर्श विद्यालय योजना", "मिशन इन्द्रधनुष"], "opts_en": ["Janani Suraksha Yojana", "108 Ambulance Service", "Adarsh Vidyalaya Yojana", "Mission Indradhanush"], "ans": 3}, {"id": 5, "hi": "भामाशाह स्वास्थ्य बीमा योजना में परिवार को कितना बीमा कवर (रुपये) दिया जाता है -", "en": "How much insurance cover is given to a family under Bhamashah Swasthya Bima Yojana?", "opts_hi": ["30,000 - 3,00,000", "30,000 - 5,00,000", "20,000 - 3,00,000", "20,000 - 5,00,000"], "opts_en": ["30,000 - 3,00,000", "30,000 - 5,00,000", "20,000 - 3,00,000", "20,000 - 5,00,000"], "ans": 1}, {"id": 6, "hi": "एनटीसीपी कार्यक्रम प्रमुखता से किस गतिविधि से जुड़ा हुआ है -", "en": "The NTCP programme is mainly related to which activity?", "opts_hi": ["टी.बी. कंट्रोल", "टोबेको कंट्रोल", "टिटनस कंट्रोल", "अन्धता कार्यक्रम"], "opts_en": ["TB control", "Tobacco control", "Tetanus control", "Blindness programme"], "ans": 2}, {"id": 7, "hi": "एक लेबर रूम में आम तौर पर निम्न में से क्या उपलब्ध होगा-", "en": "Which of the following is generally available in a labour room?", "opts_hi": ["एल्बेन्डाजॉल", "टेमिफ्लू", "ऑक्सीटॉसिन", "फैक्टर 8/9"], "opts_en": ["Albendazole", "Tamiflu", "Oxytocin", "Factor 8/9"], "ans": 3}, {"id": 8, "hi": "निम्न में से कौनसी बीमारी रक्त से संबंधित है -", "en": "Which of the following diseases is related to blood?", "opts_hi": ["थैलेसिमिया", "टी.बी.", "चिकनगुनिया", "अन्धता"], "opts_en": ["Thalassemia", "TB", "Chikungunya", "Blindness"], "ans": 1}, {"id": 9, "hi": "किमोथैरेपी का संबंध कौनसी बीमारी से है -", "en": "Chemotherapy is related to which disease?", "opts_hi": ["टी.बी.", "कैंसर", "दिल की बीमारी", "डायबिटीज"], "opts_en": ["TB", "Cancer", "Heart disease", "Diabetes"], "ans": 2}, {"id": 10, "hi": "तपेदिक (टीबी) रोग में डॉट्स (DOTS) का क्या अर्थ है-", "en": "What does DOTS mean in tuberculosis (TB) disease?", "opts_hi": ["डायरेक्ट ऑब्जर्व्ड ट्रीटमेंट सिस्टम", "डिजीज ऑब्जर्व्ड ट्रीटमेंट सिस्टम", "डिजीज ऑब्जर्व्ड टेलीमेडिसन सिस्टम", "डायरेक्ट ऑब्जर्व्ड टेलीमेडिसन सिस्टम"], "opts_en": ["Direct Observed Treatment System", "Disease Observed Treatment System", "Disease Observed Telemedicine System", "Direct Observed Telemedicine System"], "ans": 1}, {"id": 11, "hi": "यूनिसेफ का पूरा नाम बताइये-", "en": "What is the full form of UNICEF?", "opts_hi": ["यूनाईटेड नेशन्स चिल्ड्रन्स फण्ड", "यूनाईटेड नेशन्स फण्ड फॉर केलिमिटी", "यूनाईटेड न्यूज फॉर चिल्ड्रन इन केलिमिटी", "इनमें से कोई नहीं"], "opts_en": ["United Nations Children's Fund", "United Nations Fund for Calamity", "United News for Children in Calamity", "None of these"], "ans": 1}, {"id": 12, "hi": "आशा सहयोगिनी का संबंध निम्न में से किस विभाग से नहीं है -", "en": "ASHA Sahyogini is not related to which department?", "opts_hi": ["पंचायती राज", "स्वास्थ्य विभाग", "पेयजल विभाग", "महिला एवं बाल विकास"], "opts_en": ["Panchayati Raj", "Health Department", "Drinking Water Department", "Women and Child Development"], "ans": 3}, {"id": 13, "hi": "यूरिनरी केथेटर उपकरण का प्र dovudine (Azidothymidine)", "Miconazole", "Nonoxynol-9", "Virazole"], "ans": 1}, {"id": 54, "hi": "एक पौधा जो वन्य अवस्था में नहीं पाया जाता है और जो पालतू बनाने की प्रक्रिया (डोमेस्टिकेशन) द्वारा उत्पन्न हुआ है, उसे कहा जाता है -", "en": "A plant not found in the wild state and produced by the process of domestication is called -", "opts_hi": ["कृषिज (कल्टीजन)", "कल्टीवार", "क्लोन", "सांकुरक"], "opts_en": ["Cultigen", "Cultivar", "Clone", "Seedling"], "ans": 1}, {"id": 55, "hi": "परागकण है -", "en": "Pollen grain is -", "opts_hi": ["अपूर्ण विकसित भ्रूण", "अपूर्ण विकसित नर युग्मकोद्भिद्", "बीजाणु मातृ कोशिका", "एक नर शुक्राणु कोशिका"], "opts_en": ["Incompletely developed embryo", "Incompletely developed male gametophyte", "Spore mother cell", "A male sperm cell"], "ans": 2}, {"id": 56, "hi": "जिस पादप में नर और मादा दोनों पुष्प उपस्थित हों, उसे कहते हैं-", "en": "A plant in which both male and female flowers are present is called -", "opts_hi": ["द्विलैंगिक", "पृथकलिंगी", "उभयलिंगाश्रयी", "एकसंगमनी"], "opts_en": ["Bisexual", "Dioecious", "Monoecious", "Monogamous"], "ans": 3}, {"id": 57, "hi": "पोलियो का पहला प्रभावशाली टीका निम्नलिखित ने तैयार किया था-", "en": "The first effective polio vaccine was prepared by -", "opts_hi": ["जॉन हेनशैम गिब्बन", "जेम्स सिम्पसन", "जोनास ई-साल्क", "रॉबर्ट एडवर्ड्स"], "opts_en": ["John Heysham Gibbon", "James Simpson", "Jonas E. Salk", "Robert Edwards"], "ans": 3}, {"id": 58, "hi": "अम्ल वर्षा किनके द्वारा होने वाले पर्यावरण प्रदूषण के कारण होती है -", "en": "Acid rain is caused by environmental pollution due to -", "opts_hi": ["कार्बन डाइऑक्साइड और नाइट्रोजन", "कार्बन मोनो ऑक्साइड और कार्बन डाइऑक्साइड", "ओजोन और कार्बन डाइऑक्साइड", "नाइट्रस ऑक्साइड और सल्फर डाइऑक्साइड"], "opts_en": ["Carbon dioxide and nitrogen", "Carbon monoxide and carbon dioxide", "Ozone and carbon dioxide", "Nitrous oxide and sulphur dioxide"], "ans": 4}, {"id": 59, "hi": "विरप्पन, चेजिंग द ब्रिगैंड नामक पुस्तक के लेखक कौन है-", "en": "Who is the author of the book 'Veerappan: Chasing the Brigand'?", "opts_hi": ["जयराम रमेश", "विजय कुमार", "यासीर उस्मान", "सुमित्रा महाजन"], "opts_en": ["Jairam Ramesh", "Vijay Kumar", "Yasir Usman", "Sumitra Mahajan"], "ans": 2}, {"id": 60, "hi": "अब तक राजस्थान रॉयल्स ने आईपीएल फाईनल में कितनी बार जीत हासिल की है -", "en": "How many times had Rajasthan Royals won the IPL final till then?", "opts_hi": ["1", "2", "3", "4"], "opts_en": ["1", "2", "3", "4"], "ans": 1}];
let current = 0;
let lang = localStorage.getItem(TEST_ID + "_lang") || "hi";
let answers = Array(questions.length).fill(null);
let review = Array(questions.length).fill(false);
let submitted = false;
let totalSeconds = 60 * 60;

function esc(s) {
  return String(s ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll("\n","<br>");
}
function getSubject(q) {
  if (q.id >= 1 && q.id <= 31) return lang === "en" ? "Health / Medical Programmes" : "स्वास्थ्य / चिकित्सा कार्यक्रम";
  if (q.id >= 32 && q.id <= 51) return lang === "en" ? "Rajasthan GK / Current Affairs" : "राजस्थान GK / करंट अफेयर्स";
  return lang === "en" ? "Science / Health" : "विज्ञान / स्वास्थ्य";
}
function textFor(q) {
  if (lang === "hi") return esc(q.hi);
  if (lang === "en") return esc(q.en);
  return `<div><span class="math">{esc(q.hi)}</div><div class="en"></span>{esc(q.en)}</div>`;
}
function optFor(q, i) {
  if (lang === "hi") return esc(q.opts_hi[i] || "");
  if (lang === "en") return esc(q.opts_en[i] || "");
  return `<b>HI:</b> <span class="math">{esc(q.opts_hi[i] || "")}<br><b>EN:</b> </span>{esc(q.opts_en[i] || "")}`;
}
function render() {
  const q = questions[current];
  document.getElementById("qCount").textContent = `Question <span class="math">{current+1}/</span>{questions.length}`;
  document.getElementById("subjectLabel").textContent = getSubject(q);
  document.getElementById("question").innerHTML = (current+1) + ". " + textFor(q);
  const optDiv = document.getElementById("options");
  optDiv.innerHTML = "";
  q.opts_hi.forEach((_, i) => {
    const btn = document.createElement("button");
    btn.className = "opt" + (answers[current] === i+1 ? " selected" : "");
    btn.innerHTML = `(<span class="math">{i+1}) </span>{optFor(q,i)}`;
    btn.onclick = () => {
      if (!submitted) {
        answers[current] = i+1;
        saveState();
        render();
      }
    };
    optDiv.appendChild(btn);
  });
  renderPalette();
  updateLangButtons();
}
function updateLangButtons() {
  ["hi","en","bi"].forEach(x => document.getElementById("btn-"+x).classList.toggle("active", lang===x));
}
function setLang(x) {
  lang = x;
  localStorage.setItem(TEST_ID + "_lang", lang);
  render();
}
function renderPalette() {
  const p = document.getElementById("palette");
  p.innerHTML = "";
  questions.forEach((q,i) => {
    const d = document.createElement("div");
    d.className = "num" + (i===current ? " active" : "") + (answers[i] ? " answered" : "") + (review[i] ? " review" : "");
    d.textContent = i+1;
    d.onclick = () => { current=i; saveState(); render(); };
    p.appendChild(d);
  });
}
function prevQ() { if (current>0) { current--; saveState(); render(); } }
function saveNext() { if (current < questions.length-1) { current++; saveState(); render(); } }
function clearAns() { answers[current] = null; saveState(); render(); }
function toggleReview() { review[current] = !review[current]; saveState(); render(); }
function submitTest() {
  if (!confirm("Submit this test?")) return;
  submitted = true;
  let correct=0, wrong=0, attempted=0;
  questions.forEach((q,i) => {
    if (answers[i]) {
      attempted++;
      if (answers[i] === q.ans) correct++; else wrong++;
    }
  });
  const skipped = questions.length - attempted;
  const marks = correct - wrong * 0.25;
  document.getElementById("testArea").style.display = "none";
  document.getElementById("resultArea").style.display = "block";
  document.getElementById("scoreBox").innerHTML = `
    <div class="score-box"><b><span class="math">{attempted}</b>Attempted</div>
    <div class="score-box"><b></span>{correct}</b>Correct</div>
    <div class="score-box"><b><span class="math">{wrong}</b>Wrong</div>
    <div class="score-box"><b></span>{marks.toFixed(2)}</b>Score</div>
  `;
  saveHistory({date:new Date().toLocaleString(), attempted, correct, wrong, skipped, marks:marks.toFixed(2)});
  localStorage.removeItem(TEST_ID + "_state");
  loadHistory();
}
function showReview() {
  let out = "<h3>Answer Review</h3>";
  questions.forEach((q,i) => {
    const status = !answers[i] ? "Skipped" : (answers[i] === q.ans ? "Correct" : "Wrong");
    out += `<div class="review-card">
      <b>Q<span class="math">{i+1}.</b> </span>{textFor(q)}<br>
      <span class="small">Your answer: <span class="math">{answers[i] || "-"} | Correct answer: </span>{q.ans} | Status: <span class="math">{status}</span>
    </div>`;
  });
  document.getElementById("reviewArea").innerHTML = out;
}
function restartTest() {
  if (!confirm("Restart this test?")) return;
  current=0; answers=Array(questions.length).fill(null); review=Array(questions.length).fill(false);
  totalSeconds = 60*60; submitted=false;
  localStorage.removeItem(TEST_ID + "_state");
  document.getElementById("resultArea").style.display = "none";
  document.getElementById("testArea").style.display = "block";
  render();
}
function tick() {
  if (submitted) return;
  let m = Math.floor(totalSeconds/60), s = totalSeconds % 60;
  document.getElementById("timer").textContent = String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");
  if (totalSeconds <= 0) {
    submitted = true;
    alert("Time is over. Test will be submitted.");
    submitted = false;
    submitTest();
  } else totalSeconds--;
  saveState();
}
function saveState() {
  localStorage.setItem(TEST_ID + "_state", JSON.stringify({current, answers, review, totalSeconds}));
}
function loadState() {
  const raw = localStorage.getItem(TEST_ID + "_state");
  if (raw) {
    try {
      const st = JSON.parse(raw);
      current = st.current ?? 0;
      answers = st.answers ?? answers;
      review = st.review ?? review;
      totalSeconds = st.totalSeconds ?? totalSeconds;
    } catch(e) {}
  }
}
function saveHistory(item) {
  const key = TEST_ID + "_history";
  let h = JSON.parse(localStorage.getItem(key) || "[]");
  h.unshift(item);
  h = h.slice(0,10);
  localStorage.setItem(key, JSON.stringify(h));
}
function loadHistory() {
  const h = JSON.parse(localStorage.getItem(TEST_ID + "_history") || "[]");
  document.getElementById("history").innerHTML = h.length ? h.map(x =>
    `<div class="history-item"><b></span>{x.date}</b><br>Score: <span class="math">{x.marks} | Correct: </span>{x.correct} | Wrong: ${x.wrong}</div>`
  ).join("") : "<p class='small'>No attempt yet.</p>";
}
loadState();
render();
loadHistory();
setInterval(tick, 1000);
</script>

  background:#fafafa;

    max-height:230px;
  }

(function(){
  const palette = document.getElementById("palette");
  if(palette && !palette.parentElement.classList.contains("palette-scroll")){
    const wrapper = document.createElement("div");
    wrapper.className = "palette-scroll";
    palette.parentNode.insertBefore(wrapper, palette);
    wrapper.appendChild(palette);
  }
})();

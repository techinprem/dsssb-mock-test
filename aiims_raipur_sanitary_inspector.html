<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIIMS Raipur Sanitary Inspector Grade-II Mock Test</title>
<style>
:root {
  --primary:#1f4fd8; --bg:#f4f6fb; --card:#fff; --text:#111827; --muted:#6b7280;
  --right:#16a34a; --wrong:#dc2626; --skip:#9ca3af;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,'Noto Sans Devanagari',sans-serif;background:var(--bg);color:var(--text)}
header{background:var(--primary);color:white;padding:14px 18px;position:sticky;top:0;z-index:10}
header h1{margin:0;font-size:18px}
.wrapper{max-width:1200px;margin:0 auto;padding:16px;display:grid;grid-template-columns:1fr 300px;gap:16px}
.card{background:var(--card);border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:18px}
.topbar{display:flex;gap:12px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:12px}
.badge{background:#eef2ff;color:#1f4fd8;padding:8px 12px;border-radius:999px;font-weight:700}
.timer{font-size:18px;font-weight:800;color:#b91c1c}
.qtext{font-size:19px;line-height:1.55;margin:16px 0;font-weight:700}
.opt{display:block;width:100%;text-align:left;margin:10px 0;padding:13px;border:1px solid #d1d5db;border-radius:10px;background:#fff;cursor:pointer;font-size:16px;line-height:1.4}
.opt:hover{background:#f8fafc}
.opt.selected{border-color:var(--primary);background:#eaf0ff}
.opt.correct{border-color:var(--right);background:#dcfce7}
.opt.wrong{border-color:var(--wrong);background:#fee2e2}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
button{border:none;border-radius:10px;padding:11px 15px;font-weight:700;cursor:pointer}
.primary{background:var(--primary);color:white}
.secondary{background:#e5e7eb;color:#111827}
.danger{background:#dc2626;color:white}
.palette{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:10px}
.num{padding:9px;border-radius:8px;background:#e5e7eb;text-align:center;cursor:pointer;font-weight:700}
.num.active{outline:3px solid var(--primary)}
.num.answered{background:#bfdbfe}
.num.review{background:#fde68a}
.legend{display:grid;gap:6px;margin-top:12px;color:var(--muted);font-size:13px}
.result{display:none}
table{width:100%;border-collapse:collapse;margin-top:12px}
th,td{border:1px solid #e5e7eb;padding:8px;text-align:left}
th{background:#f3f4f6}
@media(max-width:850px){.wrapper{grid-template-columns:1fr} header h1{font-size:15px} .qtext{font-size:17px}}
</style>
</head>
<body>
<header><h1>AIIMS Raipur — Sanitary Inspector Grade-II Mock Test</h1></header>
<div class="wrapper">
  <main class="card">
    <div id="testArea">
      <div class="topbar">
        <span class="badge" id="qCount">Question 1/100</span>
        <span class="timer" id="timer">90:00</span>
      </div>
      <div class="qtext" id="question"></div>
      <div id="options"></div>
      <div class="controls">
        <button class="secondary" onclick="prevQ()">Previous</button>
        <button class="secondary" onclick="clearAns()">Clear</button>
        <button class="secondary" onclick="toggleReview()">Mark for Review</button>
        <button class="primary" onclick="nextQ()">Next</button>
        <button class="danger" onclick="submitTest()">Submit Test</button>
      </div>
    </div>
    <div id="resultArea" class="result">
      <h2>Result</h2>
      <div id="scoreBox"></div>
      <div class="controls">
        <button class="primary" onclick="showReview()">Show Answer Review</button>
        <button class="secondary" onclick="restartTest()">Restart Test</button>
      </div>
      <div id="reviewArea"></div>
    </div>
  </main>
  <aside class="card">
    <h3>Question Palette</h3>
    <div class="palette" id="palette"></div>
    <div class="legend">
      <div>Blue = Answered</div>
      <div>Yellow = Marked for Review</div>
      <div>Grey = Not Answered</div>
    </div>
    <hr>
    <h3>Attempt History</h3>
    <div id="history"></div>
  </aside>
</div>
<script>
const TEST_ID = "aiims_raipur_sanitary_inspector_grade2_100q_v1";
const questions = [{"q": "निम्नलिखित में से कौनसा कचरा जैवनिम्नीकरणीय (बायोडिग्रेडेबल) है -", "opts": ["सिंथेटिक फाइबर", "पॉलीथीन बैग", "घास कतरन", "कागज"], "ans": 1}, {"q": "एनजीओ भारत में पानी की गुणवत्ता में सुधार करने के लिए निम्नलिखित भूमिकाओं में से कौनसी भूमिका निभाते हैं -", "opts": ["कम्पनियों के लिए स्वच्छ (संरक्षण) के रूप में कार्य करें।", "पानी की गुणवत्ता मानकों को निर्दिष्ट करें।", "पानी की गुणवत्ता से संबंधित मानकों का निष्पादन।", "इनमें से कोई नहीं"], "ans": 1}, {"q": "जल स्तर की गुणवत्ता सुनिश्चित करने के लिए केन्द्र सरकार निम्नलिखित में से कौनसी भूमिका निभाती है -", "opts": ["पानी की गुणवत्ता के मानकों का सुझाव", "पानी की गुणवत्ता सुनिश्चित करने के कानूनों का निर्माण", "पानी की गुणवत्ता के मानकों के उल्लंघन की जांच करें।", "इनमें से कोई नहीं"], "ans": 2}, {"q": "निम्नलिखित में से कौनसे पेय जल के स्रोत हैं -", "opts": ["तालाब", "नदी", "कुएँ", "उपरोक्त सभी"], "ans": 4}, {"q": "निम्न रासायनिक यौगिक में से कौनसा लम्बे समय तक प्रयोग किया जाता है -", "opts": ["ईथेन", "मीथेन", "अमोनिया", "क्लोरोफिनोल"], "ans": 2}, {"q": "निम्न में से कौनसा अपशिष्ट जल उपचार संयंत्र में पहला चरण होता है -", "opts": ["मल और कीचड़ अलग करना", "जैविक कीचड़ का एरोबिक अपघटन", "बड़े मलवे की स्क्रीनिंग", "क्लोरीन उपचार"], "ans": 3}, {"q": "निम्न में से कौनसा लवणीयता के लिए सत्य है -", "opts": ["पानी में घुले मिट्टी और कंकड़ होते हैं।", "रेत और खदान पानी में वाहक नहीं है।", "कार्बनिक पानी में तैरते ठोस", "पानी में तेल और ग्रीस"], "ans": 1}, {"q": "अपशिष्ट जल उपचार संयंत्र में अपशिष्ट और पानी को अलग करने के लिए निम्नलिखित में से कौनसा सत्य है -", "opts": ["घुले हुए ठोस हटाने", "कीचड़ अपशिष्ट जल से अलग", "क्लोरीन उपचार", "इनमें से कोई नहीं"], "ans": 2}, {"q": "ओजोन परत के लिए निम्नलिखित में से कौनसा सत्य है -", "opts": ["पौधों को हरा रंग प्रदान करता है।", "भूमि के जानवरों द्वारा श्वसन लेने के लिए आवश्यक", "यूवी किरणों से जीवित जीवों की सुरक्षा करता है।", "इनमें से कोई नहीं"], "ans": 3}, {"q": "शौचालय से सेप्टिक टैंक की न्यूनतम दूरी निम्न में से कौनसी है -", "opts": ["10 फीट", "8 फीट", let current = 0;
let answers = Array(questions.length).fill(null);
let review = Array(questions.length).fill(false);
let submitted = false;
let totalSeconds = 90 * 60;

function render(){
  const q = questions[current];
  document.getElementById('qCount').textContent = `Question ${current+1}/${questions.length}`;
  document.getElementById('question').innerHTML = (current+1)+'. '+q.q;
  const optDiv = document.getElementById('options');
  optDiv.innerHTML = '';
  q.opts.forEach((op, i)=>{
    const btn = document.createElement('button');
    btn.className = 'opt' + (answers[current]===i+1 ? ' selected':'');
    btn.innerHTML = `(${i+1}) ${op}`;
    btn.onclick = ()=>{ if(!submitted){ answers[current]=i+1; saveState(); render(); } };
    optDiv.appendChild(btn);
  });
  renderPalette();
}
function renderPalette(){
  const p = document.getElementById('palette'); p.innerHTML='';
  questions.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='num'+(i===current?' active':'')+(answers[i]?' answered':'')+(review[i]?' review':'');
    d.textContent=i+1; d.onclick=()=>{current=i; render();};
    p.appendChild(d);
  });
}
function prevQ(){ if(current>0){current--; render();} }
function nextQ(){ if(current<questions.length-1){current++; render();} }
function clearAns(){ answers[current]=null; saveState(); render(); }
function toggleReview(){ review[current]=!review[current]; saveState(); render(); }
function submitTest(){
  if(!confirm('Submit test?')) return;
  submitted=true;
  let correct=0, wrong=0, attempted=0;
  questions.forEach((q,i)=>{ if(answers[i]){attempted++; if(answers[i]===q.ans) correct++; else wrong++;} });
  let marks = correct - (wrong*0.25);
  document.getElementById('testArea').style.display='none';
  document.getElementById('resultArea').style.display='block';
  document.getElementById('scoreBox').innerHTML = `
    <p><b>Total Questions:</b> ${questions.length}</p>
    <p><b>Attempted:</b> ${attempted} | <b>Correct:</b> ${correct} | <b>Wrong:</b> ${wrong} | <b>Skipped:</b> ${questions.length-attempted}</p>
    <p><b>Score with -0.25 negative marking:</b> ${marks.toFixed(2)} / ${questions.length}</p>`;
  saveHistory(correct, wrong, attempted, marks);
  localStorage.removeItem(TEST_ID+'_state');
  loadHistory();
}
function showReview(){
  let out='<h3>Answer Review</h3><table><tr><th>Q.</th><th>Your Ans.</th><th>Correct Ans.</th><th>Status</th></tr>';
  questions.forEach((q,i)=>{
    let st = !answers[i] ? 'Skipped' : (answers[i]===q.ans ? 'Correct' : 'Wrong');
    out += `<tr><td>${i+1}</td><td>${answers[i] || '-'}</td><td>${q.ans}</td><td>${st}</td></tr>`;
  });
  out += '</table>';
  document.getElementById('reviewArea').innerHTML = out;
}
function restartTest(){
  if(!confirm('Restart this test?')) return;
  answers=Array(questions.length).fill(null); review=Array(questions.length).fill(false); current=0; submitted=false; totalSeconds=90*60;
  localStorage.removeItem(TEST_ID+'_state');
  document.getElementById('resultArea').style.display='none';
  document.getElementById('testArea').style.display='block';
  render();
}
function tick(){
  if(submitted) return;
  let m=Math.floor(totalSeconds/60), s=totalSeconds%60;
  document.getElementById('timer').textContent = String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  if(totalSeconds<=0){ submitted=false; submitTest(); } else totalSeconds--;
}
function saveState(){
  localStorage.setItem(TEST_ID+'_state', JSON.stringify({answers,review,current,totalSeconds}));
}
function loadState(){
  const s=localStorage.getItem(TEST_ID+'_state');
  if(s){ try{ const obj=JSON.parse(s); answers=obj.answers||answers; review=obj.review||review; current=obj.current||0; totalSeconds=obj.totalSeconds||totalSeconds; }catch(e){} }
}
function saveHistory(correct, wrong, attempted, marks){
  const key=TEST_ID+'_history';
  let h=JSON.parse(localStorage.getItem(key)||'[]');
  h.unshift({date:new Date().toLocaleString(), correct, wrong, attempted, marks:marks.toFixed(2)});
  h=h.slice(0,10);
  localStorage.setItem(key, JSON.stringify(h));
}
function loadHistory(){
  const h=JSON.parse(localStorage.getItem(TEST_ID+'_history')||'[]');
  document.getElementById('history').innerHTML = h.length ? h.map(x=>`<p><b>${x.date}</b><br>Score: ${x.marks}, Correct: ${x.correct}, Wrong: ${x.wrong}</p>`).join('') : '<p>No attempt yet.</p>';
}
loadState(); render(); loadHistory(); setInterval(tick,1000);
</script>

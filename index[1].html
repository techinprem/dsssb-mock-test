const TEST_ID = "dsssb_pgt_history_31jul2025_shift2_part1_bilingual_v1";
const QUESTIONS = [{"id": 1, "section": "Mental Ability and Reasoning Ability", "qno": 1, "answer": 0, "lang": {"hi": {"question": "निम्नलिखित में से कौन-सा अक्षर-संख्या समूह दी गई श्रृंखला को तार्किक रूप से पूर्णण बनाने के लिए प्रश्न- चिह्न (?) के स्थान पर आएगा? MJN 51 PMQ 45 SPT 39 VSW 33 ?", "options": ["YVZ 27", "YUY 26", "YGP 26", "YWY 27"]}, "en": {"question": "Which letter-number group will replace the question mark (?) to logically complete the given series?\n\nMJN 51   PMQ 45   SPT 39   VSW 33   ?", "options": ["YVZ 27", "YUY 26", "YGP 26", "YWY 27"]}}, "mode": "bilingual"}, {"id": 2, "section": "Mental Ability and Reasoning Ability", "qno": 2, "answer": 0, "lang": {"hi": {"question": "उस युग्म का चयन कीजिए जो नीचे दिए गए युग्मों के दो समुच्चयों के समान पैटर्नन का अनुसरण करता है। दोनों युग्म समान पैटर्नन का अनुसरण करते हैं। QSU − OQS VXZ − TVX", "options": ["GIK−EGI", "BCD−ZBD", "BCD−YAC", "BDF−YBC"]}, "en": {"question": "Select the pair that follows the same pattern as the two sets of pairs given below. Both pairs follow the same pattern.\n\nQSU − OQS\nVXZ − TVX", "options": ["GIK−EGI", "BCD−ZBD", "BCD−YAC", "BDF−YBC"]}}, "mode": "bilingual"}, {"id": 3, "section": "Mental Ability and Reasoning Ability", "qno": 3, "answer": 0, "lang": {"hi": {"question": "खुशबू, सुरेश, रीना, नेहा, परी, यश, सपना और महक एक वर्गााकार मेज के चारों ओर उसके केंद्र की ओर अभिमुख होकर बैठे हैं। उनमें से कुछ मेज के कोनों पर बैठे हैं जबकि कुछ मेज की भुजाओं के ठीक बीच में बैठे हैं। परी के दाईं ओर से दूसरे और खुशबू के बाईं ओर से तीसरे स्थान पर यश बैठा है। सपना, महक के दाईं ओर से तीसरे स्थान पर बैठी है, जबकि महक, परी के ठीक पड़ोस में नहीं बैठी है। नेहा, यश के ठीक दाईं ओर बैठी है जो किसी एक कोने पर बैठा है। नेहा के दाईं ओर से तीसरे स्थान पर रीना बैठी है। निम्नलिखित चार में से तीन एक निश्चित तरीके से एकसमान हैं और इस प्रकार एक ग्रुप बनाते हैं। वह कौन है जो उस ग्रुप से संबंधित नहीं है?", "options": ["सुरेश", "महक", "रीना", "परी"]}, "en": {"question": "Khushboo, Suresh, Reena, Neha, Pari, Yash, Sapna and Mehak are sitting around a square table facing the centre. Some are sitting at the corners and some at the exact middle of the sides.\n\nYash sits second to the right of Pari and third to the left of Khushboo.\nSapna sits third to the right of Mehak, while Mehak is not an immediate neighbour of Pari.\nNeha sits immediately to the right of Yash, who sits at a corner.\nReena sits third to the right of Neha.\n\nThree of the following four are alike in a certain manner and form a group. Which one does not belong to that group?", "options": ["Suresh", "Mehak", "Reena", "Pari"]}}, "mode": "bilingual"}, {"id": 4, "section": "Mental Ability and Reasoning Ability", "qno": 4, "answer": 2, "lang": {"hi": {"question": "दिए गए कथनों और निष्कर्षों को ध्यानपूर्ववक पढ़िए। यह मानते हुए कि कथनों में दी गई जानकारी सत्य है, भले ही वह सामान्यतः ज्ञाात तथ्यों से भिन्न प्रतीत होती हो, निर्णणय कीजिए कि दिए गए निष्कर्षों में से कौन-सा/से निष्कर्षष, कथनों का तार्किक रूप से अनुसरण करता है/करते हैं। कथन: सभी संतरे, अंगूर हैं। कुछ अंगूर, कीवी हैं। कोई संतरा, केला नहीं है। निष्कर्षष: (I) कोई अंगूर, केला नहीं है। (II) कुछ कीवी, अंगूर हैं।", "options": ["न तो निष्कर्षष I और न ही II अनुसरण करता है", "निष्कर्षष I और II दोनों अनुसरण करते हैं", "केवल निष्कर्षष II अनुसरण करता है", "केवल निष्कर्षष I अनुसरण करता है"]}, "en": {"question": "Read the given statements and conclusions carefully. Assuming that the information given in the statements is true, even if it appears to be at variance with commonly known facts, decide which of the given conclusions logically follows.\n\nStatements:\nAll oranges are grapes.\nSome grapes are kiwis.\nNo orange is a banana.\n\nConclusions:\n(I) No grape is a banana.\n(II) Some kiwis are grapes.", "options": ["Neither conclusion I nor II follows", "Both conclusions I and II follow", "Only conclusion II follows", "Only conclusion I follows"]}}, "mode": "bilingual"}, {"id": 5, "section": "Mental Ability and Reasoning Ability", "qno": 5, "answer": 1, "lang": {"hi": {"question": "यह प्रश्न निम्नलिखित शब्दों पर आधारित है।\n\nHINT   TRAY   ARCH   PALE\n\nप्रत्येक शब्द में प्रत्येक स्वर को अंग्रेजी वर्णमाला क्रम में उसके तुरंत बाद वाले अक्षर से और प्रत्येक व्यंजन को उसके तुरंत पहले वाले अक्षर से बदल दिया जाता है। इस प्रकार बने कितने अक्षर-समूहों में अक्षर ‘B’ होगा?", "options": ["एक", "तीन", "दो", "चार"]}, "en": {"question": "This question is based on the following words. HINT TRAY ARCH PALE In each of the words, each vowel is changed to the letter immediately following it in the English alphabetical order and each consonant is changed to the letter immediately preceding it in the English alphabetical order. How many letter-clusters thus formed have the letter ‘B’ in it?", "options": ["One", "T hree", "Two", "Four"]}}, "mode": "bilingual"}, {"id": 6, "section": "Mental Ability and Reasoning Ability", "qno": 6, "answer": 3, "lang": {"hi": {"question": "D, E, I, J, M, N और Q में से प्रत्येक की परीक्षाा, सोमवार से शुरू होकर रविवार को समाप्त होने वाले एक ही सप्ताह के अलग-अलग दिन है। D की परीक्षाा बुधवार को है। I की परीक्षाा के बाद केवल एक व्यक्ति की परीक्षाा है। D और J की परीक्षाा के बीच केवल तीन व्यक्तियों की परीक्षाा है। N और M की परीक्षाा के बीच केवल एक व्यक्ति की परीक्षाा है। E की परीक्षाा, N की परीक्षाा से ठीक पहले है। निम्नलिखित में से किसकी परीक्षाा शुक्रवार को है?", "options": ["N", "I", "E", "Q"]}, "en": {"question": "Each of D, E, I, J, M, N and Q has an exam on a different day of the same week starting on Monday and ending on Sunday. D's exam is on Wednesday. Only one person has an exam after I. There are only three persons between the exams of D and J. There is only one person between the exams of N and M. E's exam is immediately before N's exam. Whose exam is on Friday?", "options": ["N", "I", "E", "Q"]}}, "mode": "bilingual"}, {"id": 7, "section": "Mental Ability and Reasoning Ability", "qno": 7, "answer": 3, "lang": {"hi": {"question": "एक निश्चित कूट भाषा में,\n'brush daily teeth' को 'qo lu fc' लिखा गया है,\n'brush bath water' को 'mb xy qo' लिखा गया है और\n'in daily water' को 'lu mj xy' लिखा गया है।\n(सभी कूट केवल दो अक्षरों के हैं।)\n'daily' का कूट क्या है?", "options": ["co", "mj", "fc", "lu"]}, "en": {"question": "In a certain code, 'brush daily teeth' is coded as 'qo lu fc', 'brush bath water ' is coded as 'mb xy qo' and 'in daily water' is coded as 'lu mj xy'. (All the codes are two letter codes only.) What is the code for daily?", "options": ["co", "mj", "fc", "lu"]}}, "mode": "bilingual"}, {"id": 8, "section": "Mental Ability and Reasoning Ability", "qno": 8, "answer": 2, "lang": {"hi": {"question": "यदि ‘A’ का अर्थ ‘÷’, ‘B’ का अर्थ ‘×’, ‘C’ का अर्थ ‘+’ और ‘D’ का अर्थ ‘−’ है, तो निम्न समीकरण में प्रश्न-चिह्न (?) के स्थान पर क्या आएगा?\n\n350 A 7 C 90 D 6 B 15 = ?", "options": ["52", "59", "50", "54"]}, "en": {"question": "If ‘A’ stands for ‘÷’ , ‘B’ stands for ‘×’, ‘C’ stands for ‘+’ and ‘D’ stands for ‘-’ , what will be come in place of question mark ‘?’ in the following equation? 350 A 7 C 90 D 6 B 15 = ?", "options": ["52", "59", "50", "54"]}}, "mode": "bilingual"}, {"id": 9, "section": "Mental Ability and Reasoning Ability", "qno": 9, "answer": 1, "lang": {"hi": {"question": "अंग्रेजी वर्णणमाला क्रम पर आधारित, निम्नलिखित चार अक्षर-समूह युग्मों में से तीन एक निश्चित तरीके से एकसमान हैं और इस प्रकार एक ग्रुप बनाते हैं। कौन-सा अक्षर-समूह युग्म उस ग्रुप से संबंधित नहीं है? (नोट: असंगत अक्षर-समूह युग्म, व्यंजनों/स्वरों की संख्या या उनकी स्थिति पर आधारित नहीं है।)", "options": ["QM – NH", "ZL – WH", "VH – SC", "GL – DG"]}, "en": {"question": "Based on the English alphabetical order, three of the following four letter-cluster pairs are alike in a certain manner and form a group. Which letter-cluster pair does not belong to that group?\n(Note: The odd pair is not based on the number of consonants/vowels or their position.)", "options": ["QM – NH", "ZL – WH", "VH – SC", "GL – DG"]}}, "mode": "bilingual"}, {"id": 10, "section": "Mental Ability and Reasoning Ability", "qno": 10, "answer": 0, "lang": {"hi": {"question": "यदि ‘A’ का अर्थथ ‘÷’ है, ‘B’ का अर्थथ ‘×’ है, ‘C’ का अर्थथ ‘+’ है और ‘D’ का अर्थथ ‘−’ है, तो निम्नलिखित समीकरण में प्रश्न-चिह्न (?) के स्थान पर क्या आएगा? 40 D 32 A 8 B 6 C 13 = ?", "options": ["29", "38", "35", "23"]}, "en": {"question": "If ‘A’ means ‘÷’, ‘B’ means ‘×’, ‘C’ means ‘+’ and ‘D’ means ‘−’, what will come in place of the question mark (?) in the following equation?\n\n40 D 32 A 8 B 6 C 13 = ?", "options": ["29", "38", "35", "23"]}}, "mode": "bilingual"}, {"id": 11, "section": "Mental Ability and Reasoning Ability", "qno": 11, "answer": 3, "lang": {"hi": {"question": "दी गई श्रृंखला में प्रश्न-चिन्ह (?) के स्थान पर क्या आना चाहिए? 61 64 69 72 77 ?", "options": ["81", "82", "79", "80"]}, "en": {"question": "What should come in place of the question mark (?) in the given series?\n\n61 64 69 72 77 ?", "options": ["81", "82", "79", "80"]}}, "mode": "bilingual"}, {"id": 12, "section": "Mental Ability and Reasoning Ability", "qno": 12, "answer": 2, "lang": {"hi": {"question": "एक पंक्ति में कुछ व्यक्ति उत्तर दिशा की ओर अभिमुख होकर बैठे हैं। N, R के ठीक दाईं ओर बैठा है। T, U के दाईं ओर दूसरे स्थान पर बैठा है। J, H के बाईं ओर तीसरे स्थान पर बैठा है। R और H के बीच केवल दो व्यक्ति बैठे हैं। N और U के बीच केवल दो व्यक्ति बैठे हैं। यदि पंक्ति में कोई अन्य व्यक्ति नहीं बैठा है, तो बैठे व्यक्तियों की कुल संख्या कितनी है?4394", "options": ["12", "14", "13", "15"]}, "en": {"question": "Some persons are sitting in a row facing north. N sits immediately to the right of R. T sits second to the right of U. J sits third to the left of H. Only two persons sit between R and H. Only two persons sit between N and U. If no other person is sitting in the row, what is the total number of persons sitting in the row?", "options": ["12", "14", "13", "15"]}}, "mode": "bilingual"}, {"id": 13, "section": "Mental Ability and Reasoning Ability", "qno": 13, "answer": 0, "lang": {"hi": {"question": "निम्नलिखित संख्या-युग्मों में, पहली संख्या पर निश्चित गणितीय संक्रियाएँ करके दूसरी संख्या प्राप्त की जाती है। किन संख्‍याओं द्वाारा X और Y को प्रतिस्‍थापित किया जाना चाहिए जिससे कि :: के बाईं ओर की दो संख्याओं द्वाारा अनुसरित पैटर्नन, :: के दाईं ओर की दो संख्याओं द्वाारा अनुसरित पैटर्नन के समान हो जाए? (नोट: संख्याओं को उनके घटक अंकों में तोड़े बिना, संक्रियाएँ पूर्णण संख्याओं पर की जानी चाहिए। उदाहरण के लिए 13 को लीजिए - 13 पर संक्रियाएँ जैसे कि 13 में जोड़ना / घटाना / गुणा करना आदि 13 पर ही की जा सकती है। 13 को 1 और 3 में तोड़ने और फिर 1 और 3 पर गणितीय संक्रियाएँ करने की अनुमति नहीं है।) X : 143 :: 17 : Y", "options": ["X = 12, Y = 288", "X = 12, Y = 290", "X = 13, Y = 289", "X = 13, Y = 288"]}, "en": {"question": "In the following number-pairs, the second number is obtained by applying certain mathematical operations to the first number. Which numbers should replace X and Y so that the pattern followed by the two numbers on the left of :: is the same as the pattern followed by the two numbers on the right of ::?\n(Note: Operations must be performed on whole numbers without breaking them into digits.)\n\nX : 143 :: 17 : Y", "options": ["X = 12, Y = 288", "X = 12, Y = 290", "X = 13, Y = 289", "X = 13, Y = 288"]}}, "mode": "bilingual"}, {"id": 14, "section": "Mental Ability and Reasoning Ability", "qno": 14, "answer": 3, "lang": {"hi": {"question": "A, B, C, D, E और F प्रत्येक ने अलग-अलग अंक प्राप्त किए। केवल तीन व्यक्तियों ने D से अधिक अंक प्राप्त किए। B ने C से अधिक, लेकिन A से कम अंक प्राप्त किए। E ने F से कम अंक प्राप्त किए। A ने सबसे अधिक अंक प्राप्त किए, E ने सबसे कम अंक प्राप्त किए। उनमें से किसने दूसरे सबसे कम अंक प्राप्त किए?", "options": ["C", "D", "E", "F"]}, "en": {"question": "A, B, C, D, E and F each obtained different marks. Only three persons obtained more marks than D. B obtained more marks than C but less than A. E obtained less marks than F. A obtained the highest marks and E obtained the lowest marks. Who obtained the second lowest marks?", "options": ["C", "D", "E", "F"]}}, "mode": "bilingual"}, {"id": 15, "section": "Mental Ability and Reasoning Ability", "qno": 15, "answer": 2, "lang": {"hi": {"question": "यह प्रश्न निम्नलिखित शब्दों पर आधारित है।\n\nBARD   DAME   MAID   SEND\n\nप्रत्येक शब्द में प्रत्येक अक्षर को अंग्रेजी वर्णमाला क्रम में उसके तुरंत बाद वाले अक्षर से बदल दिया जाता है। इस प्रकार बने कितने अक्षर-समूहों में कोई स्वर नहीं होगा?", "options": ["दो", "तीन", "कोई नहीं", "एक"]}, "en": {"question": "This question is based on the following words. BARD DAME MAID SEND In each of the words, each letter is changed to the letter immediately following it in the English alphabetical order. How many letter-clusters thus formed have no vowel?", "options": ["Two", "T hree", "None", "One"]}}, "mode": "bilingual"}, {"id": 16, "section": "Mental Ability and Reasoning Ability", "qno": 16, "answer": 2, "lang": {"hi": {"question": "निम्नलिखित श्रृंखला में केवल एक अक्षर-समूह गलत है। गलत अक्षर-समूह का चयन करें। BEF GJK LOP QTU VYZ ADE FGH", "options": ["VYZ", "GJK", "FGH", "LOP"]}, "en": {"question": "Only one letter-cluster in the following series is wrong. Select the wrong letter-cluster.\n\nBEF  GJK  LOP  QTU  VYZ  ADE  FGH", "options": ["VYZ", "GJK", "FGH", "LOP"]}}, "mode": "bilingual"}, {"id": 17, "section": "Mental Ability and Reasoning Ability", "qno": 17, "answer": 3, "lang": {"hi": {"question": "इस प्रश्न में एक कथन के बाद दो धारणाएँ I और II दी गई हैं। आपको कथन में दी गई हर बात को सत्य मानना है और निर्णय करना है कि कौन-सी धारणा कथन में निहित है।\n\nकथन:\nकेवल आरक्षण वाले ग्राहकों को ही रात 8 बजे के बाद रेस्तरां में प्रवेश की अनुमति है।\n\nधारणाएँ:\nI. रेस्तरां में बैठने के लिए आरक्षण स्वीकार करने की नीति है।\nII. रात 8 बजे के बाद रेस्तरां में प्रवेश केवल आरक्षण वाले व्यक्तियों तक सीमित है।", "options": ["न तो धारणा I और न ही II निहित है।", "केवल धारणा I निहित है।", "केवल धारणा II निहित है।", "धारणा I और II दोनों निहित हैं।"]}, "en": {"question": "In this question, a statement is followed by two assumptions numbered I and II. You have to assume everything in the statement to be true and decide which of the assumptions is implicit in the statement. Statement: Only customers with a reservation are allowed to enter the restaurant after 8 p.m. Assumptions: I. The restaurant has a policy of accepting reservations for seating. II. After 8 p.m., entry to the restaurant is restricted to individuals with reservations.", "options": ["Neither assumption I nor II is implicit.", "Only assumption I is implicit.", "Only assumption II is implicit.", "Both assumptions I and II are implicit."]}}, "mode": "bilingual"}, {"id": 18, "section": "Mental Ability and Reasoning Ability", "qno": 18, "answer": 0, "lang": {"hi": {"question": "अंग्रेजी वर्णणमाला क्रम के आधार पर, निम्नलिखित चार अक्षर-समूहों में से तीन एक निश्चित तरीके से एकसमान हैं और इस प्रकार वे एक ग्रुप बनाते हैं। कौन-सा अक्षर-समूह उस ग्रुप से संबंधित नहीं है? (नोट: असंगत अक्षर-समूह, व्यंजनों/स्वरों की संख्या या उनकी स्थिति पर आधारित नहीं है।)", "options": ["ILL", "ACD", "JLM", "DFG"]}, "en": {"question": "Based on the English alphabetical order, three of the following four letter-clusters are alike in a certain manner and form a group. Which letter-cluster does not belong to that group?\n(Note: The odd letter-cluster is not based on the number of consonants/vowels or their position.)", "options": ["ILL", "ACD", "JLM", "DFG"]}}, "mode": "bilingual"}, {"id": 19, "section": "Mental Ability and Reasoning Ability", "qno": 19, "answer": 2, "lang": {"hi": {"question": "‘A + B’ का अर्थथ है कि ‘A, B का पति है’, ‘A – B’ का अर्थथ है कि ‘A, B की माता है’, ‘A $ B’ का अर्थथ है कि ‘A, B का पुत्र है’, ‘A * B’ का अर्थथ है कि ‘A, B की बहन है’। निम्नलिखित में से किसका अर्थथ है कि H, P के पुत्र का पुत्र है? I. P – B * A * H – Z II. A + B – G – H $ K $ P * L III. D – H + Q – F * G + P IV. D + Z * Q – H $ P", "options": ["केवल I", "केवल I, II, III", "केवल II", "केवल III"]}, "en": {"question": "‘A + B’ means ‘A is the husband of B’,\n‘A – B’ means ‘A is the mother of B’,\n‘A $ B’ means ‘A is the son of B’,\n‘A * B’ means ‘A is the sister of B’.\n\nWhich of the following means that H is the son of P's son?\nI. P – B * A * H – Z\nII. A + B – G – H $ K $ P * L\nIII. D – H + Q – F * G + P\nIV. D + Z * Q – H $ P", "options": ["Only I", "Only I, II, III", "Only II", "Only III"]}}, "mode": "bilingual"}, {"id": 20, "section": "Mental Ability and Reasoning Ability", "qno": 20, "answer": 1, "lang": {"hi": {"question": "एक निश्चित तर्कक के अनुसार, 15, 50 से संबंधित है। उसी तर्कक के अनुसार, 29, 92 से संबंधित है। उसी तर्कक के अनुसार, 36 दिए गए विकल्पों में से किससे संबंधित है? (नोट: संख्याओं को उनके घटक अंकों में तोड़े बिना, संक्रियाएँ पूर्णण संख्याओं पर की जानी चाहिए। उदाहरणार्थथ 13 लीजिए - 13 पर संक्रियाएँ जैसे 13 में जोड़ना/घटाना/गुणा करना किया जा सकता है। 13 को 1 और 3 में तोड़ना तथा फिर 1 और 3 पर गणितीय संक्रियाएँ करने की अनुमति नहीं है।)", "options": ["109", "113", "107", "108"]}, "en": {"question": "According to a certain logic, 15 is related to 50. According to the same logic, 29 is related to 92. According to the same logic, 36 is related to which of the following options?\n(Note: Operations must be performed on whole numbers without breaking them into digits.)", "options": ["109", "113", "107", "108"]}}, "mode": "bilingual"}, {"id": 21, "section": "General Awareness", "qno": 1, "answer": 3, "lang": {"hi": {"question": "ग्रामीण बैंकिंग में औपचारिक ऋण वितरण तंत्र की मुख्य आलोचना क्या है?", "options": ["यह अत्यधिक ब्याज दरें लगाता है।", "यह केवल शहरी क्षेत्रों को ऋण देता है।", "यह कृषि ऋण को समाप्त करता है।", "यह जमा संग्रहण और ऋण वसूली में प्रभावी नहीं है।"]}, "en": {"question": "What is the main criticism of the formal credit delivery mechanism in rural banking?", "options": ["It charges exorbitant interest rates.", "It provides credit to urban areas only.", "It eliminates agricultural lending.", "It is ineffective in deposit mobilisation and loan recovery."]}}, "mode": "bilingual"}, {"id": 22, "section": "General Awareness", "qno": 2, "answer": 0, "lang": {"hi": {"question": "जून 2025 में, भारत का पहला ई-वेस्ट रीसाइक्लिंग पार्कक कहाँ स्थापित किया जा रहा है?", "options": ["होलंबी कलां, दिल्ली", "MP नगर, भोपाल", "गाचीबोवली, हैदराबाद", "व्हाइटफील्ड, बेंगलुरु"]}, "en": {"question": "In June 2025, where is India's first e-waste recycling park being established?", "options": ["Holambi Kalan, Delhi", "MP Nagar, Bhopal", "Gachibowli, Hyderabad", "Whitefield, Bengaluru"]}}, "mode": "bilingual"}, {"id": 23, "section": "General Awareness", "qno": 3, "answer": 3, "lang": {"hi": {"question": "पश्चिमी चक्रवाती विक्षोभ ____________ में उत्पन्न होने वाले शीतोष्ण चक्रवात हैं।", "options": ["प्रशांत महासागर", "अरब सागर", "हिंद महासागर", "भूमध्य सागर"]}, "en": {"question": "Western cyclonic disturbances are temperate cyclones originating in ____________.", "options": ["Pacific Ocean", "Arabian Sea", "Indian Ocean", "Mediterranean Sea"]}}, "mode": "bilingual"}, {"id": 24, "section": "General Awareness", "qno": 4, "answer": 0, "lang": {"hi": {"question": "निम्नलिखित में से किसने कृष्णा जिले में फॉरवर्डड ब्लॉक की शाखा स्थापित की?", "options": ["पेटा बापैया", "राजेंद्र प्रसाद", "सुभाष चंद्र बोस", "भगत सिंह"]}, "en": {"question": "Who among the following established a branch of the Forward Bloc in Krishna district?", "options": ["Peta Bapayya", "Rajendra Prasad", "Subhas Chandra Bose", "Bhagat Singh"]}}, "mode": "bilingual"}, {"id": 25, "section": "General Awareness", "qno": 5, "answer": 0, "lang": {"hi": {"question": "अंकुरण स्तर (Stratum germinativum) को निम्नलिखित में से किस नाम से जाना जाता है, जिसमें केरेटिन प्रोटीन का उत्पादन करने वाली केरेटिनोसाइट स्टेम कोशिकाएँ पाई जाती हैं?", "options": ["आधारी कोशिका स्तर (Basal cell layer)", "शूक कोशिका स्तर (Prickle cell layer)", "स्पष्ट स्तर (Clear layer)", "कणीय स्तर (Granular layer)"]}, "en": {"question": "Stratum germinativum is known by which of the following names, in which keratinocyte stem cells producing keratin protein are found?", "options": ["Basal cell layer", "Prickle cell layer", "Cl swer": 0, "lang": {"hi": {"question": "दिसंबर 2024 तक की स्थिति के अनुसार, निम्नलिखित में से कौन-सी भाषाएं भारत की शास्त्रीय भाषाएं हैं?", "options": ["कन्नड़, तेलुगू", "गुजराती, कन्नड़, तेलुगु, अवधी", "गुजराती, कन्नड़, तेलुगु", "तेलुगु, अवधी"]}, "en": {"question": "As of December 2024, which of the following languages are classical languages of India?", "options": ["Kannada, Telugu", "Gujarati, Kannada, Telugu, Awadhi", "Gujarati, Kannada, Telugu", "Telugu, Awadhi"]}}, "mode": "bilingual"}, {"id": 34, "section": "General Awareness", "qno": 14, "answer": 1, "lang": {"hi": {"question": "मदुरै में, 'चिथिराई तिरुविका (Chithirai Thiruvizha)' उत्सव निम्नलिखित में से किस उद्देश्य से मनाया जाता है?", "options": ["भगवान विष्णु के जन्मोत्सव का उत्सव", "भगवान शिव और देवी मीनाक्षी के दिव्य विवाह का उत्सव", "भगवान शिव के जन्मोत्सव का उत्सव", "बुराई पर अच्छाई की विजय का उत्सव"]}, "en": {"question": "In Madurai, the 'Chithirai Thiruvizha' festival is celebrated for which purpose?", "options": ["Celebration of Lord Vishnu's birth anniversary", "Celebration of the divine wedding of Lord Shiva and Goddess Meenakshi", "Celebration of Lord Shiva's birth anniversary", "Celebration of the victory of good over evil"]}}, "mode": "bilingual"}, {"id": 35, "section": "General Awareness", "qno": 15, "answer": 2, "lang": {"hi": {"question": "मानव शरीरक्रिया विज्ञाान में पित्त महत्वपूर्णण भूमिका निभाता है। पित्त मुख्यतः किस अंग तंत्र से संबंधित है?", "options": ["हृद्‍वााहिका तंत्र", "श्वसन तंत्र", "पाचन तंत्र", "तंत्रिका तंत्र"]}, "en": {"question": "Bile plays an important role in human physiology. Bile is mainly associated with which organ system?", "options": ["Cardiovascular system", "Respiratory system", "Digestive system", "Nervous system"]}}, "mode": "bilingual"}, {"id": 36, "section": "General Awareness", "qno": 16, "answer": 2, "lang": {"hi": {"question": "निम्नलिखित में से कौन-सी विशेषता भारतीय संविधान की प्रमुख विशेषता नहीं है?", "options": ["संघवाद", "संसदीय प्रणाली", "राष्ट्रपति प्रणाली", "धर्मनिरपेक्षता"]}, "en": {"question": "Which feature is NOT a salient feature of the Indian Constitution?", "options": ["Federalism", "Parliamentary System", "Presidential System", "Secularism"]}}, "mode": "bilingual"}, {"id": 37, "section": "General Awareness", "qno": 17, "answer": 2, "lang": {"hi": {"question": "Chetan Ltd. फल जैम बनाने के व्यवसाय में लगी है। निम्नलिखित में से कौन-से कारक Chetan Ltd. के व्यवसाय को प्रभावित कर सकते हैं?\n1. बाजार में उपलब्ध सॉफ्ट ड्रिंक्स की कीमत।\n2. फल जैम बनाने की विधियों में तकनीकी प्रगति।\n3. भविष्य की बाजार स्थितियों के संबंध में Chetan Ltd. की अपेक्षाएँ।\n4. बाजार में अन्य फल जैमों की कीमतें।", "options": ["1 और 2", "2 और 3", "2, 3 और 4", "1 और 3"]}, "en": {"question": "Chetan Ltd. is engaged in the business of making fruit jam. Which of the following factors can influence the business of Chetan Ltd? 1. The price of soft drinks available in the market. 2. Technological advancements in methods of manufacturing of fruit jam. 3. Expectations of Chetan Ltd. concerning future market conditions. 4. Prices of other fruit jams in the market.", "options": ["1 and 2", "2 and 3", "2, 3 and 4", "1 and 3"]}}, "mode": "bilingual"}, {"id": 38, "section": "General Awareness", "qno": 18, "answer": 3, "lang": {"hi": {"question": "जुलाई 2025 में, निम्नलिखित में से किस कंपनी को भारत की पहली निजी अंतरिक्ष-आधारित इंटरनेट सेवा शुरू करने के लिए IN-SPACe से मंजूरी मिली?", "options": ["विश्वम टेक", "भारत टेक", "अन्ता टेक", "अनंत टेक"]}, "en": {"question": "In July 2025, which of the following companies received approval from IN-SPACe to launch India's first private space-based internet service?", "options": ["Vishwam Tech", "Bharat Tech", "Anta Tech", "Anant Tech"]}}, "mode": "bilingual"}, {"id": 39, "section": "General Awareness", "qno": 19, "answer": 2, "lang": {"hi": {"question": "उत्तरी मैदानों और केरल में उच्च जनसंख्या घनत्व का क्या कारण है?", "options": ["पथरीले भूभाग और उथली मिट्टी", "पहाड़ीी भूभाग और मध्यम वर्षाा", "समतल मैदान, उपजाऊ मिट्टी और पर्यााप्त मात्रा में वर्षाा", "नतोन्नत भूभाग और प्रतिकूल जलवायु"]}, "en": {"question": "What is the reason for high population density in the Northern Plains and Kerala?", "options": ["Rocky terrain and shallow soil", "Hilly terrain and moderate rainfall", "Level plains, fertile soil and sufficient rainfall", "Undulating terrain and adverse climate"]}}, "mode": "bilingual"}, {"id": 40, "section": "General Awareness", "qno": 20, "answer": 3, "lang": {"hi": {"question": "निम्नलिखित में से कौन-सा कार्यक्रम भारत में ग्रामीण अवसंरचना विकास में शामिल नहीं है?", "options": ["संपूर्ण स्वच्छता अभियान (TSC)", "भारत निर्माण", "इंदिरा आवास योजना (IAY)", "एकीकृत कम लागत स्वच्छता योजना (ILCS)"]}, "en": {"question": "Which of the following programmes is NOT included in rural infrastructure development in India?", "options": ["Total Sanitation Campaign (TSC)", "Bharat Nirman", "Indira Awas Yojana (IAY)", "Integrated Low-Cost Sanitation Scheme (ILCS)"]}}, "mode": "bilingual"}, {"id": 41, "section": "Numerical Aptitude and Data Interpretation", "qno": 1, "answer": 1, "lang": {"hi": {"question": "एक वॉशिंग मशीन की कीमत एक टीवी की कीमत से 70% कम है। यदि वॉशिंग मशीन की कीमत में 90% की व्रद्धि हो जाती है और टीवी की कीमत में 14% की कमी हो जाती है, तो 5 वॉशिंग मशीन और 6 टीवी की कुल कीमत में कितने प्रतिशत परिवर्ततन होगा?", "options": ["11% की कमी", "6.8% की वृद्धि", "1% की वृद्धि", "5% की कमी"]}, "en": {"question": "The price of a washing machine is 70% less than the price of a TV. If the price of the washing machine increases by 90% and the price of the TV decreases by 14%, what will be the percentage change in the total price of 5 washing machines and 6 TVs?", "options": ["11% decrease", "6.8% increase", "1% increase", "5% decrease"]}}, "mode": "bilingual"}, {"id": 42, "section": "Numerical Aptitude and Data Interpretation", "qno": 2, "answer": 3, "lang": {"hi": {"question": "10.5 cm ऊँचाई और 14 cm व्यास वाले ठोस बेलन का आयतन (cm³ में) क्या है?", "options": ["1717", "1716", "1616", "1617"]}, "en": {"question": "What is the volume (in cm3) of a solid cylinder of height 10.5 cm and diameter 14 cm?", "options": ["1717", "1716", "1616", "1617"]}}, "mode": "bilingual"}, {"id": 43, "section": "Numerical Aptitude and Data Interpretation", "qno": 3, "answer": 3, "lang": {"hi": {"question": "यदि 88 : y :: y : 22 है, तो y का धनात्मक मान ज्ञात कीजिए।", "options": ["36", "50", "39", "44"]}, "en": {"question": "If 88 : y :: y : 22, find the positive value of y.", "options": ["36", "50", "39", "44"]}}, "mode": "bilingual"}, {"id": 44, "section": "Numerical Aptitude and Data Interpretation", "qno": 4, "answer": 1, "lang": {"hi": {"question": "जब एक पियानो का विक्रय मूल्य ₹16,380 है, तो दुकानदार को 9% की हानि होती है। उस पियानो का विक्रय मूल्य (₹ में) कितना होना चाहिए ताकि उसे 10% का लाभ हो?", "options": ["20,000", "19,800", "21,800", "18,000"]}, "en": {"question": "When the selling price of a piano is ₹16,380, the shopkeeper incurs a loss of 9%. What should be the selling price (in ₹) of that piano so that he gains 10%?", "options": ["20,000", "19,800", "21,800", "18,000"]}}, "mode": "bilingual"}, {"id": 45, "section": "Numerical Aptitude and Data Interpretation", "qno": 5, "answer": 2, "lang": {"hi": {"question": "0.35 × 1.22 का मान ज्ञात कीजिए।", "options": ["25/91", "5/81", "35/81", "7/27"]}, "en": {"question": "Find the value of 0.35 × 1.22.", "options": ["25/91", "5/81", "35/81", "7/27"]}}, "mode": "bilingual", "image": "images/q45_formula.png"}, {"id": 46, "section": "Numerical Aptitude and Data Interpretation", "qno": 6, "answer": 3, "lang": {"hi": {"question": "500 m की दौड़ में, A, B को 12 सेकंड की बढ़त देता है और उसे 40 m से हरा देता है। 500 m की एक अन्य दौड़ में, A, B से 16 सेकंड से हरा देता है। उनकी चालों का अनुपात ज्ञाात कीजिए।", "options": ["25 : 34", "25 : 39", "24 : 43", "25 : 17"]}, "en": {"question": "In a 500 m race, A gives B a lead of 12 seconds and beats him by 40 m. In another 500 m race, A beats B by 16 seconds. Find the ratio of their speeds.", "options": ["25 : 34", "25 : 39", "24 : 43", "25 : 17"]}}, "mode": "bilingual"}, {"id": 47, "section": "Numerical Aptitude and Data Interpretation", "qno": 7, "answer": 0, "lang": {"hi": {"question": "दो नल एक टंकी को क्रमशः 10 घंटे और 7 घंटे में भर सकते हैं। एक तीसरा नल पूरी टंकी को 12 घंटे में खाली कर सकता है। यदि सभी नलों को एक साथ खोल दिया जाए, तो खाली टंकी को भरने में कितना समय लगेगा?", "options": ["6 18/67 घंटे", "12 18/67 घंटे", "8 18/67 घंटे", "13 18/67 घंटे"]}, "en": {"question": "Two taps can fill a tank in 10 hours and 7 hours respectively. A third tap can empty the full tank in 12 hours. If all taps are opened together, how long will it take to fill the empty tank?", "options": ["6 18/67 hours", "12 18/67 hours", "8 18/67 hours", "13 18/67 hours"]}}, "mode": "bilingual", "image": "images/q47_options.png"}, {"id": 48, "section": "Numerical Aptitude and Data Interpretation", "qno": 8, "answer": 0, "lang": {"hi": {"question": "यदि एक बिस्तर का विक्रय मूल्य प्रारंभिक विक्रय मूल्य का 8 गुना है, तो लाभ प्रारंभिक लाभ का 10 गुना है। प्रारंभिक लाभ प्रतिशत ज्ञाात कीजिए।", "options": ["350", "125", "80", "25"]}, "en": {"question": "If the selling price of a bed is 8 times the initial selling price, then the profit is 10 times the initial profit. Find the initial profit percentage.", "options": ["350", "125", "80", "25"]}}, "mode": "bilingual"}, {"id": 49, "section": "Numerical Aptitude and Data Interpretation", "qno": 9, "answer": 1, "lang": {"hi": {"question": "₹10,000 की राशि पर 2 वर्षों के लिए 4% वार्षिक दर से चक्रवृद्धि ब्याज में कितना अंतर होगा, जब ब्याज वार्षिक और अर्धवार्षिक रूप से संयोजित किया जाए? (दो दशमलव स्थान तक सही)", "options": ["₹8.98", "₹8.32", "₹7.12", "₹7.56"]}, "en": {"question": "What is the difference between the compound interests on a sum ₹10,000 for 2 years at the rate of 4% per annum, when compounded yearly and half-yearly (correct to two decimal places)?", "options": ["₹8.98", "₹8.32", "₹7.12", "₹7.56"]}}, "mode": "bilingual"}, {"id": 50, "section": "Numerical Aptitude and Data Interpretation", "qno": 10, "answer": 3, "lang": {"hi": {"question": "₹40 प्रति kg मूल्य वाली चीनी को ₹52 प्रति kg मूल्य वाली चीनी के साथ किस अनुपात में मिलाया जाए कि मिश्रण को ₹56.7 प्रति kg पर बेचने पर 35% का लाभ हो?", "options": ["1 : 8", "4 : 1", "4 : 11", "5 : 1"]}, "en": {"question": "In what ratio should sugar costing ₹40 per kg be mixed with sugar costing ₹52 per kg so that on selling the mixture at ₹56.7 per kg, a profit of 35% is obtained?", "options": ["1 : 8", "4 : 1", "4 : 11", "5 : 1"]}}, "mode": "bilingual"}, {"id": 51, "section": "Numerical Aptitude and Data Interpretation", "qno": 11, "answer": 2, "lang": {"hi": {"question": "इलेक्ट्रॉॉनिक वस्तुओं की एक क्लीयरेंस सेल में, एक वस्तु जिसका अंकित मूल्य ₹12,150 है, उसे अब ₹10,935 में बेचा जाता है, जिससे उसके अंकित मूल्य पर d% की छूट प्राप्त होती है। d का मान ज्ञाात कीजिए।", "options": ["11", "12", "10", "9"]}, "en": {"question": "In a clearance sale of electronic goods, an item with marked price ₹12,150 is now sold for ₹10,935, giving a discount of d% on its marked price. Find the value of d.", "options": ["11", "12", "10", "9"]}}, "mode": "bilingual"}, {"id": 52, "section": "Numerical Aptitude and Data Interpretation", "qno": 12, "answer": 3, "lang": {"hi": {"question": "तालिका, वर्षष 2019 - 2023 के दौरान पाँच अलग-अलग शहरों में रोपित किए गए पेड़ों की वर्षषवार संख्या को प्रदर्शित करती है। तालिका का अध्ययन कीजिए और नीचे दिए गए प्रश्न का उत्तर दीजिए। वर्षष चंडीगढ़ अहमदाबाद पुणे कोलकाता दिल्ली 2019 1800 2500 1800 2000 700 2020 2500 2300 1850 1800 1000 2021 2300 2400 1840 1760 960 2022 2440 1950 1900 1600 1100 2023 2250 2100 2000 1750 1250 वर्षष 2020, 2022 और 2023 को मिलाकर, किस शहर में सर्वााधिक पेड़ रोपित किए गए?", "options": ["पुणे", "कोलकाता", "अहमदाबाद", "चंडीगढ़"]}, "en": {"question": "The table shows the year-wise number of trees planted in five different cities during 2019–2023. Study the table and answer the question.\n\nYear | Chandigarh | Ahmedabad | Pune | Kolkata | Delhi\n2019 | 1800 | 2500 | 1800 | 2000 | 700\n2020 | 2500 | 2300 | 1850 | 1800 | 1000\n2021 | 2300 | 2400 | 1840 | 1760 | 960\n2022 | 2440 | 1950 | 1900 | 1600 | 1100\n2023 | 2250 | 2100 | 2000 | 1750 | 1250\n\nConsidering the years 2020, 2022 and 2023 together, in which city were the maximum number of trees planted?", "options": ["Pune", "Kolkata", "Ahmedabad", "Chandigarh"]}}, "mode": "bilingual"}, {"id": 53, "section": "Numerical Aptitude and Data Interpretation", "qno": 13, "answer": 1, "lang": {"hi": {"question": "पाँच संख्याओं का योग 655 है। पहली दो संख्याओं का औसत 82 है और तीसरी संख्या 113 है। शेष दो संख्याओं का औसत ज्ञात कीजिए।", "options": ["195", "189", "196", "190"]}, "en": {"question": "The sum of five numbers is 655. The average of the first two numbers is 82 and the third number is 113. Find the average of the remaining two numbers.", "options": ["195", "189", "196", "190"]}}, "mode": "bilingual"}, {"id": 54, "section": "Numerical Aptitude and Data Interpretation", "qno": 14, "answer": 2, "lang": {"hi": {"question": "यदि एक घन का आयतन 375√3 cm³ है, तो उसके विकर्ण की लंबाई क्या है?", "options": ["18 cm", "12 cm", "15 cm", "21 cm"]}, "en": {"question": "If the volume of a cube is 375√3 cm3, then the length of its diagonal is:", "options": ["18 cm", "12 cm", "15 cm", "21 cm"]}}, "mode": "bilingual"}, {"id": 55, "section": "Numerical Aptitude and Data Interpretation", "qno": 15, "answer": 1, "lang": {"hi": {"question": "संजीव एक दीवार 10 दिनों में बना सकता है और परवीन उसी दीवार को 15 दिनों में गिरा सकती है। यदि वे एकान्तर दिनों में कार्यय करते हैं और संजीव पहले दिन कार्यय शुरू करता है और इसी तरह आगे भी कार्यय जारी रहता है, तो पहली बार दीवार कितने दिनों में बनेगी?", "options": ["60", "55", "50", "58"]}, "en": {"question": "Sanjeev can build a wall in 10 days and Parveen can demolish the same wall in 15 days. If they work on alternate days and Sanjeev starts working on the first day, then in how many days will the wall be built for the first time?", "options": ["60", "55", "50", "58"]}}, "mode": "bilingual"}, {"id": 56, "section": "Numerical Aptitude and Data Interpretation", "qno": 16, "answer": 2, "lang": {"hi": {"question": "एक डिब्बे में दो द्रव A और B का मिश्रण 11 : 5 के अनुपात में है। जब मिश्रण के 27 लीटर निकाल लिए जाते हैं और डिब्बे को द्रव B से भर दिया जाता है, तो A और B का अनुपात 11 : 9 हो जाता है। प्रारंभ में डिब्बे में द्रव A कितने लीटर था? (एक दशमलव स्थान तक सही)", "options": ["95.1", "98.2", "92.8", "91.5"]}, "en": {"question": "A can contains a mixture of two liquids A and B in the ratio 11 : 5. When 27 litres of the mixture are drawn off and the can is filled with liquid B, the ratio of A and B becomes 11 : 9. How many litres of liquid A did the can contain initially? (Correct to one decimal place)", "options": ["95.1", "98.2", "92.8", "91.5"]}}, "mode": "bilingual"}, {"id": 57, "section": "Numerical Aptitude and Data Interpretation", "qno": 17, "answer": 2, "lang": {"hi": {"question": "मान ज्ञात कीजिए: [672 ÷ {15 + 7 × (2 − 4)}].", "options": ["675", "674", "672", "670"]}, "en": {"question": "Find the value of [672 ÷ {15 + 7 × (2 − 4)}].", "options": ["675", "674", "672", "670"]}}, "mode": "bilingual"}, {"id": 58, "section": "Numerical Aptitude and Data Interpretation", "qno": 18, "answer": 3, "lang": {"hi": {"question": "एक आदमी, 88 km की दूरी 8 घंटे में तय करने का निर्णणय लेता है, जिसमें वह आंशिक दूरी को पैदल और आंशिक दूरी को साइकिल से तय करना चाहता है। यदि उसकी पैदल चाल 8 km/hr है और साइकिल से चाल 16 km/hr है, तो वह पैदल कितनी दूरी (km में) तय करेगा?", "options": ["40.5", "39.5", "39", "40"]}, "en": {"question": "A man decides to cover a distance of 88 km in 8 hours, partly on foot and partly by bicycle. If his walking speed is 8 km/hr and cycling speed is 16 km/hr, how much distance (in km) will he cover on foot?", "options": ["40.5", "39.5", "39", "40"]}}, "mode": "bilingual"}, {"id": 59, "section": "Numerical Aptitude and Data Interpretation", "qno": 19, "answer": 3, "lang": {"hi": {"question": "एक व्यक्ति 10% वार्षिक साधारण ब्याज दर पर ₹5,019 जमा करता है। 20 वर्षष के अंत में उसे प्राप्त होने वाला कुल मिश्रधन (₹ में) ज्ञाात कीजिए।", "options": ["16,041", "14,378", "14,658", "15,057"]}, "en": {"question": "A person deposits ₹5,019 at 10% annual simple interest. Find the total amount (in ₹) received at the end of 20 years.", "options": ["16,041", "14,378", "14,658", "15,057"]}}, "mode": "bilingual"}, {"id": 60, "section": "Numerical Aptitude and Data Interpretation", "qno": 20, "answer": 0, "lang": {"hi": {"question": "किसी संख्या के 48% का 1% उस संख्या का कितना प्रतिशत है?", "options": ["0.48", "49", "0.048", "48"]}, "en": {"question": "1% of 48% of a number is what percent of that number?", "options": ["0.48", "49", "0.048", "48"]}}, "mode": "bilingual"}, {"id": 61, "section": "English Language and Comprehension", "qno": 1, "answer": 0, "lang": {"en": {"question": "Select the most appropriate option to fill in the blank. The young campaigners worked to promote environmental conservation with __________ dedication, often sacrificing their personal time to attend rallies and educate the community.", "options": ["zealous", "sporadic", "nonchalant", "fortuitous"]}}, "mode": "english"}, {"id": 62, "section": "English Language and Comprehension", "qno": 2, "answer": 0, "lang": {"en": {"question": "Select the most appropriate positive question tag to fill in the blank. The wedding procession hasn’t arrived, _______?", "options": ["has it", "would it", "should it", "could it"]}}, "mode": "english"}, {"id": 63, "section": "English Language and Comprehension", "qno": 3, "answer": 1, "lang": {"en": {"question": "Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph. P. Cryptographic techniques ensure that transactions remain secure and resistant to tampering. Q. Blockchain technology is revolutionising the way digital transactions are recorded and verified. R. This decentralised nature makes it difficult for any single entity to alter transaction records. S. Unlike traditional databases, blockchain operates as a distributed ledger across multiple nodes.", "options": ["SQPR", "QSRP", "QSPR", "QPSR"]}}, "mode": "english"}, {"id": 64, "section": "English Language and Comprehension", "qno": 4, "answer": 0, "lang": {"en": {"question": "Select the most appropriate idiom/proverb that can be used as a substitute for the underlined group of words in the given sentence. After working tirelessly for months, he finally saw the first signs of success in his project.", "options": ["saw the light at the end of the tunnel", "let the cat out of the bag", "jumped on the bandwagon", "threw caution to the wind"]}}, "mode": "english"}, {"id": 65, "section": "English Language and Comprehension", "qno": 5, "answer": 0, "lang": {"en": {"question": "One of the underlined words in the sentence given below is spelt incorrectly. Identify the INCORRECTLY spelt word. In his well-researched dissertation, he made an exhaustive refrence to recent studies that supported his hypothesis.", "options": ["refrence", "researched", "dissertation", "exhaustive"]}}, "mode": "english"}, {"id": 66, "section": "English Language and Comprehension", "qno": 6, "answer": 2, "lang": {"en": {"question": "Select the most appropriate option to fill in the blank. Though he could only donate a small amount to charity, he believed that every little drop ______.", "options": ["matters", "adds", "counts", "helps"]}}, "mode": "english"}, {"id": 67, "section": "English Language and Comprehension", "qno": 7, "answer": 2, "lang": {"en": {"question": "Select the option that can be used as a one-word substitute for the given group of words. The quality or the state of being quiet", "options": ["Quibble", "Quixotic", "Quiescence", "Quintessence"]}}, "mode": "english"}, {"id": 68, "section": "English Language and Comprehension", "qno": 8, "answer": 2, "lang": {"en": {"question": "Select the most appropriate ANTONYM of the underlined word to fill in the blank. Dr. Singh: \"Your proposal is quite rudimentary, and I’m afraid it lacks the depth required for doctoral research.\" Ms. Patel: \"I understand, but I was hoping to refine it further so it becomes more __________ before submission.\"", "options": ["elementary", "tentative", "sophisticated", "preliminary"]}}, "mode": "english"}, {"id": 69, "section": "English Language and Comprehension", "qno": 9, "answer": 1, "lang": {"en": {"question": "Select the most appropriate option to fill in the blank. I unexpectedly found myself enmeshed in a cohort of _______ would-be intellectuals, each fervently striving to display their erudition.", "options": ["taciturn", "garrulous", "laconic", "reticent"]}}, "mode": "english"}, {"id": 70, "section": "English Language and Comprehension", "qno": 10, "answer": 1, "lang": {"en": {"question": "Select the most appropriate positive question tag to fill in the blank. Meera wasn’t taking a nap, ________?", "options": ["would she", "was she", "could she", "will she"]}}, "mode": "english"}, {"id": 71, "section": "English Language and Comprehension", "qno": 11, "answer": 3, "lang": {"en": {"question": "Select the most appropriate option to fill in the blank. After receiving the devastating news, Emily sat ____________ by the window for hours, her gaze fixed on the distance, as the world around her seemed to fade away.", "options": ["serene", "contemplative", "pensive", "disconsolate"]}}, "mode": "english"}, {"id": 72, "section": "English Language and Comprehension", "qno": 12, "answer": 2, "lang": {"en": {"question": "Select the most appropriate ANTONYM of the highlighted word in the given sentence. Unlike his audacious predecessor, the new leader hesitated to make bold decisions.", "options": ["Gregarious", "Fearless", "T imid", "Bold"]}}, "mode": "english"}, {"id": 73, "section": "English Language and Comprehension", "qno": 13, "answer": 0, "lang": {"en": {"question": "Select the option that can be used as a one-word substitute for the given phrase. A person who talks in their sleep", "options": ["Somniloquist", "Somnambulist", "Hypochondriac", "Insomniac"]}}, "mode": "english"}, {"id": 74, "section": "English Language and Comprehension", "qno": 14, "answer": 0, "lang": {"en": {"question": "Identify the INCORRECTLY spelt word in the given sentence. Soft hues and fading light gave it an ethereal glow. Viewers were moved by the emotional resonnance it created.", "options": ["resonnance", "hues", "ethereal", "emotional"]}}, "mode": "english"}, {"id": 75, "section": "English Language and Comprehension", "qno": 15, "answer": 2, "lang": {"en": {"question": "Sentences of a paragraph are given below. While the first and the last sentences (S1 and S6) are in the correct order, the sentences in between are jumbled up. Arrange the sentences in the correct order to form a meaningful and coherent paragraph. S1) Social media has transformed the way people communicate. A) But it has also contributed to the spread of misinformation. B) Platforms like Twitter and Instagram allow real-time updates from anywhere in the world. C) Algorithms often prioritise sensational content over factual reporting. D) This results in viral posts that may not always be accurate or trustworthy. S6) Users now have the added responsibility of verifying what they consume online.", "options": ["CABD", "ABCD", "BACD", "BDAC"]}}, "mode": "english"}, {"id": 76, "section": "English Language and Comprehension", "qno": 16, "answer": 1, "lang": {"en": {"question": "Which of the following is a fact stated in the passage?", "options": ["Jews were allowed to retain their belongings while leaving.", "Only 10,000 Jews fled to Turkey, according to recent research.", "King Manuel of Portugal welcomed the Jewish refugees warmly.", "T he Alhambra Decree was issued to improve Spain’s economy."]}}, "mode": "english"}, {"id": 77, "section": "English Language and Comprehension", "qno": 17, "answer": 3, "lang": {"en": {"question": "What can be inferred from the passage?", "options": ["T he Inquisition encouraged Jews to return to Spain.", "T he Alhambra Decree was quickly revoked by Ferdinand and Isabella.", "All Jews who left Spain settled peacefully in Turkey.", "Forced conversions led to a hidden continuation of Jewish practices."]}}, "mode": "english"}, {"id": 78, "section": "English Language and Comprehension", "qno": 18, "answer": 1, "lang": {"en": {"question": "Select the most appropriate ANTONYM of the word 'expulsion' as used in the passage.", "options": ["Opposition", "Admission", "Confinement", "Evasion"]}}, "mode": "english"}, {"id": 79, "section": "English Language and Comprehension", "qno": 19, "answer": 0, "lang": {"en": {"question": "Select the most appropriate title for the passage.", "options": ["T he Forgotten Exodus: Spain’s Jewish Expulsion of 1492", "T he Portuguese Inquisition", "Columbus and the Spanish Empire", "T he Rise of Christianity in Europe"]}}, "mode": "english"}, {"id": 80, "section": "English Language and Comprehension", "qno": 20, "answer": 2, "lang": {"en": {"question": "What is the tone of the passage?", "options": ["Humorous and light-hearted", "Ironic and sarcastic", "Objective and analytical", "Nostalgic and poetic"]}}, "mode": "english"}, {"id": 81, "section": "Hindi Language and Comprehension", "qno": 1, "answer": 2, "lang": {"hi": {"question": "निम्नलिखित वाक्यों में उचित कारक चिह्न से रिक्त स्थानों की पूर्ति करे : मैं _______ स्कूल जा रहा हूँ।", "options": ["बस्ती के", "बस्ती", "बस्ती से", "बस्ती को"]}}, "mode": "hindi"}, {"id": 82, "section": "Hindi Language and Comprehension", "qno": 2, "answer": 3, "lang": {"hi": {"question": "मुहावरे का सही अर्थथ नहीं है -", "options": ["जैसे नागनाथ वैसे साँपनाथ-दो नीच व्यक्तियों में किसी को अच्छा नहीं कहा जा सकता", "कलेजे पर पत्थर रखना- धैर्यय धारण करना", "खटाई में डालना-उलझन पैदा करना", "नकेल हाथ में होना- आसानी से चोरी करना"]}}, "mode": "hindi"}, {"id": 83, "s  गोपाल ......... कक्षा का विद्याार्थी है।", "options": ["तीन", "नयी", "दोहरी", "तीसरी"]}}, "mode": "hindi"}, {"id": 90, "section": "Hindi Language and Comprehension", "qno": 10, "answer": 0, "lang": {"hi": {"question": "निम्नलिखित रेखांकित वाक्यांश के लिए विकल्प में से एक शब्द का चयन करें - मोहन किये गये उपकार को न मानने वाला व्यक्ति है।", "options": ["कृतघ्न", "उपकृत", "कृतज्ञ", "सराहना"]}}, "mode": "hindi"}, {"id": 91, "section": "Hindi Language and Comprehension", "qno": 11, "answer": 0, "lang": {"hi": {"question": "निम्नलिखित वाक्य खंड को सही क्रम में लिखिए। ईकाई भाषा की अक्षर है।", "options": ["भाषा की ईकाई अक्षर है।", "अक्षर भाषा ईकाई की है।", "है की ईकाई अक्षर भाषा।", "अक्षर है भाषा की ईकाई।"]}}, "mode": "hindi"}, {"id": 92, "section": "Hindi Language and Comprehension", "qno": 12, "answer": 0, "lang": {"hi": {"question": "निम्नलिखित वाक्यों में उचित कारक चिह्न से रिक्त स्थानों की पूर्ति करे : _______ कारण वह नहीं आया।", "options": ["बीमारी के", "बीमारी को", "बीमारी", "बीमारी से"]}}, "mode": "hindi"}, {"id": 93, "section": "Hindi Language and Comprehension", "qno": 13, "answer": 3, "lang": {"hi": {"question": "निम्नलिखित रेखांकित वाक्यांश के लिए विकल्प में से एक उचित शब्द का चयन करें। वह इतना बुद्धिमान है कि कोई भी उक्ति को तुरन्त सोच लेता है।", "options": ["कुशाग्रबुद्धि", "बुद्धिमान", "प्रतिभाशाली", "प्रत्युत्पन्नमति"]}}, "mode": "hindi"}, {"id": 94, "section": "Hindi Language and Comprehension", "qno": 14, "answer": 1, "lang": {"hi": {"question": "वर्ततनी की दृष्टि से दिये गये वाक्य के किस भाग में त्रुटि है? आदेश मिलने पर जललाद ने उसे फाँसी दे दी।", "options": ["आदेश मिलने पर", "जललाद", "दे दी", "ने उसे फाँसी"]}}, "mode": "hindi"}, {"id": 95, "section": "Hindi Language and Comprehension", "qno": 15, "answer": 3, "lang": {"hi": {"question": "'कुसुम' का पर्याायवाची शब्द कौन-सा है?", "options": ["मुक्त", "छाया", "निशा", "सुमन"]}}, "mode": "hindi"}, {"id": 96, "section": "Hindi Language and Comprehension", "qno": 16, "answer": 1, "lang": {"hi": {"question": "गद्यांश मे प्रदर्शित युग में किन लोगों का प्रभुत्व था -", "options": ["पंडितों का", "ढोंगी और पाखंडियों का", "बुजुर्गों का", "शिक्षित लोगों का"]}}, "mode": "hindi"}, {"id": 97, "section": "Hindi Language and Comprehension", "qno": 17, "answer": 2, "lang": {"hi": {"question": "गद्यांश में प्रयुक्त 'धर्मम' का पर्याायवाची शब्द नहीं होगा -", "options": ["मत", "सत्कर्मम", "धैर्यय", "पंथ"]}}, "mode": "hindi"}, {"id": 98, "section": "Hindi Language and Comprehension", "qno": 18, "answer": 1, "lang": {"hi": {"question": "रामचरितमानस की रचना किस युग मे हुई थी -", "options": ["आधुनिक काल", "भक्ति काल", "रीतिकाल", "पौराणिक काल"]}}, "mode": "hindi"}, {"id": 99, "section": "Hindi Language and Comprehension", "qno": 19, "answer": 3, "lang": {"hi": {"question": "गद्यांश में प्रयुक्त 'नैतिक' का विलोम शब्द होगा -", "options": ["नैसर्गिक", "नेकी", "निर्ददयी", "अनैतिक"]}}, "mode": "hindi"}, {"id": 100, "section": "Hindi Language and Comprehension", "qno": 20, "answer": 1, "lang": {"hi": {"question": "गद्यांश का उचित शीर्षषक चुनिए-", "options": ["रामचंद्रिका", "रामचरितमानस", "रामायण", "साकेत"]}}, "mode": "hindi"}];
let idx = 0;
let preferredLang = localStorage.getItem(TEST_ID + "_lang") || "hi";
let answers = Array(QUESTIONS.length).fill(null);
let review = Array(QUESTIONS.length).fill(false);
let submitted = false;
let seconds = 3600;

function escapeHtml(s){return String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function activeLang(q){
  if(q.mode === "english") return "en";
  if(q.mode === "hindi") return "hi";
  return preferredLang;
}
function currentText(q){
  const lang = activeLang(q);
  return q.lang[lang] || q.lang.hi || q.lang.en;
}
function updateLangButtons(){
  document.getElementById('btnHi').className = preferredLang === 'hi' ? 'active' : '';
  document.getElementById('btnEn').className = preferredLang === 'en' ? 'active' : '';
  const q=QUESTIONS[idx];
  const note=document.getElementById('langNote');
  if(q.mode === 'english') note.textContent = 'यह English section है, इसलिए original English में ही रहेगा।';
  else if(q.mode === 'hindi') note.textContent = 'यह Hindi section है, इसलिए original Hindi में ही रहेगा।';
  else note.textContent = 'Reasoning, GK और Maths bilingual हैं। Button से Hindi/English बदल सकते हैं।';
}
function setLang(lang){
  preferredLang = lang;
  localStorage.setItem(TEST_ID + "_lang", lang);
  render();
}
function render(){
  const q=QUESTIONS[idx], t=currentText(q);
  document.getElementById('sectionName').textContent=q.section;
  document.getElementById('qMeta').textContent=`Question ${idx+1} of ${QUESTIONS.length}  |  Section Q.${q.qno}`;
  document.getElementById('question').textContent=t.question;
  const ib=document.getElementById('imageBox');
  ib.innerHTML = q.image ? `<img class="qimg" src="${escapeHtml(q.image)}" alt="Question image">` : '';
  const opts=document.getElementById('options'); opts.innerHTML='';
  t.options.forEach((op,i)=>{
    const label=document.createElement('label');
    label.className='option'+(answers[idx]===i?' selected':'');
    label.innerHTML=`<input type="radio" name="opt" ${answers[idx]===i?'checked':''}> <div><b>${String.fromCharCode(65+i)}.</b> ${escapeHtml(op)}</div>`;
    label.onclick=()=>{answers[idx]=i;review[idx]=false;render();};
    opts.appendChild(label);
  });
  renderPalette(); updateStats(); updateLangButtons();
}
function renderPalette(){
  const pal=document.getElementById('palette'); pal.innerHTML='';
  QUESTIONS.forEach((q,i)=>{
    const b=document.createElement('button');
    b.className='pbtn'+(answers[i]!==null?' answered':'')+(review[i]?' review':'')+(i===idx?' current':'');
    b.textContent=i+1; b.onclick=()=>{idx=i;render();};
    pal.appendChild(b);
  });
}
function updateStats(){
  const a=answers.filter(x=>x!==null).length;
  document.getElementById('attempted').textContent=a;
  document.getElementById('notAttempted').textContent=QUESTIONS.length-a;
}
function nextQ(){if(idx<QUESTIONS.length-1)idx++;render();}
function prevQ(){if(idx>0)idx--;render();}
function clearResponse(){answers[idx]=null;render();}
function markReview(){review[idx]=!review[idx];render();}
function submitTest(auto){
  if(submitted)return;
  if(!auto && !confirm('Submit test?'))return;
  submitted=true;
  let score=0,wrong=0,un=0;
  QUESTIONS.forEach((q,i)=>{if(answers[i]===null)un++;else if(answers[i]===q.answer)score++;else wrong++;});
  const percentage=((score/QUESTIONS.length)*100).toFixed(2);
  saveHistory(score,wrong,un,percentage);
  document.getElementById('quizBox').style.display='none';
  document.querySelector('.nav').style.display='none';
  const res=document.getElementById('result'); res.style.display='block';
  let out=`<h2>Result</h2><p><b>Score:</b> ${score}/${QUESTIONS.length} &nbsp; <b>Percentage:</b> ${percentage}%</p><p><b>Correct:</b> ${score} | <b>Wrong:</b> ${wrong} | <b>Unattempted:</b> ${un}</p><button class="success" onclick="location.reload()">Restart Test</button><h3>Answer Key</h3>`;
  QUESTIONS.forEach((q,i)=>{
    const t=currentText(q);
    const ua=answers[i]===null?'Not attempted':String.fromCharCode(65+answers[i]);
    const ca=String.fromCharCode(65+q.answer);
    const cls=answers[i]===q.answer?'correct':'wrong';
    out+=`<div class="answer-row"><b>Q${i+1}.</b> ${escapeHtml(t.question)}<br>Your answer: <span class="${cls}">${ua}</span> | Correct answer: <span class="correct">${ca}. ${escapeHtml(t.options[q.answer])}</span></div>`;
  });
  res.innerHTML=out; loadHistory();
}
function tick(){
  if(submitted)return;
  seconds--;
  const m=Math.floor(seconds/60), s=seconds%60;
  document.getElementById('timer').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  if(seconds<=0)submitTest(true);
}
setInterval(tick,1000);
function saveHistory(score,wrong,un,percentage){
  const key='history_'+TEST_ID;
  const arr=JSON.parse(localStorage.getItem(key)||'[]');
  arr.unshift({date:new Date().toLocaleString(),score,wrong,un,percentage});
  localStorage.setItem(key,JSON.stringify(arr.slice(0,10)));
}
function loadHistory(){
  const arr=JSON.parse(localStorage.getItem('history_'+TEST_ID)||'[]');
  const ul=document.getElementById('historyList');
  ul.innerHTML=arr.length?arr.map(x=>`<li>${x.date} — ${x.score}/100 (${x.percentage}%)</li>`).join(''):'<li>No attempt yet</li>';
}
function clearHistory(){localStorage.removeItem('history_'+TEST_ID);loadHistory();}
function buildSectionJump(){
  const starts = [];
  QUESTIONS.forEach((q,i)=>{ if(i===0 || q.section !== QUESTIONS[i-1].section) starts.push([q.section,i]); });
  const box=document.getElementById('sectionJump');
  box.innerHTML='<b class="small">Jump to section</b>'+starts.map(([s,i])=>`<button onclick="idx=${i};render();">${i+1}. ${escapeHtml(s)}</button>`).join('');
}
buildSectionJump(); loadHistory(); render();
</script>

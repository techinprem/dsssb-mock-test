<script>
const TEST_ID="hssc_2017_25nov_sanitary_inspector_bilingual_100_v1";
const questions=[{"id": 1, "hi": "बाल श्रम अधिनियम के अनुसार, किसी भी बच्चे को किस समय के दौरान काम करने की अनुमति नहीं दी जाएगी-", "en": "According to the Child Labour Act, during which time is a child not permitted to work?", "opts_hi": ["शाम 7 बजे से सुबह 8 बजे तक", "सुबह 8 बजे से शाम 7 बजे तक", "सुबह 10 बजे शाम 6 बजे तक", "दोपहर 12 बजे से शाम 6 बजे तक"], "opts_en": ["7 PM to 8 AM", "8 AM to 7 PM", "10 AM to 6 PM", "12 noon to 6 PM"], "ans": 1}, {"id": 2, "hi": "किशोर न्याय अधिनियम के अनुसार, किशोर को उस व्यक्ति के रूप में परिभाषित किया गया है जिसने आयु के पूरे नहीं किये है-", "en": "According to the Juvenile Justice Act, a juvenile is defined as a person who has not completed the age of -", "opts_hi": ["12 साल", "15 साल", "17 साल", "18 साल"], "opts_en": ["12 years", "15 years", "17 years", "18 years"], "ans": 4}, {"id": 3, "hi": "तपेदिक के निदान के लिए प्रत्येक रोगी के...धूक नमूने की संख्या को जाँचना आवश्यक है-", "en": "For diagnosis of tuberculosis, how many sputum samples of each patient must be examined?", "opts_hi": ["1", "2", "3", "4"], "opts_en": ["1", "2", "3", "4"], "ans": 2}, {"id": 4, "hi": "1972 में राष्ट्रीय जल आपूर्ति और स्वच्छता कार्यक्रम के पूरक के रूप में निम्नलिखित कार्यक्रम में से एक शुरू किया गया था-", "en": "In 1972, which programme was started as a supplement to the National Water Supply and Sanitation Programme?", "opts_hi": ["न्यूनतम आवश्यकताएँ कार्यक्रम", "राष्ट्रीय परिवार कल्याण कार्यक्रम", "पोषण कार्यक्रम", "त्वरित ग्रामीण जल आपूर्ति कार्यक्रम"], "opts_en": ["Minimum Needs Programme", "National Family Welfare Programme", "Nutrition Programme", "Accelerated Rural Water Supply Programme"], "ans": 4}, {"id": 5, "hi": "स्वजलधारा कार्यक्रम के तहत स्वजलधारा-प्रथम के घटक के लिए है-", "en": "Under Swajaldhara programme, Swajaldhara-I component is for -", "opts_hi": ["जिला स्तर", "ग्राम पंचायत", "शहरी क्षेत्र", "मेट्रो शहर"], "opts_en": ["District level", "Gram Panchayat", "Urban area", "Metro city"], "ans": 2}, {"id": 6, "hi": "वेक्टर जनित संक्रमणों के जैकि संचरण में जब संक्रामण एजेंट वेक्टर में रूप और संख्या में परिवर्तन करता है, इसे कहा जाता है-", "en": "In biological transmission of vector-borne infections, when the infectious agent changes in form and number inside the vector, it is called -", "opts_hi": ["यांत्रिक संचरण", "प्रचारक", "सायक्लोप्रोगेटिव", "सायक्लो डेवलपमेन्टल"], "opts_en": ["Mechanical transmission", "Propagative", "Cyclopropagative", "Cyclodevelopmental"], "ans": 3}, {"id": 7, "hi": "संधिपाद मेजबान में बीमारी एजेंट के विकास के लिए जरूरी समय की अवधि को कहा जाता है-", "en": "The period required for development of disease agent in an arthropod host is called -", "opts_hi": ["उष्मायन अवधि", "बाहरी उष्मायन अवधि", "लेटन्ट अवधि", "उत्पीड़न"], "opts_en": ["Incubation period", "Extrinsic incubation period", "Latent period", "Oppression"], "ans": 2}, {"id": 8, "hi": "जिस मेजबान में एजेंट का यौन चक्र होता है उसे कहा जाता है-", "en": "The host in which the sexual cycle of the agent occurs is called -", "opts_hi": ["मेजबानर", "प्राप्तकर्ता", "दाता", "स्थायी (अंतिम) मेजबान"], "opts_en": ["Host", "Recipient", "Donor", "Definitive/final host"], "ans": 4}, {"id": 9, "hi": "प्रचुर, पीड़ाहित, पानी के दस्त की आकस्मिक शुरूआत, कोलेरा के नैदानिक लक्षण के प्रथम चरण को कहा जाता है-", "en": "Sudden onset of profuse, painless watery diarrhoea is the first clinical stage of cholera called -", "opts_hi": ["बहिर्वलन अवस्था", "निपात अवस्था", "रिकवरी (प्रतिप्राप्ति) अवस्था", "रीअरिंग (पुनः घटित) अवस्था"], "opts_en": ["Evacuation stage", "Collapse stage", "Recovery stage", "Rearing/recurrence stage"], "ans": 1}, {"id": 10, "hi": "हैजा के दौरान मल दिख सकता है-", "en": "During cholera, stool may appear as -", "opts_hi": ["साफ, पानीवाला", "चावल के पानी जैसा", "काला", "झागवाला"], "opts_en": ["Clear, watery", "Rice-water like", "Black", "Foamy"], "ans": 2}, {"id": 11, "hi": "भारत में निम्नलिखित क्षेत्रों में से एक स्वास्थ्य सेवा का दूसरा स्तर में उपलब्ध कराया गया है-", "en": "In India, the second level of health care is provided at -", "opts_hi": ["प्राथमिक स्वास्थ्य केन्द्र", "उपकेन्द्र", "सामुदायिक स्वास्थ्य केन्द्र", "विशेषता अस्पतालों"], "opts_en": ["Primary Health Centre", "Sub-centre", "Community Health Centre", "Specialty hospitals"], "ans": 3}, {"id": 12, "hi": "स्वास्थ्य देखभाल वितरण प्रणाली का एक बुनियादी और आवश्यक कार्य स्वस्थ प्रदान करना है-", "en": "A basic and essential function of the health-care delivery system is to provide -", "opts_hi": ["अनुवर्ती देखभाल", "पुनर्वास प्रणाली", "रेफरल सिस्टम", "विशेष अस्पताल"], "opts_en": ["Follow-up care", "Rehabilitation system", "Referral system", "Special hospital"], "ans": 3}, {"id": 13, "hi": "एक प्रक्रिया जिसमें स्वास्थ्य प्रणाली के एक स्तर पर एक स्वास्थ्य कर्मचारी, अपर्याप्त संसाधनप (ड्रग्स, उपकरण, कौशल) वाले हैं वह सहायता करने के लिए समान या उच्च पर बेहतर या अलग रिसोर्स सुविधा की सहायता लेती है या ग्राहक के मामले को संभालने के लिए प्रबंधन करते है उसे कहा जाता है-", "en": "A process in which a health worker at one level seeks help from an equal or higher facility with better/different resources to manage a client's case is called -", "opts_hi": ["फोलो अप", "निगरानी", "समन्वय", "रेफरल"], "opts_en": ["Follow up", "Monitoring", "Coordination", "Referral"], "ans": 4}, {"id": 14, "hi": "उपकेन्द्र की मातृ स्वास्थ्य देखभाल में गर्भवती का प्रारम्भिक पंजीकरण....... से पहले आदर्श माना जाता है-", "en": "In maternal health care at sub-centre, early registration of pregnancy is ideally before -", "opts_hi": ["12 हफ्ते", "16 हफ्ते", "20 हफ्ते", "24 हफ्ते"], "opts_en": ["12 weeks", "16 weeks", "20 weeks", "24 weeks"], "ans": 1}, {"id": 15, "hi": "उपकेन्द्र के कार्यों में से एक, उपयुक्त स्वास्थ्यकर्मियों द्वारा ....किया गया क्षेत्र का दौरा-", "en": "One of the functions of a sub-centre is field visits by appropriate health workers for -", "opts_hi": ["रेफरल के लिए", "बीमारी निगरानी के लिए", "कोपर-टी इन्सरशन के लिए", "स्वास्थ्य कार्यक्रम के लिए"], "opts_en": ["Referral", "Disease surveillance", "Copper-T insertion", "Health programme"], "ans" r in meaning to the given word : ABDUCT", "en": "Select the word most similar in meaning to ABDUCT.", "opts_hi": ["Adopt", "Surrender", "Kidnep", "Normal"], "opts_en": ["Adopt", "Surrender", "Kidnap", "Normal"], "ans": 3}, {"id": 92, "hi": "Select the word from the following that is opposite in meaning to the given word: WAKE", "en": "Select the word opposite in meaning to WAKE.", "opts_hi": ["Get up", "Cold", "Dry", "Sluber"], "opts_en": ["Get up", "Cold", "Dry", "Slumber"], "ans": 4}, {"id": 93, "hi": "In the following question four alternative are given for the idiom/phrase bold in the sentence. Choose the alternative which best expresses the meaning of the idiom/phrase: [UNCLEAR/MISSING PHRASE IN SOURCE]", "en": "Choose the meaning of the idiom/phrase. [Phrase missing/unclear in source]", "opts_hi": ["discuss", "receive", "effect", "hand ovdr"], "opts_en": ["discuss", "receive", "effect", "hand over"], "ans": 2}, {"id": 94, "hi": "Give one word substitute for the following expression: One who hates mankind", "en": "One word substitute: One who hates mankind", "opts_hi": ["Misanthropist", "Notorious", "Orphan", "Window"], "opts_en": ["Misanthropist", "Notorious", "Orphan", "Widow"], "ans": 1}, {"id": 95, "hi": "Supply suitable article in the following blank if needed: ....... boys of this school are very intelligent.", "en": "Supply suitable article: ....... boys of this school are very intelligent.", "opts_hi": ["A", "An", "The", "No article"], "opts_en": ["A", "An", "The", "No article"], "ans": 3}, {"id": 96, "hi": "भोजनालय संधि का कौन सा प्रकार है-", "en": "What type of Sandhi is 'भोजनालय'?", "opts_hi": ["दीर्घ स्वर संधि", "गुण स्वर संधि", "वृद्धिस्वर संधि", "यण स्वर संधि"], "opts_en": ["Dirgh Swar Sandhi", "Gun Swar Sandhi", "Vriddhi Swar Sandhi", "Yan Swar Sandhi"], "ans": 1}, {"id": 97, "hi": "मौका चूक जाने पर बेचारा.. ...रह गया। रिक्त स्थान की पूर्ति मुहावरे से कीजिए-", "en": "मौका चूक जाने पर बेचारा ____ रह गया. Fill with correct idiom.", "opts_hi": ["मुट्ठी गरम करते", "हाथ मलते", "रंग जमाते", "रास्ता देखते"], "opts_en": ["मुट्ठी गरम करते", "हाथ मलते", "रंग जमाते", "रास्ता देखते"], "ans": 2}, {"id": 98, "hi": "निम्न में से कौन सा शब्द स्त्रीलिंग है-", "en": "Which of the following words is feminine?", "opts_hi": ["ओब", "गुलाम", "जुर्म", "इंतजार"], "opts_en": ["ओब", "गुलाम", "जुर्म", "इंतजार"], "ans": 1}, {"id": 99, "hi": "निम्न में से कौन सा समास द्वविगु समास का उदाहरण है-", "en": "Which is an example of Dvigu Samas?", "opts_hi": ["चौराहा", "दशानन", "यथाशक्ति", "माता-पिता"], "opts_en": ["चौराहा", "दशानन", "यथाशक्ति", "माता-पिता"], "ans": 1}, {"id": 100, "hi": "'इत्यादि' शब्द का संधि-विग्रह है-", "en": "Sandhi-vigrah of 'इत्यादि' is -", "opts_hi": ["इती + आदि", "इति + आदि", "इती + आदी", "इत्या + दि"], "opts_en": ["इती + आदि", "इति + आदि", "इती + आदी", "इत्या + दि"], "ans": 2}];let current=0;let lang=localStorage.getItem(TEST_ID+"_lang")||"hi";let answers=Array(questions.length).fill(null);let review=Array(questions.length).fill(false);let submitted=false;let totalSeconds=100*60;
function esc(s){return String(s??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll("\n","<br>")}
function getSubject(q){if(q.id<=50)return lang==="en"?"Public Health / Sanitation":"जनस्वास्थ्य / स्वच्छता"; if(q.id<=75)return lang==="en"?"Haryana GK":"हरियाणा GK"; if(q.id<=90)return lang==="en"?"GK / Reasoning / Maths":"GK / रीजनिंग / गणित"; return lang==="en"?"English / Hindi Language":"English / Hindi भाषा"}
function textFor(q){if(lang==="hi")return esc(q.hi);if(lang==="en")return esc(q.en);return `<div>${esc(q.hi)}</div><div class="en">${esc(q.en)}</div>`}
function optFor(q,i){if(lang==="hi")return esc(q.opts_hi[i]||"");if(lang==="en")return esc(q.opts_en[i]||"");return `<b>HI:</b> ${esc(q.opts_hi[i]||"")}<br><b>EN:</b> ${esc(q.opts_en[i]||"")}`}
function render(){const q=questions[current];document.getElementById("qCount").textContent=`Question ${current+1}/${questions.length}`;document.getElementById("subjectLabel").textContent=getSubject(q);document.getElementById("question").innerHTML=(current+1)+". "+textFor(q);const optDiv=document.getElementById("options");optDiv.innerHTML="";q.opts_hi.forEach((_,i)=>{const btn=document.createElement("button");btn.className="opt"+(answers[current]===i+1?" selected":"");btn.innerHTML=`(${i+1}) ${optFor(q,i)}`;btn.onclick=()=>{if(!submitted){answers[current]=i+1;saveState();render();}};optDiv.appendChild(btn);});renderPalette();updateLangButtons();}
function updateLangButtons(){["hi","en","bi"].forEach(x=>document.getElementById("btn-"+x).classList.toggle("active",lang===x));}function setLang(x){lang=x;localStorage.setItem(TEST_ID+"_lang",lang);render();}
function renderPalette(){const p=document.getElementById("palette");p.innerHTML="";questions.forEach((q,i)=>{const d=document.createElement("div");d.className="num"+(i===current?" active":"")+(answers[i]?" answered":"")+(review[i]?" review":"");d.textContent=i+1;d.onclick=()=>{current=i;saveState();render();};p.appendChild(d);});}
function prevQ(){if(current>0){current--;saveState();render();}}function saveNext(){if(current<questions.length-1){current++;saveState();render();}}function clearAns(){answers[current]=null;saveState();render();}function toggleReview(){review[current]=!review[current];saveState();render();}
function submitTest(){if(!confirm("Submit this test?"))return;submitted=true;let correct=0,wrong=0,attempted=0;questions.forEach((q,i)=>{if(answers[i]){attempted++;if(answers[i]===q.ans)correct++;else wrong++;}});const marks=correct-wrong*0.25;document.getElementById("testArea").style.display="none";document.getElementById("resultArea").style.display="block";document.getElementById("scoreBox").innerHTML=`<div class="score-box"><b>${attempted}</b>Attempted</div><div class="score-box"><b>${correct}</b>Correct</div><div class="score-box"><b>${wrong}</b>Wrong</div><div class="score-box"><b>${marks.toFixed(2)}</b>Score</div>`;saveHistory({date:new Date().toLocaleString(),attempted,correct,wrong,marks:marks.toFixed(2)});localStorage.removeItem(TEST_ID+"_state");loadHistory();}
function showReview(){let out="<h3>Answer Review</h3>";questions.forEach((q,i)=>{const status=!answers[i]?"Skipped":(answers[i]===q.ans?"Correct":"Wrong");out+=`<div class="review-card"><b>Q${i+1}.</b> ${textFor(q)}<br><span class="small">Your answer: ${answers[i]||"-"} | Correct answer: ${q.ans} | Status: ${status}</span></div>`;});document.getElementById("reviewArea").innerHTML=out;}
function restartTest(){if(!confirm("Restart this test?"))return;current=0;answers=Array(questions.length).fill(null);review=Array(questions.length).fill(false);totalSeconds=100*60;submitted=false;localStorage.removeItem(TEST_ID+"_state");document.getElementById("resultArea").style.display="none";document.getElementById("testArea").style.display="block";render();}
function tick(){if(submitted)return;let m=Math.floor(totalSeconds/60),s=totalSeconds%60;document.getElementById("timer").textContent=String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");if(totalSeconds<=0){submitted=true;alert("Time is over. Test will be submitted.");submitted=false;submitTest();}else totalSeconds--;saveState();}
function saveState(){localStorage.setItem(TEST_ID+"_state",JSON.stringify({current,answers,review,totalSeconds}));}function loadState(){const raw=localStorage.getItem(TEST_ID+"_state");if(raw){try{const st=JSON.parse(raw);current=st.current??0;answers=st.answers??answers;review=st.review??review;totalSeconds=st.totalSeconds??totalSeconds;}catch(e){}}}
function saveHistory(item){const key=TEST_ID+"_history";let h=JSON.parse(localStorage.getItem(key)||"[]");h.unshift(item);h=h.slice(0,10);localStorage.setItem(key,JSON.stringify(h));}function loadHistory(){const h=JSON.parse(localStorage.getItem(TEST_ID+"_history")||"[]");document.getElementById("history").innerHTML=h.length?h.map(x=>`<div class="history-item"><b>${x.date}</b><br>Score: ${x.marks} | Correct: ${x.correct} | Wrong: ${x.wrong}</div>`).join(""):"<p class='small'>No attempt yet.</p>";}
loadState();render();loadHistory();setInterval(tick,1000);
</script></body></html>

s others had overlooked . By the end, his decisive action restored focus and set a clear path forward .", "options": ["perspikasious", "prestidigitation", "garrulous", "procrastination"]}}, "pageImage": "images/q074.png"}, {"id": 75, "section": "English Language and Comprehension", "qno": 15, "answer": 0, "mode": "english", "lang": {"en": {"question": "Select the most appropriate adverb to fill the blank. x Although e istentialist thinkers ______________________ interrogate the implication of life, they seldom specify decisive answers to such queries.", "options": ["delicately", "frequently", "erratically", "occasionally"]}}, "pageImage": "images/q075.png"}, {"id": 76, "section": "English Language and Comprehension", "qno": 16, "answer": 3, "mode": "english", "lang": {"en": {"question": "Comprehension : Read the given passage and answer the questions that follow. Laika was a dog that was the first living creature to be launched into Earth orbit, on board the Soviet artificial satellite Sputnik 2, on 3 November 1957. It was always understood that Laika would not survive the mission, but her actual fate was misrepresented for decades. Laika was a small (13 pounds [6 kg]), even-tempered, mixed-breed dog about two years of age. She was one of a number of stray dogs that were taken into the Soviet spaceflight program after being rescued from the streets. Only female dogs were used because they were considered to be anatomically better suited than males for close confinement. Laika trained for life on board the satellite by learning to accept progressively smaller living spaces. She was spun in a centrifuge to accustom her to changes in gravitation, and she learned to accept food in jellied form that could be easily served in an environment of weightlessness. When the launch was announced, Laika became an international celebrity. The satellite and its passenger soon acquired the journalistic nickname of 'Muttnik'. Contemporaneous Soviet accounts implied that the dog was kept alive for six or seven days into the mission and then euthanised with poisoned food before her oxygen supply could run out. The satellite was destroyed reentering Earth’s atmosphere on 14 April 1958. Laika’s sad fate aroused worldwide concern and sympathy. In 2002, however, Russian scientist Dimitri Malashenkov revealed that the previous accounts of her death were false. Laika had actually survived only about five to seven hours after liftoff before dying of overheating and panic. It was belatedly made known that Laika’s pulse rate, which had been measured with electrodes, tripled during takeoff and only came down somewhat during weightlessness. Apparently, the Soviet scientists had insufficient time to perfect life-support systems because of intense political pressure to launch Sputnik 2 in time for the celebration of the 40th anniversary of the Bolshevik Revolution. The name Laika is derived from the Russian-language word for 'bark'. Laika is also a breed name applied to certain Russian sled dogs, but they are unrelated to the space dog. In 2008, a small monument with a statue of Laika was unveiled in Moscow. SubQuestion No : 16 Q.16 What is the most appropriate synonym of 'launch'?", "options": ["Spectate", "Drawback", "Withhold", "Release"]}}, "pageImage": "images/q076.png"}, {"id": 77, "section": "English Language and Comprehension", "qno": 17, "answer": 3, "mode": "english", "lang": {"en": {"question": "Comprehension : Read the given passage and answer the questions that follow. Laika was a dog that was the first living creature to be launched into Earth orbit, on board the Soviet artificial satellite Sputnik 2, on 3 November 1957. It was always understood that Laika would not survive the mission, but her actual fate was misrepresented for decades. Laika was a small (13 pounds [6 kg]), even-tempered, mixed-breed dog about two years of age. She was one of a number of stray dogs that were taken into the Soviet spaceflight program after being rescued from the िए गए गद्यांंश के आधार पर निम्नांकित प्रश्नों के उत्तर दीजिए- एक बस्ती में दो विद्वान रहते थे, जिनके विचारों में अत्यधिक मतभेद था और वे सदा एक – दूसरे की योग्यता पर व्यंग्य करते थे। उनमें से एक नास्तिक था और दूसरा आस्तिक। एक दिन दोनों बाजार में मिले और अपने – अपने अनुयोयियों की उपस्थिति में भगवान के अस्तित्व पर वाद – विवाद करने लगे। घंटों वाद – विवाद करने के पश्चात वे एक – दूसरे से अलग हुए। उसी साँझ नास्तिक मंदिर में गया और अपने पूर्वपापों के लिए भगवान से क्षमा – याचना करने लगा। दूसरे विद्वान ने घर जाकर अपनी सब धार्मिक पुस्तकें जला दीं; क्योंकि अब वह एक नास्तिक बन चुका था। SubQuestion No : 17 Q.17 किसकी उपस्थिति में दोनों विद्वान ईश्वर के अस्तित्व पर वाद – विवाद करते थे ?", "options": ["अनुयायियों की अनुपस्थिति में", "अपने परिवार की उपस्थिति में", "अपने अनुयायियों की उपस्थिति में", "पास – पड़ोस के सामने"]}}, "pageImage": "images/q097.png"}, {"id": 98, "section": "Hindi Language and Comprehension", "qno": 18, "answer": 0, "mode": "hindi", "lang": {"hi": {"question": "Comprehension : दिए गए गद्यांंश के आधार पर निम्नांकित प्रश्नों के उत्तर दीजिए- एक बस्ती में दो विद्वान रहते थे, जिनके विचारों में अत्यधिक मतभेद था और वे सदा एक – दूसरे की योग्यता पर व्यंग्य करते थे। उनमें से एक नास्तिक था और दूसरा आस्तिक। एक दिन दोनों बाजार में मिले और अपने – अपने अनुयोयियों की उपस्थिति में भगवान के अस्तित्व पर वाद – विवाद करने लगे। घंटों वाद – विवाद करने के पश्चात वे एक – दूसरे से अलग हुए। उसी साँझ नास्तिक मंदिर में गया और अपने पूर्वपापों के लिए भगवान से क्षमा – याचना करने लगा। दूसरे विद्वान ने घर जाकर अपनी सब धार्मिक पुस्तकें जला दीं; क्योंकि अब वह एक नास्तिक बन चुका था। SubQuestion No : 18 Q .18 इस अवतरण का निष्कर्ष बताइए।", "options": ["नास्तिक ने मंदिर में क्षमा माँगी और आस्तिक धार्मिक पुस्तकें जलाकर नास्तिक हो गया।", "आस्तिक – नास्तिक दोनों बराबर हो गए।", "दोनों विद्वानों में वाद – विवाद हुआ पर परिवर्तन कु छ नहीं हुआ।", "अत्यधिक मतभेद के कारण दोनों में मित्रता हो गई।"]}}, "pageImage": "images/q098.png"}, {"id": 99, "section": "Hindi Language and Comprehension", "qno": 19, "answer": (/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}function availableLang(q){return q.mode==='english'?'en':q.mode==='hindi'?'hi':lang}function currentText(q){return q.lang[availableLang(q)]||q.lang.hi||q.lang.en}function setLang(l){lang=l;render()}function sectionSetNumber(q){const o=[...new Set(QUESTIONS.map(x=>x.section))];return o.indexOf(q.section)+1}function togglePhoto(){photoState[idx]=!photoState[idx];renderPhoto()}function renderPhoto(){const q=QUESTIONS[idx],p=document.getElementById('photoPanel'),show=!!photoState[idx];photoBtn.textContent=show?'Hide Original Question Photo':'Show Original Question Photo';p.className='photoPanel'+(show?' show':'');p.innerHTML=show?`<img class="qimg" src="${escapeHtml(q.pageImage)}"><div class="small">Original question-only crop (options excluded).</div>`:''}function render(){const q=QUESTIONS[idx],t=currentText(q);sectionName.textContent=q.section;qNo.textContent='Question '+(idx+1)+' / '+QUESTIONS.length;setNo.textContent='Set '+sectionSetNumber(q)+' of 5';questionText.textContent=t.question;options.innerHTML='';t.options.forEach((op,i)=>{const label=document.createElement('label');label.className='option'+(answers[idx]===i?' selected':'');label.innerHTML=`<input type="radio" name="opt" ${answers[idx]===i?'checked':''}> <div><b>${String.fromCharCode(65+i)}.</b> ${escapeHtml(op)}</div>`;label.onclick=()=>{answers[idx]=i;review[idx]=false;render()};options.appendChild(label)});renderPalette();updateStats();updateLangButtons();renderSectionJump();renderPhoto()}function updateLangButtons(){const q=QUESTIONS[idx];btnHi.style.display=q.mode==='english'?'none':'';btnEn.style.display=q.mode==='hindi'?'none':'';btnHi.className=availableLang(q)==='hi'?'active':'';btnEn.className=availableLang(q)==='en'?'active':'';langNote.textContent=q.mode==='english'?'English section':q.mode==='hindi'?'Hindi section':'Bilingual view'}function renderPalette(){const pal=document.querySelector('.palette');pal.innerHTML='';QUESTIONS.forEach((q,i)=>{const b=document.createElement('button');b.className='pbtn'+(answers[i]!==null?' answered':'')+(review[i]?' review':'')+(i===idx?' current':'');b.textContent=i+1;b.onclick=()=>{idx=i;render()};pal.appendChild(b)})}function renderSectionJump(){const starts=[];QUESTIONS.forEach((q,i)=>{if(i===0||q.section!==QUESTIONS[i-1].section)starts.push([q.section,i])});sectionJump.innerHTML=starts.map(([s,i],k)=>`<button class="${idx>=i&&(k===starts.length-1||idx<starts[k+1][1])?'active':''}" onclick="idx=${i};render()">Set ${k+1}: ${escapeHtml(s)} (20)</button>`).join('')}function updateStats(){const a=answers.filter(x=>x!==null).length;attempted.textContent=a;notAttempted.textContent=QUESTIONS.length-a}function nextQ(){if(idx<QUESTIONS.length-1)idx++;render()}function prevQ(){if(idx>0)idx--;render()}function clearResponse(){answers[idx]=null;render()}function markReview(){review[idx]=!review[idx];render()}function submitTest(auto){if(submitted)return;if(!auto&&!confirm('Submit test?'))return;submitted=true;let correct=0,wrong=0,un=0;QUESTIONS.forEach((q,i)=>{if(answers[i]===null)un++;else if(answers[i]===q.answer)correct++;else wrong++});const score=correct-wrong*0.25,percentage=((score/QUESTIONS.length)*100).toFixed(2);saveHistory(score,correct,wrong,un);document.querySelector('.main').style.display='none';result.style.display='block';let out=`<h2>Result</h2><p><b>Score:</b> ${score.toFixed(2)}/100 &nbsp; <b>Percentage:</b> ${percentage}%</p><p><b>Correct:</b> ${correct} × 1 | <b>Wrong:</b> ${wrong} × -0.25 | <b>Unattempted:</b> ${un}</p><button class="success" onclick="location.reload()">Restart Test</button><h3>Answer Key</h3>`;QUESTIONS.forEach((q,i)=>{const t=currentText(q),ua=answers[i]===null?'Not attempted':String.fromCharCode(65+answers[i]),ca=String.fromCharCode(65+q.answer),cls=answers[i]===q.answer?'correct':'wrong';out+=`<div class="answer-row"><b>Q${i+1}.</b> ${escapeHtml(t.question)}<br>Your answer: <span class="${cls}">${ua}</span> | Correct answer: <span class="correct">${ca}. ${escapeHtml(t.options[q.answer])}</span></div>`});result.innerHTML=out;loadHistory()}function tick(){if(submitted)return;seconds--;timer.textContent=`${String(Math.floor(seconds/60)).padStart(2,'0')}:${String(seconds%60).padStart(2,'0')}`;if(seconds<=0)submitTest(true)}setInterval(tick,1000);function saveHistory(score,correct,wrong,un){const key='history_'+TEST_ID,arr=JSON.parse(localStorage.getItem(key)||'[]');arr.unshift({date:new Date().toLocaleString(),score:score.toFixed(2),correct,wrong,un});localStorage.setItem(key,JSON.stringify(arr.slice(0,10)))}function loadHistory(){const arr=JSON.parse(localStorage.getItem('history_'+TEST_ID)||'[]');historyList.innerHTML=arr.length?arr.map(x=>`<li>${x.date} - ${x.score}/100</li>`).join(''):'<li>No attempt yet</li>'}function clearHistory(){localStorage.removeItem('history_'+TEST_ID);loadHistory()}loadHistory();render();</script></body></html>

<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tech In Prem Mock Test Series</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Noto Sans Devanagari", sans-serif;
      background: #f3f6fb;
      color: #111827;
    }

    header {
      background: linear-gradient(135deg, #0f172a, #1d4ed8);
      color: white;
      padding: 28px 16px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
    }

    header p {
      margin: 8px 0 0;
      font-size: 15px;
      opacity: 0.95;
    }

    .container {
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 14px;
    }

    .search-box {
      background: white;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.08);
      margin-bottom: 18px;
    }

    input {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: #2563eb;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 18px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.08);
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.14);
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 18px;
      line-height: 1.35;
      color: #0f172a;
    }

    .card p {
      margin: 0 0 14px;
      color: #64748b;
      font-size: 14px;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      background: #1d4ed8;
      color: white;
      padding: 10px 14px;
      border-radius: 9px;
      font-weight: bold;
      font-size: 14px;
    }

    .btn:hover {
      background: #1e40af;
    }

    .status {
      text-align: center;
      padding: 22px;
      background: white;
      border-radius: 12px;
      color: #475569;
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.08);
    }

    footer {
      text-align: center;
      padding: 24px 12px;
      color: #64748b;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <header>
    <h1>Tech In Prem Mock Test Series</h1>
    <p>All uploaded mock tests will appear here automatically</p>
  </header>

  <main class="container">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search test name..." onkeyup="filterTests()" />
    </div>

    <div id="status" class="status">Loading tests...</div>
    <div id="testGrid" class="grid"></div>
  </main>

  <footer>
    © Tech In Prem | Online Mock Test Portal
  </footer>

  <script>
    const GITHUB_USERNAME = "techinprem";
    const REPOSITORY_NAME = "dsssb-mock-test";

    const apiUrl = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPOSITORY_NAME}/contents/`;

    let allTests = [];

    function cleanTestName(fileName) {
      return fileName
        .replace(".html", "")
        .replace(/-/g, " ")
        .replace(/_/g, " ")
        .replace(/\b\w/g, char => char.toUpperCase());
    }

    async function loadTests() {
      const status = document.getElementById("status");
      const grid = document.getElementById("testGrid");

      try {
        const response = await fetch(apiUrl);
        const files = await response.json();

        allTests = files
          .filter(file =>
            file.type === "file" &&
            file.name.endsWith(".html") &&
            file.name !== "index.html"
          )
          .map(file => ({
            fileName: file.name,
            title: cleanTestName(file.name),
            url: file.name
          }))
          .sort((a, b) => a.title.localeCompare(b.title));

        if (allTests.length === 0) {
          status.innerHTML = "Abhi koi test file upload nahi hai.";
          return;
        }

        status.style.display = "none";
        renderTests(allTests);

      } catch (error) {
        status.innerHTML = "Tests load nahi ho pa rahe. Repository public honi chahiye.";
      }
    }

    function renderTests(tests) {
      const grid = document.getElementById("testGrid");
      grid.innerHTML = "";

      tests.forEach(test => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <h2>${test.title}</h2>
          <p>File: ${test.fileName}</p>
          <a class="btn" href="${test.url}">Start Test</a>
        `;

        grid.appendChild(card);
      });
    }

    function filterTests() {
      const keyword = document.getElementById("searchInput").value.toLowerCase();

      const filtered = allTests.filter(test =>
        test.title.toLowerCase().includes(keyword) ||
        test.fileName.toLowerCase().includes(keyword)
      );

      renderTests(filtered);
    }

    loadTests();
  </script>
<script>
const renameTests = {
  "aiims-jodhpur-sanitary-inspector-200q.html": "Test 1 - AIIMS Jodhpur",
  "aiims-raipur-sanitary-inspector.html": "Test 2 - AIIMS Raipur",
  "health-family-welfare-sts-21-april-2018.html": "Test 3 - Health Family Welfare STS",
  "hssc-2017-24nov-sanitary-inspector-evening[1].html": "Test 4 - HSSC Sanitary Inspector Evening",
  "hssc-2017-24nov-sanitary-inspector-morning[1].html": "Test 5 - HSSC Sanitary Inspector Morning",
  "hssc-2017-25nov-assistant-sanitary-inspector-evening[1].html": "Test 6 - HSSC Assistant Sanitary Inspector Evening",
  "hssc-2017-25nov-sanitary-inspector-afternoon[1].html": "Test 7 - HSSC Sanitary Inspector Afternoon",
  "hssc-2017-25nov-sanitary-inspector[1].html": "Test 8 - HSSC Sanitary Inspector",
  "hssc-2017-28oct-sanitary-inspector-morning[1].html": "Test 9 - HSSC Sanitary Inspector Morning",
  "hssc-2017-assistant-sanitary-inspector-evening[1].html": "Test 10 - HSSC Assistant Sanitary Inspector Evening",
  "municipal-corporation-chhattisgarh-sanitary-inspector-2018.html": "Test 11 - Chhattisgarh Sanitary Inspector",
  "nhm-rajasthan-2015-senior-sanitary-inspector.html": "Test 12 - NHM Rajasthan Senior Sanitary Inspector 2015",
  "nhm-rajasthan-2016-senior-sanitary-inspector.html": "Test 13 - NHM Rajasthan Senior Sanitary Inspector 2016",
  "rajasthan-sts-senior-treatment-supervisor.html": "Test 14 - Rajasthan STS"
};

document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll("a[href$='.html']").forEach(link => {
    const href = link.getAttribute("href");
    const fileName = decodeURIComponent(href.split("/").pop());

    if (renameTests[fileName]) {
      link.textContent = renameTests[fileName];
    }
  });

  document.querySelectorAll("p, div, span, small").forEach(el => {
    const text = el.textContent.trim();

    if (
      text.startsWith("File:") ||
      text.startsWith("file:") ||
      text.includes("File: aiims-") ||
      text.includes("File: hssc-") ||
      text.includes("File: health-") ||
      text.includes("File: municipal-") ||
      text.includes("File: nhm-") ||
      text.includes("File: rajasthan-")
    ) {
      el.style.display = "none";
    }
  });
});
</script></body>
</html>

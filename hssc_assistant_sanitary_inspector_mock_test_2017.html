<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSSC Assistant Sanitary Inspector Mock Test 2017</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,'Noto Sans Devanagari','Mangal',sans-serif;background:#f4f6f9;color:#1f2937}
.topbar{position:sticky;top:0;z-index:10;background:#0f172a;color:#fff;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.brand{font-weight:700;font-size:16px}
.home{background:#2563eb;color:#fff;text-decoration:none;padding:8px 12px;border-radius:8px;font-weight:700}
.timer{background:#111827;padding:8px 12px;border-radius:8px;font-weight:700;white-space:nowrap}
.container{display:grid;grid-template-columns:1fr 280px;gap:16px;max-width:1200px;margin:16px auto;padding:0 12px}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.08);padding:18px}
.qmeta{display:flex;justify-content:space-between;gap:8px;align-items:center;margin-bottom:12px}
.qno{font-size:18px;font-weight:800;color:#111827}
.marks{font-size:13px;color:#475569;background:#f1f5f9;padding:6px 10px;border-radius:999px}
.question{font-size:18px;line-height:1.55;margin:12px 0 16px}
.hi{display:block;color:#374151;margin-top:6px}
.option{display:block;width:100%;text-align:left;margin:10px 0;padding:12px 14px;border:2px solid #e5e7eb;border-radius:10px;background:#fff;cursor:pointer;font-size:16px;line-height:1.45}
.option:hover{border-color:#93c5fd;background:#eff6ff}
.option.selected{border-color:#2563eb;background:#dbeafe}
.option.correct{border-color:#16a34a;background:#dcfce7}
.option.wrong{border-color:#dc2626;background:#fee2e2}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
button{border:0;border-radius:9px;padding:10px 14px;font-weight:700;cursor:pointer}
.primary{background:#2563eb;color:#fff}
.secondary{background:#e5e7eb;color:#111827}
.danger{background:#dc2626;color:#fff}
.palette{position:sticky;top:72px;max-height:calc(100vh - 90px);display:flex;flex-direction:column}
.palette h3{margin:0 0 10px}
.palette-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;overflow-y:auto;max-height:430px;padding-right:4px}
.pbtn{padding:9px 0;border-radius:8px;background:#e5e7eb;color:#111827}
.pbtn.active{outline:3px solid #2563eb}
.pbtn.answered{background:#16a34a;color:#fff}
.pbtn.review{background:#9333ea;color:#fff}
.legend{font-size:13px;display:grid;gap:8px;margin-top:12px;color:#475569}
.dot{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:6px;vertical-align:middle;background:#e5e7eb}
.dot.ans{background:#16a34a}.dot.rev{background:#9333ea}
.result-box{display:none}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:14px 0}
.stat{background:#f8fafc;border:1px solid #e5e7eb;border-radius:10px;padding:12px;text-align:center}
.stat b{display:block;font-size:22px;color:#111827}
.answer-card{border:1px solid #e5e7eb;border-radius:10px;padding:14px;margin:12px 0;background:#fff}
.answer-line{font-weight:800;color:#15803d;margin-top:8px;background:#f0fdf4;display:inline-block;padding:5px 8px;border-radius:6px}
.user-line{margin-top:6px;color:#475569}
@media(max-width:820px){
 .container{grid-template-columns:1fr}
 .palette{position:static;max-height:none}
 .palette-grid{max-height:170px;grid-template-columns:repeat(8,1fr)}
 .summary{grid-template-columns:repeat(2,1fr)}
 .brand{font-size:14px}
}
</style>
<script>
window.MathJax = {tex: {inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$','$$']]}, svg: {fontCache: 'global'}};
</script>
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

<body>
<div class="topbar">
  <a class="home" href="index.html">Home</a>
  <div class="brand">HSSC Assistant Sanitary Inspector Mock Test 2017</div>
  <div class="timer" id="timer">120:00</div>
</div>

<div class="container">
  <main>
    <div id="testBox" class="card">
      <div class="qmeta"><div class="qno" id="qno"></div><div class="marks">Correct +1 | Wrong -0.25</div></div>
      <div class="question" id="question"></div>
      <div id="options"></div>
      <div class="actions">
        <button class="secondary" onclick="prevQ()">Previous</button>
        <button class="secondary" onclick="markReview()">Mark for Review</button>
        <button class="primary" onclick="nextQ()">Save & Next</button>
        <button class="danger" onclick="submitTest()">Submit Test</button>
      </div>
    </div>

    <div id="resultBox" class="card result-box">
      <h2>Result</h2>
      <div class="summary">
        <div class="stat"><b id="score">0</b>Score</div>
        <div class="stat"><b id="correct">0</b>Correct</div>
        <div class="stat"><b id="wrong">0</b>Wrong</div>
        <div class="stat"><b id="unattempted">0</b>Unattempted</div>
      </div>
      <h3>Answer Key</h3>
      <p>Correct answer format is shown as: <b>==(2) Hansen==</b></p>
      <div id="answerKey"></div>
      <div class="actions">
        <button class="primary" onclick="location.reload()">Restart Test</button>
        <a class="home" href="index.html">Home</a>
      </div>
    </div>
  </main>

  <aside class="card palette">
    <h3>Question Palette</h3>
    <div class="palette-grid" id="palette"></div>
    <div class="legend">
      <div><span class="dot"></span>Not Answered</div>
      <div><span class="dot ans"></span>Answered</div>
      <div><span class="dot rev"></span>Marked Review</div>
    </div>
  </aside>
</div>

<script>
const QUESTIONS = [{"qno": 1, "question": "According to Biomedical Waste Management Rules, wastes generated from disposable items such as tubing, bottles, intravenous tubes are collected in one of the following bag:<br><span class=\"hi\">जैव-चिकित्सा कचरा प्रबंधन नियमों के अनुसार, डिस्पोजेबल वस्तुओं जैसे ट्यूबिंग, बोतलें, अन्तःशिरा नलियों द्वारा जनित कचरा निम्न में से किस थैली में भरा जाता है ?</span>", "options": [{"num": 1, "en": "yellow", "hi": "पीले", "correct": false}, {"num": 2, "en": "red", "hi": "लाल", "correct": true}, {"num": 3, "en": "white", "hi": "सफेद", "correct": false}, {"num": 4, "en": "blue", "hi": "नीला", "correct": false}], "answer": 2}, {"qno": 2, "question": "How much of the general health waste is generated in total biomedical waste ?<br><span class=\"hi\">संपूर्ण जैव-चिकित्सा अपशिष्ट में सामान्य स्वास्थ्य अपशिष्ट कितना उत्पन्न होता है ?</span>", "options": [{"num": 1, "en": "15%", "hi": "15%", "correct": false}, {"num": 2, "en": "1%", "hi": "1%", "correct": false}, {"num": 3, "en": "3%", "hi": "3%", "correct": false}, {"num": 4, "en": "80%", "hi": "80%", "correct": true}], "answer": 4}, {"qno": 3, "question": "The function of the vertebral column is protection of<br><span class=\"hi\">कशेरुक-दंड का कार्य किसको रक्षण देने का है?</span>", "options": [{"num": 1, "en": "spinal cord", "hi": "मेरुरज्जु", "correct": true}, {"num": 2, "en": "thoracic organs", "hi": "वक्षीय अंगों", "correct": false}, {"num": 3, "en": "abdominal organs", "hi": "उदरीय अंगों", "correct": false}, {"num": 4, "en": "brain", "hi": "मस्तिष्क", "correct": false}], "answer": 1}, {"qno": 4, "question": "The lacrimal glands of eyes secrete<br><span class=\"hi\">आँखों की अश्रुग्रंथियाँ किसका स्राव करती है ?</span>", "options": [{"num": 1, "en": "saliva", "hi": "लार", "correct": false}, {"num": 2, "en": "tears", "hi": "आँसू", "correct": true}, {"num": 3, "en": "mucus", "hi": "श्लेष्मा", "correct": false}, {"num": 4, "en": "cells", "hi": "कोशिकाओं", "correct": false}], "answer": 2}, {"qno": 5, "question": "The energy produced in the body may be measured and expressed in units of heat i.e.<br><span class=\"hi\">शरीर में उत्पन्न ऊर्जा को ऊष्मा की किस इकाई में मापा और व्यक्त किया जाता है ?</span>", "options": [{"num": 1, "en": "Joule", "hi": "जूल", "correct": false}, {"num": 2, "en": "Celsius", "hi": "सेल्सियस", "correct": false}, {"num": 3, "en": "Kilocalories", "hi": "किलोकैलोरी", "correct": true}, {"num": 4, "en": "Fahrenheit", "hi": "फारेनहाइट", "correct": false}], "answer": 3}, {"qno": 6, "question": "From poorly managed infectious wastes and sharp instruments, one of the following infections may be transmitted.<br><span class=\"hi\">संक्रामक अपशिष्टों और खराब प्रबंधित तीक्ष्ण उपकरणों से निम्न में से एक संक्रमण संचरित हो सकता है:</span>", "options": [{"num": 1, "en": "Cancer", "hi": "कैंसर", "correct": false}, {"num": 2, "en": "HIV", "hi": "एचआईवी", "correct": true}, {"num": 3, "en": "Malaria", "hi": "मलेरिया", "correct": false}, {"num": 4, "en": "Dengue", "hi": "डेंगू", "correct": false}], "answer": 2}, {"qno": 7, "question": "If there is sprain in a limb of a person, then one of the following measures should be done:<br><span class=\"hi\">यदि किसी व्यक्ति के अंग में मोच है, तो निम्न में से एक उपाय किया जाना चाहिए :</span>", "options": [{"num": 1, "en": "rest and support the injured in the most comfortable position", "hi": "सबसे आरामदायक स्थिति में घायल को आराम और सहारा देना", "correct": true}, {"num": 2, "en": "make the injured lying", "hi": "घायल को लिटा देना", "correct": false}, {"num": 3, "en": "make the injured sleep on abdomen", "hi": "घायल को उदर से सुलाना", "correct": false}, {"num": 4, "en": "make the injured stand", "hi": "घायल को खड़ा रखो", "correct": false}], "answer": 1}, {"qno": 8, "question": "The rate of chest compressions to breath in children during CPR is<br><span class=\"hi\">बच्चों में सी.पी.आर. (CPR) के दौरान छाती संपीडन की साँस में दर है</span>", "options": [{"num": 1, "en": "15 compressions and 2 breathing", "hi": "15 संपीडन और 2 श्वसन", "correct": false}, {"num": 2, "en": "15 compressions and 1 breathing", "hi": "15 संपीडन और 1 श्वसन", "correct": false}, {"num": 3, "en": "30 compressions and 2 breathing", "hi": "30 संपीडन और 2 श्वसन", "correct": true}, {"num": 4, "en": "30 compressions and 1 breathing", "hi": "30 संपीडन और 1 श्वसन", "correct": false}], "answer": 3}, {"qno": 9, "question": "A superficial wound with peeling of skin is known as<br><span class=\"hi\">त्वचा के छीलने के साथ एक सतही घाव को इस रूप में जाना जाता है</span>", "options": [{"num": 1, "en": "cut", "hi": "घाव", "correct": false}, {"num": 2, "en": "torn", "hi": "फटना", "correct": false}, {"num": 3, "en": "puncture", "hi": "पंचर", "correct": false}, {"num": 4, "en": "abrasion", "hi": "खरोंच", "correct": true}], "answer": 4}, {"qno": 10, "question": "To protect from water being contaminated, Parliament enacted the first Water (Prevention and Control of Pollution) Act in the year of<br><span class=\"hi\">पानी को दूषित होने से बचाने के लिए, संसद ने पहले जल (प्रदूषण रोकथाम और नियंत्रण) अधिनियम को किस वर्ष में अधिनियमित किया ?</span>", "options": [{"num": 1, "en": "1974", "hi": "1974", "correct": true}, {"num": 2, "en": "1984", "hi": "1984", "correct": false}, {"num": 3, "en": "1994", "hi": "1994", "correct": false}, {"num": 4, "en": "2004", "hi": "2004", "correct": false}], "answer": 1}, {"qno": 11, "question": "Optimum period of storage of river water is considered to be of<br><span class=\"hi\">नदी के पानी की संग्रहण की अनुकूलतम अवधि को माना जाता है</span>", "options": [{"num": 1, "en": "5-7 days", "hi": "5-7 दिन", "correct": false}, {"num": 2, "en": "10-14 days", "hi": "10-14 दिन", "correct": true}, {"num": 3, "en": "15-20 days", "hi": "15-20 दिन", "correct": false}, {"num": 4, "en": "21-30 days", "hi": "21-30 दिन", "correct": false}], "answer": 2}, {"qno": 12, "question": "The components of a typical water purification system on large scale comprises of one of the following measures:<br><span class=\"hi\">बड़े पैमाने पर एक विशिष्ट जल शुद्धीकरण प्रणाली के घटकों में निम्न में से एक उपाय शामिल है :</span>", "options": [{"num": 1, "en": "storage, filtration and disinfection", "hi": "संग्रहण, निस्यंदन और रोगाणुनाशन", "correct": true}, {"num": 2, "en": "chemical, physical and mechanical", "hi": "रासायनिक, भौतिक और यांत्रिक", "correct": false}, {"num": 3, "en": "surveillance", "hi": "निगरानी", "correct": false}, {"num": 4, "en": "Survey", "hi": "सर्वेक्षण", "correct": false}], "answer": 1}, {"qno": 13, "question": "How much approxi. percent of available chlorine does the bleaching powder contain ?<br><span class=\"hi\">ब्लीचिंग पाउडर में उपलब्ध क्लोरीन का लगभग कितने प्रतिशत होता है ?</span>", "options": [{"num": 1, "en": "10", "hi": "10", "correct": false}, {"num": 2, "en": "20", "hi": "20", "correct": false}, {"num": 3, "en": "33", "hi": "33", "correct": true}, {"num": 4, "en": "50", "hi": "50", "correct": false}], "answer": 3}, {"qno": 14, "question": "How much ppm of available chlorine does the sodium hypochlorite contain ?<br><span class=\"hi\">उपलब्ध क्लोरीन का कितना ppm सोडियम हायपोक्लोराइट में होता है ?</span>", "options": [{"num": 1, "en": "80,000 to 1,80,000 ppm", "hi": "80,000 से 1,80,000 ppm", "correct": false}, {"num": 2, "en": "10,000 to 25,000 ppm", "hi": "10,000 से 25,000 ppm", "correct": false}, {"num": 3, "en": "30,000 to 55,000 ppm", "hi": "30,000 से 55,000 ppm", "correct": true}, {"num": 4, "en": "60,000 to 80,000 ppm", "hi": "60,000 से 80,000 ppm", "correct": false}], "answer": 3}, {"qno": 15, "question": "Formaldehyde is more commonly known as<br><span class=\"hi\">फोर्मल्डीहाइड सामान्य रूप से किस नाम से प्रसिद्ध है ?</span>", "options": [{"num": 1, "en": "Savlon", "hi": "सेवलोन", "correct": false}, {"num": 2, "en": "Dettol", "hi": "डेटोल", "correct": false}, {"num": 3, "en": "Formalin", "hi": "फोर्मेलीन", "correct": true}, {"num": 4, "en": "Alcohol", "hi": "एल्कोहोल", "correct": false}], "answer": 3}, {"qno": 16, "question": "Dental caries can be occurred more frequently if the excessive intake of one of the following is there<br><span class=\"hi\">दंत क्षय अधिक बार हो सकता है, यदि निम्न में से एक का अत्यधिक सेवन होता है :</span>", "options": [{"num": 1, "en": "sugar and refined carbohydrates", "hi": "चीनी और परिष्कृत कार्बोहाइट्रेड", "correct": true}, {"num": 2, "en": "fruits and vegetables", "hi": "फल और सब्जियाँ", "correct": false}, {"num": 3, "en": "water", "hi": "पानी", "correct": false}, {"num": 4, "en": "home-made food", "hi": "घर का खाना", "correct": false}], "answer": 1}, {"qno": 17, "question": "The conditions resulting from infection of the eye are<br><span class=\"hi\">आँख के संक्रमण से होने वाली परिस्थितियाँ हैं</span>", "options": [{"num": 1, "en": "eye strain and cataract", "hi": "नेत्र तनाव और मोतियाबिंद", "correct": false}, {"num": 2, "en": "conjunctivitis and trachoma", "hi": "कन्जक्टीवाइटीस और ट्रेकोमा", "correct": true}, {"num": 3, "en": "cataract and trachoma", "hi": "मोतियाबिंद और ट्रेकोमा", "correct": false}, {"num": 4, "en": "glaucoma and trachoma", "hi": "ग्लूकोमा और ट्रेकोमा", "correct": false}], "answer": 2}, {"qno": 18, "question": "The amino acids which cannot be synthesized in the body are called as<br><span class=\"hi\">एमिनो एसिड जिन्हें शरीर में संश्लेषित नहीं किया जा सकता उन्हें कहते हैं</span>", "options": [{"num": 1, "en": "essential amino acids", "hi": "आवश्यक एमिनो एसिड", "correct": true}, {"num": 2, "en": "non-essential amino acids", "hi": "अनावश्यक एमिनो एसिड", "correct": false}, {"num": 3, "en": "complete proteins", "hi": "संपूर्ण प्रोटीन", "correct": false}, {"num": 4, "en": "protein quality", "hi": "प्रोटीन की गुणवत्ता", "correct": false}], "answer": 1}, {"qno": 19, "question": "From the following, this is a water soluble vitamin<br><span class=\"hi\">निम्नलिखित में से कौन सा पानी में घुलनशील विटामिन है ?</span>", "options": [{"num": 1, "en": "Vitamin A", "hi": "विटामिन A", "correct": false}, {"num": 2, "en": "Vitamin B complex", "hi": "विटामिन B कॉम्पलेक्स", "correct": true ns": [{"num": 1, "en": "बिजली - तेज", "hi": "", "correct": true}, {"num": 2, "en": "तेज - बिजली", "hi": "", "correct": false}, {"num": 3, "en": "बादल - गर्जन", "hi": "", "correct": false}, {"num": 4, "en": "गर्जन - बादल", "hi": "", "correct": false}], "answer": 1}, {"qno": 98, "question": "निम्न में से किस शब्द की वर्तनी सही है ?", "options": [{"num": 1, "en": "आधीन", "hi": "", "correct": false}, {"num": 2, "en": "देहिक", "hi": "", "correct": false}, {"num": 3, "en": "हिंग", "hi": "", "correct": false}, {"num": 4, "en": "दायित्व", "hi": "", "correct": true}], "answer": 4}, {"qno": 99, "question": "'बिजली' का समानार्थी शब्द नहीं है :", "options": [{"num": 1, "en": "चंचला", "hi": "", "correct": false}, {"num": 2, "en": "सफरी", "hi": "", "correct": true}, {"num": 3, "en": "चपला", "hi": "", "correct": false}, {"num": 4, "en": "दामिनी", "hi": "", "correct": false}], "answer": 2}, {"qno": 100, "question": "निम्न में से कौन सा विलोम युग्म सही है ?", "options": [{"num": 1, "en": "नूतन - आज", "hi": "", "correct": false}, {"num": 2, "en": "कुटिल - सीधा", "hi": "", "correct": false}, {"num": 3, "en": "रक्षक - तक्षक", "hi": "", "correct": false}, {"num": 4, "en": "पुरस्कार - दंड", "hi": "", "correct": true}], "answer": 4}];
let current = 0;
let answers = Array(QUESTIONS.length).fill(null);
let review = Array(QUESTIONS.length).fill(false);
let remaining = 120 * 60;
const testKey = 'attempt_history_hssc_asi_2017';

function renderQuestion(){
  const q = QUESTIONS[current];
  document.getElementById('qno').innerText = 'Question ' + q.qno + ' of ' + QUESTIONS.length;
  document.getElementById('question').innerHTML = q.question;
  const optBox = document.getElementById('options');
  optBox.innerHTML = '';
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option' + (answers[current] === opt.num ? ' selected' : '');
    let text = '(' + opt.num + ') ' + opt.en;
    if(opt.hi) text += '<span class="hi">(' + opt.num + ') ' + opt.hi + '</span>';
    btn.innerHTML = text;
    btn.onclick = () => { answers[current] = opt.num; renderQuestion(); renderPalette(); };
    optBox.appendChild(btn);
  });
  renderPalette();
  if(window.MathJax) MathJax.typesetPromise();
}

function renderPalette(){
  const p = document.getElementById('palette');
  p.innerHTML = '';
  QUESTIONS.forEach((q,i) => {
    const b = document.createElement('button');
    b.className = 'pbtn' + (i===current?' active':'') + (answers[i]!==null?' answered':'') + (review[i]?' review':'');
    b.innerText = q.qno;
    b.onclick = () => { current=i; renderQuestion(); };
    p.appendChild(b);
  });
}

function nextQ(){ if(current < QUESTIONS.length-1) current++; renderQuestion(); }
function prevQ(){ if(current > 0) current--; renderQuestion(); }
function markReview(){ review[current] = !review[current]; renderPalette(); }

function formatCorrect(q){
  const opt = q.options.find(o => o.num === q.answer);
  return '==(' + q.answer + ') ' + opt.en + '==';
}

function submitTest(){
  let correct=0, wrong=0, unattempted=0, score=0;
  QUESTIONS.forEach((q,i) => {
    if(answers[i]===null) unattempted++;
    else if(answers[i]===q.answer) { correct++; score += 1; }
    else { wrong++; score -= 0.25; }
  });
  document.getElementById('score').innerText = score.toFixed(2);
  document.getElementById('correct').innerText = correct;
  document.getElementById('wrong').innerText = wrong;
  document.getElementById('unattempted').innerText = unattempted;
  const ak = document.getElementById('answerKey');
  ak.innerHTML = '';
  QUESTIONS.forEach((q,i) => {
    const card = document.createElement('div');
    card.className = 'answer-card';
    const correctOpt = q.options.find(o => o.num === q.answer);
    const selectedOpt = q.options.find(o => o.num === answers[i]);
    card.innerHTML = '<b>Q.'+q.qno+'</b> ' + q.question +
      '<div class="answer-line">' + formatCorrect(q) + '</div>' +
      (correctOpt.hi ? '<div class="user-line">Hindi: ('+q.answer+') '+correctOpt.hi+'</div>' : '') +
      '<div class="user-line">Your Answer: ' + (selectedOpt ? '('+selectedOpt.num+') '+selectedOpt.en : 'Not Attempted') + '</div>';
    ak.appendChild(card);
  });
  const item = {date: new Date().toLocaleString(), score, correct, wrong, unattempted};
  const old = JSON.parse(localStorage.getItem(testKey) || '[]');
  old.unshift(item);
  localStorage.setItem(testKey, JSON.stringify(old.slice(0,20)));
  document.getElementById('testBox').style.display='none';
  document.getElementById('resultBox').style.display='block';
  window.scrollTo(0,0);
  if(window.MathJax) MathJax.typesetPromise();
}

function tick(){
  const m = Math.floor(remaining/60), s = remaining%60;
  document.getElementById('timer').innerText = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  if(remaining <= 0) submitTest(); else remaining--;
}
setInterval(tick, 1000);
tick();
renderQuestion();
</script>

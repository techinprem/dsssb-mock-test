<script>
const TEST_ID="nhm_rajasthan<sub>2</sub>015_senior_sanitary_inspector_bilingual<sub>1</sub>00_v1";
const questions=[{"id": 1, "hi": "निम्न में से क्या नाईसीन की कमी में नहीं दिखता है-", "en": "Which of the following is not seen in niacin deficiency?", "opts_hi": ["बहरापन", "दस्त", "मनोभ्रम", "त्वचा का प्रदाह"], "opts_en": ["Deafness", "Diarrhoea", "Delirium/confusion", "Dermatitis"], "ans": 1}, {"id": 2, "hi": "दाँतों की बीमारी निम्न में से किसकी कमी से होती है -", "en": "Dental disease occurs due to deficiency of which of the following?", "opts_hi": ["आयोडीन", "आयरन", "फ्लोरीन", "कॉपर"], "opts_en": ["Iodine", "Iron", "Fluorine", "Copper"], "ans": 3}, {"id": 3, "hi": "कौनसा कृमि माँस के सेवन के द्वारा फैलता है-", "en": "Which worm spreads through consumption of meat?", "opts_hi": ["हुक वर्म", "टेप वर्म", "राउंड वर्म", "पिन वर्म"], "opts_en": ["Hookworm", "Tapeworm", "Roundworm", "Pinworm"], "ans": 2}, {"id": 4, "hi": "भारत के ग्रामीण क्षेत्र के स्वास्थ्य का मुख्य केन्द्र -", "en": "The main health centre in rural India is -", "opts_hi": ["पीएचसी", "परिवार", "डीएच", "आंगनबाड़ी"], "opts_en": ["PHC", "Family", "DH", "Anganwadi"], "ans": 1}, {"id": 5, "hi": "संक्रमित व्यक्ति को स्वस्थ व्यक्ति से पृथक रखने की प्रक्रिया को कहा जाता है -", "en": "The process of keeping an infected person separate from healthy persons is called -", "opts_hi": ["इन्क्यूबेशन", "आईसोलेशन", "इनोक्यूलेशन", "इम्यूनाईजेशन"], "opts_en": ["Incubation", "Isolation", "Inoculation", "Immunization"], "ans": 2}, {"id": 6, "hi": "जल शुद्धिकरण का प्रथम चरण है-", "en": "The first step of water purification is -", "opts_hi": ["अवसादन", "छानना", "भंडारण", "क्लोरीनीकरण"], "opts_en": ["Sedimentation", "Filtration", "Storage", "Chlorination"], "ans": 3}, {"id": 7, "hi": "वह कचरा जिसमें पैथोजीन (रोग जनक) होने की आशंका होती है -", "en": "The waste suspected to contain pathogens is -", "opts_hi": ["परमेथरीन", "मेलेथियन", "बीएचसी", "बेन्जाइल बेन्जोएट"], "opts_en": ["Permethrin", "Malathion", "BHC", "Benzyl benzoate"], "ans": 3}, {"id": 8, "hi": "नवविवाहित दम्पत्ति, जिसमें महिला प्रजनन आयु वर्ग की है-", "en": "A newly married couple in which the woman is in reproductive age group is called -", "opts_hi": ["संभावित दम्पत्ति", "उच्च खतरे वाले दम्पत्ति", "योग्य दम्पत्ति", "सक्षम दम्पत्ति"], "opts_en": ["Potential couple", "High-risk couple", "Eligible couple", "Capable couple"], "ans": 3}, {"id": 9, "hi": "श्वसनीय धूल का आकार है -", "en": "The size of respirable dust is -", "opts_hi": ["20 माईक्रोन", "15 माईक्रोन", "10 माईक्रोन", "5 माईक्रोन"], "opts_en": ["20 micron", "15 micron", "10 micron", "5 micron"], "ans": 4}, {"id": 10, "hi": "पैरालिटिक पोलियो की निश्चित जाँच है -", "en": "The definitive test for paralytic polio is -", "opts_hi": ["मल की जाँच", "सीएसएफ की जाँच", "खून की जाँच", "नसों की जाँच"], "opts_en": ["Stool examination", "CSF examination", "Blood test", "Nerve test"], "ans": 1}, {"id": 11, "hi": "भारत में पिछली जनगणना कब हुई थी-", "en": "When was the last census in India held?", "opts_hi": ["2001", "2005", "2010", "2011"], "opts_en": ["2001", "2005", "2010", "2011"], "ans": 4}, {"id": 12, "hi": "टीकाकरण एक तरीका है -", "en": "Immunization is a method of -", "opts_hi": ["प्राईमरी प्रिवेंशन", "सैकेण्डरी प्रिवेंशन", "टैरेशरी प्रिवेंशन", "बैरियर प्रिवेंशन"], "opts_en": ["Primary prevention", "Secondary prevention", "Tertiary prevention", "Barrier prevention"], "ans": 1}, {"id": 13, "hi": "1984 की भोपाल त्रासदी किस जहरीले रसायन के कारण हुई थी-", "en": "The 1984 Bhopal tragedy was caused by which toxic chemical?", "opts_hi": ["मिथाईल साईनाइड", "मिथाईल आइसोसाइनेट", "मिथाईल आइसोक्लोराइड", "इनमें से कोई नहीं"], "opts_en": ["Methyl cyanide", "Methyl isocyanate", "Methyl isochloride", "None of these"], "ans": 2}, {"id": 14, "hi": "निमोनिया का कारक जीवाणु है-", "en": "The causative bacteria of pneumonia are -", "opts_hi": ["स्ट्रेपटोकोकस", "स्टैफाईलोकोकाई", "हीमोफीलस इन्फ्लूएन्जा", "उपरोक्त सभी"], "opts_en": ["Streptococcus", "Staphylococci", "Haemophilus influenzae", "All of the above"], "ans": 4}, {"id": 15, "hi": "अप्रिय परन्तु असंक्रामक कारक जिसका परोक्ष अथवा अपरोक्ष रूप "58 वर्ष से अधिक उम्र का"], "opts_en": ["Above 52 years", "Above 55 years", "Above 60 years", "Above 58 years"], "ans": 3}, {"id": 97, "hi": "एच.आई.वी. प्रभावित करता है -", "en": "HIV affects -", "opts_hi": ["वृद्धि एवं विकास को", "तंत्रिका तंत्र को", "प्रतिरोधक तंत्र को", "हृदय के कार्य को"], "opts_en": ["Growth and development", "Nervous system", "Immune system", "Heart function"], "ans": 3}, {"id": 98, "hi": "भारत के द्वारा 1998 में राजस्थान के किस स्थान पर परमाणु परीक्षण किया गया-", "en": "India conducted the 1998 nuclear test at which place in Rajasthan?", "opts_hi": ["फलौदी", "पिंड़वाड़ा", "रामगढ़", "पोकरण"], "opts_en": ["Phalodi", "Pindwara", "Ramgarh", "Pokhran"], "ans": 4}, {"id": 99, "hi": "किस भारतीय टीम ने 36 साल बाद ओलम्पिक खेलों के लिए क्वालिफाई किया-", "en": "Which Indian team qualified for the Olympic Games after 36 years?", "opts_hi": ["बॉस्केट बॉल", "पुरुष हॉकी", "महिला हॉकी", "कबड्डी"], "opts_en": ["Basketball", "Men's hockey", "Women's hockey", "Kabaddi"], "ans": 3}, {"id": 100, "hi": "कंगारू मदर केयर दिया जाता है -", "en": "Kangaroo Mother Care is given by -", "opts_hi": ["माता द्वारा", "पिता द्वारा", "चिकित्सक द्वारा", "किसी के भी द्वारा"], "opts_en": ["Mother", "Father", "Doctor", "Anyone"], "ans": 4}];let current=0;let lang=localStorage.getItem(TEST_ID+"_lang")||"hi";let answers=Array(questions.length).fill(null);let review=Array(questions.length).fill(false);let submitted=false;let totalSeconds=100*60;
function esc(s){return String(s??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll("\n","<br>")}
function getSubject(q){if(q.id<=18)return lang==="en"?"Public Health Basics":"जनस्वास्थ्य मूल बातें"; if(q.id<=60)return lang==="en"?"Sanitation / Disease Control":"स्वच्छता / रोग नियंत्रण"; if(q.id<=80)return lang==="en"?"Health Schemes / Rajasthan GK":"स्वास्थ्य योजनाएँ / राजस्थान GK"; return lang==="en"?"GK / Health Awareness":"GK / स्वास्थ्य जागरूकता"}
function textFor(q){if(lang==="hi")return esc(q.hi);if(lang==="en")return esc(q.en);return `<div><span class="math">{esc(q.hi)}</div><div class="en"></span>{esc(q.en)}</div>`}
function optFor(q,i){if(lang==="hi")return esc(q.opts_hi[i]||"");if(lang==="en")return esc(q.opts_en[i]||"");return `<b>HI:</b> <span class="math">{esc(q.opts_hi[i]||"")}<br><b>EN:</b> </span>{esc(q.opts_en[i]||"")}`}
function render(){const q=questions[current];document.getElementById("qCount").textContent=`Question <span class="math">{current+1}/</span>{questions.length}`;document.getElementById("subjectLabel").textContent=getSubject(q);document.getElementById("question").innerHTML=(current+1)+". "+textFor(q);const optDiv=document.getElementById("options");optDiv.innerHTML="";q.opts_hi.forEach((_,i)=>{const btn=document.createElement("button");btn.className="opt"+(answers[current]===i+1?" selected":"");btn.innerHTML=`(<span class="math">{i+1}) </span>{optFor(q,i)}`;btn.onclick=()=>{if(!submitted){answers[current]=i+1;saveState();render();}};optDiv.appendChild(btn);});renderPalette();updateLangButtons();}
function updateLangButtons(){["hi","en","bi"].forEach(x=>document.getElementById("btn-"+x).classList.toggle("active",lang===x));}function setLang(x){lang=x;localStorage.setItem(TEST_ID+"_lang",lang);render();}
function renderPalette(){const p=document.getElementById("palette");p.innerHTML="";questions.forEach((q,i)=>{const d=document.createElement("div");d.className="num"+(i===current?" active":"")+(answers[i]?" answered":"")+(review[i]?" review":"");d.textContent=i+1;d.onclick=()=>{current=i;saveState();render();};p.appendChild(d);});}
function prevQ(){if(current>0){current--;saveState();render();}}function saveNext(){if(current<questions.length-1){current++;saveState();render();}}function clearAns(){answers[current]=null;saveState();render();}function toggleReview(){review[current]=!review[current];saveState();render();}
function submitTest(){if(!confirm("Submit this test?"))return;submitted=true;let correct=0,wrong=0,attempted=0;questions.forEach((q,i)=>{if(answers[i]){attempted++;if(answers[i]===q.ans)correct++;else wrong++;}});const marks=correct-wrong*0.25;document.getElementById("testArea").style.display="none";document.getElementById("resultArea").style.display="block";document.getElementById("scoreBox").innerHTML=`<div class="score-box"><b><span class="math">{attempted}</b>Attempted</div><div class="score-box"><b></span>{correct}</b>Correct</div><div class="score-box"><b><span class="math">{wrong}</b>Wrong</div><div class="score-box"><b></span>{marks.toFixed(2)}</b>Score</div>`;saveHistory({date:new Date().toLocaleString(),attempted,correct,wrong,marks:marks.toFixed(2)});localStorage.removeItem(TEST_ID+"_state");loadHistory();}
function showReview(){let out="<h3>Answer Review</h3>";questions.forEach((q,i)=>{const status=!answers[i]?"Skipped":(answers[i]===q.ans?"Correct":"Wrong");out+=`<div class="review-card"><b>Q<span class="math">{i+1}.</b> </span>{textFor(q)}<br><span class="small">Your answer: <span class="math">{answers[i]||"-"} | Correct answer: </span>{q.ans} | Status: <span class="math">{status}</span></div>`;});document.getElementById("reviewArea").innerHTML=out;}
function restartTest(){if(!confirm("Restart this test?"))return;current=0;answers=Array(questions.length).fill(null);review=Array(questions.length).fill(false);totalSeconds=100*60;submitted=false;localStorage.removeItem(TEST_ID+"_state");document.getElementById("resultArea").style.display="none";document.getElementById("testArea").style.display="block";render();}
function tick(){if(submitted)return;let m=Math.floor(totalSeconds/60),s=totalSeconds%60;document.getElementById("timer").textContent=String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");if(totalSeconds<=0){submitted=true;alert("Time is over. Test will be submitted.");submitted=false;submitTest();}else totalSeconds--;saveState();}
function saveState(){localStorage.setItem(TEST_ID+"_state",JSON.stringify({current,answers,review,totalSeconds}));}function loadState(){const raw=localStorage.getItem(TEST_ID+"_state");if(raw){try{const st=JSON.parse(raw);current=st.current??0;answers=st.answers??answers;review=st.review??review;totalSeconds=st.totalSeconds??totalSeconds;}catch(e){}}}
function saveHistory(item){const key=TEST_ID+"_history";let h=JSON.parse(localStorage.getItem(key)||"[]");h.unshift(item);h=h.slice(0,10);localStorage.setItem(key,JSON.stringify(h));}function loadHistory(){const h=JSON.parse(localStorage.getItem(TEST_ID+"_history")||"[]");document.getElementById("history").innerHTML=h.length?h.map(x=>`<div class="history-item"><b></span>{x.date}</b><br>Score: <span class="math">{x.marks} | Correct: </span>{x.correct} | Wrong: ${x.wrong}</div>`).join(""):"<p class='small'>No attempt yet.</p>";}
loadState();render();loadHistory();setInterval(tick,1000);

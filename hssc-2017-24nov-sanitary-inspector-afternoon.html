<script>
const TEST_ID="hssc<sub>2</sub>017<sub>2</sub>4nov_sanitary_inspector_afternoon_bilingual<sub>1</sub>00_v1";
const questions=[{"id": 1, "hi": "जैव चिकित्सा कचरा प्रबंधन नियमों के अनुसार, डिस्पोजेबल वस्तुओं जैसे ट्यूबिंग, बोतलें, अन्तः शिरा नलियों द्वारा जनित कचरा निम्न में से किस थैली में भरा जाता है ?", "en": "According to Biomedical Waste Management Rules, waste generated from disposable items such as tubing, bottles and intravenous tubes is put in which bag?", "opts_hi": ["पीले", "लाल", "सफेद", "नीला"], "opts_en": ["Yellow", "Red", "White", "Blue"], "ans": 2}, {"id": 2, "hi": "संपूर्ण जैव-चिकित्सा अपशिष्ट में सामान्य स्वास्थ्य अपशिष्ट कितना उत्पन्न होता है ?", "en": "How much general health waste is generated in total biomedical waste?", "opts_hi": ["15%", "1%", "3%", "80%"], "opts_en": ["15%", "1%", "3%", "80%"], "ans": 4}, {"id": 3, "hi": "कशेरूक-दंड का कार्य किसको रक्षण देने का है?", "en": "The vertebral column protects which structure?", "opts_hi": ["मेरूज्जु", "वक्षीय अंगों", "उदरीय अंगों", "मस्तिष्क"], "opts_en": ["Spinal cord", "Thoracic organs", "Abdominal organs", "Brain"], "ans": 1}, {"id": 4, "hi": "आँखों की अश्रुग्रंथियाँ किसका स्त्राव करती है?", "en": "The lacrimal glands of the eyes secrete -", "opts_hi": ["लार", "आँसू", "श्लेष्मा", "कोशिकाओं"], "opts_en": ["Saliva", "Tears", "Mucus", "Cells"], "ans": 2}, {"id": 5, "hi": "शरीर में उत्पन्न ऊर्जा को ऊष्मा की किस इकाई में मापा और व्यक्त किया जाता है ?", "en": "Energy produced in the body is measured and expressed in which heat unit?", "opts_hi": ["जूल", "सेल्सियस", "किलोकैलोरी", "फारेनहाइट"], "opts_en": ["Joule", "Celsius", "Kilocalorie", "Fahrenheit"], "ans": 3}, {"id": 6, "hi": "खराब प्रबंधित संक्रामक अपशिष्टों और तीक्ष्ण उपकरणों से निम्न में से एक संक्रमण संचरित हो सकता है।", "en": "Poorly managed infectious waste and sharp instruments can transmit which infection?", "opts_hi": ["कैंसर", "एचआईवी", "मलेरिया", "डेंगू"], "opts_en": ["Cancer", "HIV", "Malaria", "Dengue"], "ans": 2}, {"id": 7, "hi": "यदि किसी व्यक्ति के अंग में मोच है, तो निम्न में से एक उपाय किया जाना चाहिए:", "en": "If a person has a sprain in a limb, which measure should be taken?", "opts_hi": ["सबसे आरामदायक स्थिति में घायल को आराम और सहारा देना।", "घायल को लिटा देना", "घायल को उदर से सुलाना", "घायल को खडा रखो"], "opts_en": ["Rest and support the injured person in the most comfortable position", "Make the injured person lie down", "Make the injured person lie on abdomen", "Keep the injured person standing"], "ans": 1}, {"id": 8, "hi": "बच्चों में सी.पी.आर. (CPR) के दौरान छाती संपीडन की साँस में दर है", "en": "During CPR in children, the chest compression to breath ratio is -", "opts_hi": ["15 संपीडन और 2 श्वसन", "15 संपीडन और 1 श्वसन", "30 संपीडन और 2 श्वसन", "30 संपीडन और 1 श्वसन"], "opts_en": ["15 compressions and 2 breaths", "15 compressions and 1 breath", "30 compressions and 2 breaths", "30 compressions and 1 breath"], "ans": 1}, {"id": 9, "hi": "त्वचा के छीलने के साथ एक सतही घाव को इस रूप में जाना जाता है।", "en": "A superficial wound with peeling/scraping of skin is known as -", "opts_hi": ["घाव", "फटना", "पंचर", "खरोंच"], "opts_en": ["Wound", "Laceration", "Puncture", "Abrasion"], "ans": 4}, {"id": 10, "hi": "पानी को दूषित होने से बचाने के लिए, संसद ने पहले जल (प्रदूषण रोकथाम और नियंत्रण) अधिनियम को किस वर्ष में अधिनियमित किया?", "en": "To prevent water pollution, Parliament first enacted the Water Prevention and Control of Pollution Act in which year?", "opts_hi": ["1974", "1984", "1994", "2004"], "opts_en": ["1974", "1984", "1994", "2004"], "ans": 1}, {"id": 11, "hi": "नदी के पानी की संग्रहण की अनुकूलतम अवधि को माना जाता है।", "en": "The optimum storage period of river water is considered to be -", "opts_hi": ["5-7 दिन", "10-14 दिन", "15-20 दिन", "21-30 दिन"], "opts_en": ["5-7 days", "10-14 days", "15-20 days", "21-30 days"], "ans": 2}, {"id": 12, "hi": "बड़े पैमाने पर एक विशिष्ट जल शुद्धीकरण प्रणाली के घटकों में निम्न में से एक उपाय शामिल है:", "en": "Components of a typical large-scale water purification system include -", "opts_hi": ["संग्रहण, निस्यंदन और रोणागुनाशन", "रासायनिक, भौतिक और  "en": "In a code language, \"min fin bin gin\" means \"trains are always late\" etc. What is the meaning of \"vin\"?", "opts_hi": ["all", "late", "trains", "drivers"], "opts_en": ["all", "late", "trains", "drivers"], "ans": 1}, {"id": 84, "hi": "3759×9573 के गुणनफल में दहाई के अंकों और इकाई के अंकों का योग क्या है ?", "en": "What is the sum of the tens digit and units digit in the product of 3759×9573?", "opts_hi": ["9", "16", "0", "7"], "opts_en": ["9", "16", "0", "7"], "ans": 4}, {"id": 85, "hi": "If a-b=3 और a²+b²=29 तो ab का मूल्य ज्ञात करो।", "en": "If a-b=3 and a²+b²=29, find the value of ab.", "opts_hi": ["10", "12", "15", "18"], "opts_en": ["10", "12", "15", "18"], "ans": 1}, {"id": 86, "hi": "[(0.96)³ - (0.1)³] / [(0.96)² + (0.96×0.1) + (0.1)²]", "en": "Simplify: [(0.96)³ - (0.1)³] / [(0.96)² + (0.96×0.1) + (0.1)²]", "opts_hi": ["0,86", "0.95", "0.97", "1.06"], "opts_en": ["0.86", "0.95", "0.97", "1.06"], "ans": 1}, {"id": 87, "hi": "P और Q की औसत मासिक आय 5050 है। Q और R की औसत मासिक आय 6250 है तथा P और R की औसत मासिक आय 5200 है। P की मासिक आय कितनी है ?", "en": "Average monthly income of P and Q is 5050; Q and R is 6250; P and R is 5200. What is P's monthly income?", "opts_hi": ["3,500", "4,000", "4,500", "5,000"], "opts_en": ["3,500", "4,000", "4,500", "5,000"], "ans": 2}, {"id": 88, "hi": "निम्न में से कौन सी सबसे कम भारी धातु है", "en": "Which of the following is the least heavy metal?", "opts_hi": ["पारा", "चाँदी", "लोहा", "सोना"], "opts_en": ["Mercury", "Silver", "Iron", "Gold"], "ans": 3}, {"id": 89, "hi": "लेप्रसी बैसिलस की खोज किसने की ?", "en": "Who discovered leprosy bacillus?", "opts_hi": ["कोच", "हैनसन", "फ्लेमिंग", "हार्वी"], "opts_en": ["Koch", "Hansen", "Fleming", "Harvey"], "ans": 2}, {"id": 90, "hi": "किस इकाई में ध्वनि का शोर मापा जाता है ?", "en": "Noise of sound is measured in which unit?", "opts_hi": ["एम्पियर", "हर्ट्ज", "साइकिल", "डेसीबल"], "opts_en": ["Ampere", "Hertz", "Cycle", "Decibel"], "ans": 4}, {"id": 91, "hi": "Choose one option that expresses the meaning of the sentence: A person who does not believe inthe existence of god.", "en": "Choose one option that expresses the meaning: A person who does not believe in the existence of God.", "opts_hi": ["Theist", "Atheist", "Ascetic", "Agnostic"], "opts_en": ["Theist", "Atheist", "Ascetic", "Agnostic"], "ans": 2}, {"id": 92, "hi": "Choose one option that expresses the most appropriate meaning for the idiom out of four options: To take a thing lying down.", "en": "Choose the most appropriate meaning of the idiom: To take a thing lying down.", "opts_hi": ["to beg", "to submit without resistance", "to disregard", "to avoid"], "opts_en": ["to beg", "to submit without resistance", "to disregard", "to avoid"], "ans": 2}, {"id": 93, "hi": "Choose the most appropriate preposition out of four options: Reena was invited his friends ------- dinner.", "en": "Choose the most appropriate preposition: Reena was invited his friends ------- dinner.", "opts_hi": ["for", "to", "with", "over"], "opts_en": ["for", "to", "with", "over"], "ans": 2}, {"id": 94, "hi": "For blank space, choose the proper article: I waited for ------- hour", "en": "Choose the proper article: I waited for ------- hour.", "opts_hi": ["a", "an", "no article", "the"], "opts_en": ["a", "an", "no article", "the"], "ans": 2}, {"id": 95, "hi": "Choose the pair of words that best expresses a reationship similar to that expressed in the pair of words in capital. AIRPLANE: HANGER", "en": "Choose the pair with a similar relationship: AIRPLANE : HANGER", "opts_hi": ["automobile: garage", "ship: seaport", "train station", "bus: bus stop"], "opts_en": ["automobile : garage", "ship : seaport", "train station", "bus : bus stop"], "ans": 1}, {"id": 96, "hi": "निम्न में से पुल्लिंग शब्द नहीं हैः", "en": "Which of the following is not a masculine word?", "opts_hi": ["समाज", "विभाग", "सुपारी", "देश"], "opts_en": ["समाज", "विभाग", "सुपारी", "देश"], "ans": 3}, {"id": 97, "hi": "चपला-चपल का समरूपी भिन्नार्थक हैः", "en": "चपला-चपल is a pair of similar-looking words with different meanings. Its meaning is -", "opts_hi": ["बिजली-तेज", "तेज - बिजली", "बादल-गर्जन", "गर्जन - बादल"], "opts_en": ["बिजली-तेज", "तेज - बिजली", "बादल-गर्जन", "गर्जन - बादल"], "ans": 1}, {"id": 98, "hi": "निम्न में से किस शब्द की वर्तनी सही है ?", "en": "Which word has the correct spelling?", "opts_hi": ["आधीन", "देहिक", "हिंग", "दायित्व"], "opts_en": ["आधीन", "देहिक", "हिंग", "दायित्व"], "ans": 4}, {"id": 99, "hi": "बिजली का समानार्थी शब्द नहीं है-", "en": "Which is not a synonym of 'बिजली'?", "opts_hi": ["चंचला", "सफरी", "चपला", "दामिनी"], "opts_en": ["चंचला", "सफरी", "चपला", "दामिनी"], "ans": 2}, {"id": 100, "hi": "निम्न में से कौन सा विलोम युग्म सही है ?", "en": "Which of the following antonym pairs is correct?", "opts_hi": ["नूतन-आज", "कुटिल-सीधा", "रक्षक-तक्षक", "पुरस्कार - दंड"], "opts_en": ["नूतन-आज", "कुटिल-सीधा", "रक्षक-तक्षक", "पुरस्कार - दंड"], "ans": 4}];let current=0;let lang=localStorage.getItem(TEST_ID+"_lang")||"hi";let answers=Array(questions.length).fill(null);let review=Array(questions.length).fill(false);let submitted=false;let totalSeconds=100*60;
function esc(s){return String(s??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll("\n","<br>")}
function getSubject(q){if(q.id<=50)return lang==="en"?"Public Health / Sanitation":"जनस्वास्थ्य / स्वच्छता"; if(q.id<=75)return lang==="en"?"Haryana GK":"हरियाणा GK"; if(q.id<=90)return lang==="en"?"GK / Reasoning / Maths":"GK / रीजनिंग / गणित"; return lang==="en"?"English / Hindi Language":"English / Hindi भाषा"}
function textFor(q){if(lang==="hi")return esc(q.hi);if(lang==="en")return esc(q.en);return `<div><span class="math">{esc(q.hi)}</div><div class="en"></span>{esc(q.en)}</div>`}
function optFor(q,i){if(lang==="hi")return esc(q.opts_hi[i]||"");if(lang==="en")return esc(q.opts_en[i]||"");return `<b>HI:</b> <span class="math">{esc(q.opts_hi[i]||"")}<br><b>EN:</b> </span>{esc(q.opts_en[i]||"")}`}
function render(){const q=questions[current];document.getElementById("qCount").textContent=`Question <span class="math">{current+1}/</span>{questions.length}`;document.getElementById("subjectLabel").textContent=getSubject(q);document.getElementById("question").innerHTML=(current+1)+". "+textFor(q);const optDiv=document.getElementById("options");optDiv.innerHTML="";q.opts_hi.forEach((_,i)=>{const btn=document.createElement("button");btn.className="opt"+(answers[current]===i+1?" selected":"");btn.innerHTML=`(<span class="math">{i+1}) </span>{optFor(q,i)}`;btn.onclick=()=>{if(!submitted){answers[current]=i+1;saveState();render();}};optDiv.appendChild(btn);});renderPalette();updateLangButtons();}
function updateLangButtons(){["hi","en","bi"].forEach(x=>document.getElementById("btn-"+x).classList.toggle("active",lang===x));}function setLang(x){lang=x;localStorage.setItem(TEST_ID+"_lang",lang);render();}
function renderPalette(){const p=document.getElementById("palette");p.innerHTML="";questions.forEach((q,i)=>{const d=document.createElement("div");d.className="num"+(i===current?" active":"")+(answers[i]?" answered":"")+(review[i]?" review":"");d.textContent=i+1;d.onclick=()=>{current=i;saveState();render();};p.appendChild(d);});}
function prevQ(){if(current>0){current--;saveState();render();}}function saveNext(){if(current<questions.length-1){current++;saveState();render();}}function clearAns(){answers[current]=null;saveState();render();}function toggleReview(){review[current]=!review[current];saveState();render();}
function submitTest(){if(!confirm("Submit this test?"))return;submitted=true;let correct=0,wrong=0,attempted=0;questions.forEach((q,i)=>{if(answers[i]){attempted++;if(answers[i]===q.ans)correct++;else wrong++;}});const marks=correct-wrong*0.25;document.getElementById("testArea").style.display="none";document.getElementById("resultArea").style.display="block";document.getElementById("scoreBox").innerHTML=`<div class="score-box"><b><span class="math">{attempted}</b>Attempted</div><div class="score-box"><b></span>{correct}</b>Correct</div><div class="score-box"><b><span class="math">{wrong}</b>Wrong</div><div class="score-box"><b></span>{marks.toFixed(2)}</b>Score</div>`;saveHistory({date:new Date().toLocaleString(),attempted,correct,wrong,marks:marks.toFixed(2)});localStorage.removeItem(TEST_ID+"_state");loadHistory();}
function showReview(){let out="<h3>Answer Review</h3>";questions.forEach((q,i)=>{const status=!answers[i]?"Skipped":(answers[i]===q.ans?"Correct":"Wrong");out+=`<div class="review-card"><b>Q<span class="math">{i+1}.</b> </span>{textFor(q)}<br><span class="small">Your answer: <span class="math">{answers[i]||"-"} | Correct answer: </span>{q.ans} | Status: <span class="math">{status}</span></div>`;});document.getElementById("reviewArea").innerHTML=out;}
function restartTest(){if(!confirm("Restart this test?"))return;current=0;answers=Array(questions.length).fill(null);review=Array(questions.length).fill(false);totalSeconds=100*60;submitted=false;localStorage.removeItem(TEST_ID+"_state");document.getElementById("resultArea").style.display="none";document.getElementById("testArea").style.display="block";render();}
function tick(){if(submitted)return;let m=Math.floor(totalSeconds/60),s=totalSeconds%60;document.getElementById("timer").textContent=String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");if(totalSeconds<=0){submitted=true;alert("Time is over. Test will be submitted.");submitted=false;submitTest();}else totalSeconds--;saveState();}
function saveState(){localStorage.setItem(TEST_ID+"_state",JSON.stringify({current,answers,review,totalSeconds}));}function loadState(){const raw=localStorage.getItem(TEST_ID+"_state");if(raw){try{const st=JSON.parse(raw);current=st.current??0;answers=st.answers??answers;review=st.review??review;totalSeconds=st.totalSeconds??totalSeconds;}catch(e){}}}
function saveHistory(item){const key=TEST_ID+"_history";let h=JSON.parse(localStorage.getItem(key)||"[]");h.unshift(item);h=h.slice(0,10);localStorage.setItem(key,JSON.stringify(h));}function loadHistory(){const h=JSON.parse(localStorage.getItem(TEST_ID+"_history")||"[]");document.getElementById("history").innerHTML=h.length?h.map(x=>`<div class="history-item"><b></span>{x.date}</b><br>Score: <span class="math">{x.marks} | Correct: </span>{x.correct} | Wrong: ${x.wrong}</div>`).join(""):"<p class='small'>No attempt yet.</p>";}
loadState();render();loadHistory();setInterval(tick,1000);
</script><style>
